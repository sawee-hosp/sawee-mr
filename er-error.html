<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER ERROR Report System</title>
    <!-- Google Fonts (Noto Sans Thai) & Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { 
            font-family: 'Noto Sans Thai', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            font-size: 14px;
        }
        .luxury-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
        .btn-radio:checked + label {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-color: #3b82f6;
            color: #1d4ed8;
            font-weight: 600;
        }
        .compact-input {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* PDF hidden container */
        #report-pdf-template {
            font-family: 'Noto Sans Thai', sans-serif;
            position: absolute;
            left: -9999px;
            top: 0;
            width: 297mm; /* A4 Landscape */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyEL06mYIlpEnvw6McVa63_57GLCWeSiiqx7DQzjAJymqbncpmb4Au_F6J4g5DAMPf6/exec";

        const errorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];

        const riskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F"];
        const actions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];

        const App = () => {
            const [activeTab, setActiveTab] = useState('form');
            const [isLoading, setIsLoading] = useState(true);
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [] });
            
            // Form State
            const [form, setForm] = useState({
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: 1, totalErrors: 0,
                errorType: errorOptions[0], hn: '', selectedDrugs: [],
                details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: ''
            });
            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugDropdownOpen, setIsDrugDropdownOpen] = useState(false);
            const [drugSearch, setDrugSearch] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);

            // History Filter
            const [filterType, setFilterType] = useState('day');
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error("Load failed", e); }
                setIsLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            // Shift Logic: D-D/MM/YYYY
            useEffect(() => {
                const [h, m] = form.time.split(':').map(Number);
                const d = new Date(form.date);
                let sD, sM, sY, eD, eM, eY;

                if (h < 8) {
                    const prev = new Date(d); prev.setDate(prev.getDate() - 1);
                    sD = prev.getDate(); sM = String(prev.getMonth() + 1).padStart(2, '0'); sY = prev.getFullYear();
                    eD = d.getDate(); eM = String(d.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                } else {
                    const next = new Date(d); next.setDate(next.getDate() + 1);
                    sD = d.getDate(); sM = String(d.getMonth() + 1).padStart(2, '0'); sY = d.getFullYear();
                    eD = next.getDate(); eM = String(next.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                }
                const fmt = (sM === eM) ? `${sD}-${eD}/${sM}/${sY}` : `${sD}/${sM}-${eD}/${eM}/${eY}`;
                setForm(prev => ({ ...prev, shiftDate: fmt }));
            }, [form.date, form.time]);

            // Sync Stats for current shift
            useEffect(() => {
                const itemsInShift = data.history.filter(h => h.shiftDate === form.shiftDate);
                const shiftTotalRx = itemsInShift.find(h => h.totalRx && h.totalRx !== "")?.totalRx;
                
                // Logic: Only count Error records
                const actualErrorCount = itemsInShift.filter(h => h.errorType !== errorOptions[0]).length;
                
                setForm(prev => ({
                    ...prev,
                    totalRx: shiftTotalRx || prev.totalRx,
                    sequence: form.errorType === errorOptions[0] ? '-' : actualErrorCount + 1,
                    totalErrors: actualErrorCount
                }));
                setIsTotalRxLocked(!!shiftTotalRx);
            }, [form.shiftDate, data.history, form.errorType]);

            // Auto Generate Details
            useEffect(() => {
                if (form.errorType !== errorOptions[0]) {
                    const drugs = form.selectedDrugs.length > 0 ? form.selectedDrugs.join(', ') : '...';
                    setForm(prev => ({ ...prev, details: `HN ${form.hn || '...'} ${form.errorType} คือ ${drugs}` }));
                } else {
                    setForm(prev => ({ ...prev, details: '' }));
                }
            }, [form.hn, form.errorType, form.selectedDrugs]);

            const handlePaste = async (field) => {
                try {
                    const text = await navigator.clipboard.readText();
                    setForm(prev => ({ ...prev, [field]: text }));
                } catch (err) { console.warn("Paste failed", err); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                // In submission, sequence is finalized
                const payload = { ...form, drugs: form.selectedDrugs.join(', ') };
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setShowModal(true);
                        await fetchData();
                        setForm(prev => ({ ...prev, errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '' }));
                        setTimeout(() => setShowModal(false), 1500);
                    }
                } catch (e) { alert("เกิดข้อผิดพลาด"); }
                setIsSubmitting(false);
            };

            const filteredHistory = useMemo(() => {
                if (!data.history) return [];
                return data.history.filter(item => {
                    const matchSearch = (item.hn || '').includes(searchTerm) || (item.details || '').toLowerCase().includes(searchTerm.toLowerCase());
                    const matchDate = filterType === 'day' 
                        ? (item.date || '').includes(filterDate.split('-').reverse().join('/'))
                        : (item.shiftDate || '').includes(`/${filterMonth.split('-')[1]}/${filterMonth.split('-')[0]}`);
                    
                    if (excludeNoError && item.errorType === errorOptions[0]) return false;
                    return matchDate && matchSearch;
                });
            }, [data.history, filterType, filterDate, filterMonth, searchTerm, excludeNoError]);

            // Dashboard Stats Calculation
            const stats = useMemo(() => {
                const rxByShift = {};
                filteredHistory.forEach(h => {
                    if (h.totalRx) rxByShift[h.shiftDate] = parseInt(h.totalRx);
                });
                
                const totalRxSum = Object.values(rxByShift).reduce((a, b) => a + b, 0);
                const actualErrors = filteredHistory.filter(h => h.errorType !== errorOptions[0]);
                const errorCount = actualErrors.length;
                const percent = totalRxSum > 0 ? ((errorCount / totalRxSum) * 100).toFixed(2) : "0.00";

                return { rx: totalRxSum, errors: errorCount, percent };
            }, [filteredHistory]);

            const generateReportPDF = () => {
                const element = document.getElementById('report-pdf-template');
                const opt = {
                    margin: 8,
                    filename: `ER_Report_${filterType === 'day' ? filterDate : filterMonth}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
                };
                html2pdf().from(element).set(opt).save();
            };

            if (isLoading && data.history.length === 0) return (
                <div className="h-screen flex flex-col items-center justify-center gap-3">
                    <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-slate-500 font-medium animate-pulse">กำลังโหลดข้อมูลระบบ...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-12">
                    {/* Compact Modal Success */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className="bg-white px-6 py-8 rounded-2xl luxury-gradient text-white text-center shadow-2xl scale-110">
                                <svg className="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                <h3 className="text-xl font-bold">บันทึกเรียบร้อย</h3>
                            </div>
                        </div>
                    )}

                    {/* Compact Navbar */}
                    <nav className="bg-white border-b sticky top-0 z-40 card-shadow">
                        <div className="max-w-4xl mx-auto flex">
                            <button onClick={()=>setActiveTab('form')} className={`flex-1 py-4 font-bold text-sm transition-all ${activeTab === 'form' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>
                                📝 บันทึกข้อมูล
                            </button>
                            <button onClick={()=>setActiveTab('history')} className={`flex-1 py-4 font-bold text-sm transition-all ${activeTab === 'history' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>
                                📊 ประวัติ & รายงาน
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 md:pt-6">
                        {activeTab === 'form' ? (
                            <div className="bg-white rounded-2xl card-shadow p-5 md:p-8 border border-slate-100">
                                <div className="mb-6 flex flex-col md:flex-row md:items-end justify-between border-b border-slate-100 pb-4">
                                    <div>
                                        <h1 className="text-xl font-bold text-slate-800 tracking-tight">แบบฟอร์มบันทึก ER ERROR</h1>
                                        <p className="text-indigo-500 font-medium text-xs">เภสัชกรเวรเช้าประจำวัน</p>
                                    </div>
                                    <div className="mt-2 md:mt-0 text-right">
                                        <span className="text-[10px] text-slate-400 uppercase font-bold">Shift: {form.shiftDate}</span>
                                    </div>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-6">
                                    {/* Header Controls */}
                                    <div className="bg-slate-50 p-4 rounded-xl flex flex-wrap gap-4 items-center border border-slate-200">
                                        <div className="flex-1 min-w-[140px]">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">วันที่</label>
                                            <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="w-full p-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-100 outline-none" required />
                                        </div>
                                        <div className="flex-1 min-w-[100px]">
                                            <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">เวลา</label>
                                            <input type="time" value={form.time} onChange={e=>setForm({...form, time: e.target.value})} className="w-full p-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-100 outline-none" required />
                                        </div>
                                        <div className="flex-[2] min-w-[200px] flex items-center justify-between bg-white px-4 py-2 rounded-lg border border-indigo-100 shadow-sm">
                                            <div>
                                                <span className="text-[9px] text-indigo-400 font-bold block">ใบสั่งยารวม</span>
                                                <div className="flex items-center gap-2">
                                                    <input type="number" value={form.totalRx} onChange={e=>setForm({...form, totalRx: e.target.value})} disabled={isTotalRxLocked} className="w-16 font-bold text-indigo-600 border-b border-indigo-100 focus:border-indigo-500 outline-none disabled:bg-transparent" required />
                                                    {isTotalRxLocked && <button type="button" onClick={()=>setIsTotalRxLocked(false)} className="text-[9px] text-slate-400 hover:text-indigo-500 underline">แก้ไข</button>}
                                                </div>
                                            </div>
                                            <div className="text-right border-l pl-4">
                                                <span className="text-[9px] text-rose-400 font-bold block uppercase">ลำดับ / Errors</span>
                                                <div className="font-bold text-slate-700">
                                                    {form.sequence} / <span className="text-rose-600">{form.totalErrors}</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Error Type Dropdown */}
                                    <div>
                                        <label className="text-xs font-bold text-slate-600 mb-1.5 block">ความเสี่ยงที่พบ</label>
                                        <select value={form.errorType} onChange={e=>setForm({...form, errorType: e.target.value})} 
                                            className={`w-full p-3 text-sm rounded-xl border-2 font-bold focus:ring-2 focus:ring-opacity-20 outline-none transition-all ${form.errorType === errorOptions[0] ? 'border-green-200 bg-green-50 text-green-700 focus:ring-green-300' : 'border-rose-200 bg-rose-50 text-rose-700 focus:ring-rose-300'}`}>
                                            {errorOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                        </select>
                                    </div>

                                    {/* Conditional Section */}
                                    {form.errorType !== errorOptions[0] && (
                                        <div className="space-y-5 bg-white p-5 rounded-xl border border-rose-100 shadow-sm animate-fade">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                <div className="space-y-1">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1 tracking-wide">HN ผู้ป่วย</label>
                                                    <div className="flex gap-2">
                                                        <input type="text" value={form.hn} onChange={e=>setForm({...form, hn: e.target.value})} className="flex-1 p-2.5 text-sm rounded-lg border border-rose-100 bg-rose-50/20 focus:bg-white outline-none" required placeholder="เช่น 6400..." />
                                                        <button type="button" onClick={()=>handlePaste('hn')} className="px-3 bg-white border border-rose-200 text-rose-500 rounded-lg text-[10px] font-bold hover:bg-rose-50">วาง</button>
                                                    </div>
                                                </div>

                                                <div className="space-y-1">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1 tracking-wide">ยาที่เกี่ยวข้อง</label>
                                                    <div className="relative">
                                                        <div onClick={()=>setIsDrugDropdownOpen(!isDrugDropdownOpen)} className="w-full p-2.5 text-sm rounded-lg border border-rose-100 bg-rose-50/20 min-h-[42px] flex flex-wrap gap-1.5 cursor-pointer">
                                                            {form.selectedDrugs.length === 0 ? <span className="text-slate-400 text-xs italic">เลือกรายการยา...</span> : form.selectedDrugs.map(d=>(
                                                                <span key={d} className="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1 border border-rose-200">
                                                                    {d} <span onClick={(e)=>{e.stopPropagation(); setForm({...form, selectedDrugs: form.selectedDrugs.filter(x=>x!==d)})}} className="text-rose-400 hover:text-rose-600">×</span>
                                                                </span>
                                                            ))}
                                                        </div>
                                                        {isDrugDropdownOpen && (
                                                            <div className="absolute z-50 w-full mt-1 bg-white border border-slate-200 shadow-xl rounded-xl overflow-hidden">
                                                                <div className="p-2 border-b flex gap-2">
                                                                    <input type="text" placeholder="ค้นหายา..." value={drugSearch} onChange={e=>setDrugSearch(e.target.value)} className="flex-1 p-1.5 border rounded text-xs outline-none" onClick={e=>e.stopPropagation()} />
                                                                    <button type="button" onClick={()=>setIsDrugDropdownOpen(false)} className="text-[10px] font-bold text-slate-400 p-1">ปิด</button>
                                                                </div>
                                                                <div className="max-h-40 overflow-y-auto">
                                                                    {data.drugs.filter(d=>d.toLowerCase().includes(drugSearch.toLowerCase())).map(d=>(
                                                                        <div key={d} onClick={()=>setForm({...form, selectedDrugs: form.selectedDrugs.includes(d)?form.selectedDrugs.filter(x=>x!==d):[...form.selectedDrugs, d]})} className={`p-2 text-xs border-b last:border-0 cursor-pointer hover:bg-slate-50 ${form.selectedDrugs.includes(d)?'bg-rose-50 font-bold text-rose-600':''}`}>{d}</div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="md:col-span-2">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1">รายละเอียด</label>
                                                    <textarea value={form.details} onChange={e=>setForm({...form, details: e.target.value})} className="w-full mt-1 p-3 text-sm rounded-lg border border-rose-100 bg-amber-50/20 h-20 outline-none focus:bg-white" />
                                                </div>

                                                <div className="md:col-span-2 space-y-3">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1">ประเภทความเสี่ยง</label>
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                                        {riskTypes.map(rt => (
                                                            <div key={rt}>
                                                                <input type="radio" id={`rt-${rt}`} name="riskType" value={rt} checked={form.riskType === rt} onChange={e=>setForm({...form, riskType: e.target.value})} className="hidden btn-radio" />
                                                                <label htmlFor={`rt-${rt}`} className="block w-full py-2 text-center rounded-lg border border-slate-100 bg-slate-50 text-[10px] font-medium cursor-pointer transition-all text-slate-500 hover:border-indigo-200">
                                                                    {rt}
                                                                </label>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="md:col-span-2 space-y-3">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1">ระดับความรุนแรง</label>
                                                    <div className="flex gap-2">
                                                        {severities.map(sv => (
                                                            <div key={sv} className="flex-1">
                                                                <input type="radio" id={`sv-${sv}`} name="severity" value={sv} checked={form.severity === sv} onChange={e=>setForm({...form, severity: e.target.value})} className="hidden btn-radio" />
                                                                <label htmlFor={`sv-${sv}`} className="block w-full py-2 text-center rounded-lg border border-slate-100 bg-slate-50 text-sm font-black cursor-pointer transition-all text-slate-300">
                                                                    {sv}
                                                                </label>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>

                                                <div className="md:col-span-2">
                                                    <label className="text-[11px] font-bold text-rose-600 uppercase ml-1">การแก้ไขเบื้องต้น</label>
                                                    <select value={form.action} onChange={e=>setForm({...form, action: e.target.value})} className="w-full mt-1 p-2.5 text-sm border border-rose-100 rounded-lg bg-white outline-none" required>
                                                        <option value="">-- เลือกรายการ --</option>
                                                        {actions.map(a=><option key={a} value={a}>{a}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Staff Section */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 bg-indigo-50/30 p-5 rounded-xl border border-indigo-50">
                                        {[
                                            { label: 'ผู้ตรวจ (พยาบาล)', field: 'inspector', list: 'inspectors' },
                                            { label: 'รคส. (แพทย์)', field: 'doctor', list: 'doctors' },
                                            { label: 'ผู้บันทึก (เภสัชกร)', field: 'recorder', list: 'recorders' }
                                        ].map(item => (
                                            <div key={item.field} className="space-y-1">
                                                <label className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1">{item.label}</label>
                                                <div className="flex gap-1">
                                                    <input list={item.list} value={form[item.field]} onChange={e=>setForm({...form, [item.field]: e.target.value})} className="flex-1 p-2 text-xs rounded-lg border border-indigo-100 outline-none focus:ring-2 focus:ring-indigo-100" required />
                                                    <button type="button" onClick={()=>handlePaste(item.field)} className="bg-white p-2 text-indigo-400 border border-indigo-100 rounded-lg hover:bg-indigo-50"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg></button>
                                                </div>
                                                <datalist id={item.list}>{data[item.list].map(n=><option key={n} value={n}/>)}</datalist>
                                            </div>
                                        ))}
                                    </div>

                                    <button type="submit" disabled={isSubmitting} className={`w-full p-4 rounded-xl text-lg font-bold text-white luxury-gradient shadow-lg transform active:scale-[0.98] transition-all ${isSubmitting?'opacity-50 grayscale':''}`}>
                                        {isSubmitting ? 'กำลังบันทึกข้อมูล...' : 'บันทึกรายงาน ER ERROR'}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            /* --- History Tab --- */
                            <div className="space-y-6 animate-fade">
                                {/* Compact Dashboard */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    <div className="bg-white p-5 rounded-2xl card-shadow border-l-4 border-indigo-500">
                                        <div className="text-slate-400 text-[10px] font-bold uppercase mb-1 tracking-wider">ใบสั่งยารวม</div>
                                        <div className="text-2xl font-black text-slate-700">{stats.rx} <span className="text-[10px] font-normal text-slate-300">ใบ</span></div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl card-shadow border-l-4 border-rose-500 flex justify-between items-center">
                                        <div>
                                            <div className="text-slate-400 text-[10px] font-bold uppercase mb-1 tracking-wider">Error ที่พบ</div>
                                            <div className="text-2xl font-black text-rose-600">{stats.errors} <span className="text-[10px] font-normal text-slate-300">รายการ</span></div>
                                        </div>
                                        <div className="text-right border-l pl-4">
                                            <div className="text-[10px] font-bold text-rose-400">อัตราส่วน (%)</div>
                                            <div className="text-xl font-black text-rose-700">{stats.percent}%</div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl card-shadow flex items-center justify-center">
                                        <button onClick={generateReportPDF} className="w-full flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 py-3 rounded-xl hover:bg-indigo-100 transition-all font-bold text-sm">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                            Generate PDF
                                        </button>
                                    </div>
                                </div>

                                {/* Filters Card */}
                                <div className="bg-white rounded-2xl card-shadow p-6 border border-slate-100">
                                    <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                                        <div className="flex gap-1 bg-slate-50 p-1 rounded-xl">
                                            <button onClick={()=>setFilterType('day')} className={`px-4 py-1.5 rounded-lg text-[11px] font-bold transition-all ${filterType==='day'?'bg-white shadow-sm text-indigo-600':'text-slate-400'}`}>รายวัน</button>
                                            <button onClick={()=>setFilterType('month')} className={`px-4 py-1.5 rounded-lg text-[11px] font-bold transition-all ${filterType==='month'?'bg-white shadow-sm text-indigo-600':'text-slate-400'}`}>รายเดือน</button>
                                        </div>
                                        <div className="flex-1 max-w-sm relative">
                                            <input type="text" placeholder="ค้นหา HN / รายละเอียด..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full p-2.5 bg-slate-50 rounded-xl text-xs outline-none border-none focus:ring-2 focus:ring-indigo-100" />
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {filterType==='day' ? 
                                                <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="p-2 bg-slate-50 border-none rounded-lg text-xs" /> : 
                                                <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="p-2 bg-slate-50 border-none rounded-lg text-xs" />
                                            }
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-center gap-2 mb-4">
                                        <input type="checkbox" id="no-error-check" checked={excludeNoError} onChange={e=>setExcludeNoError(e.target.checked)} className="w-4 h-4 rounded text-indigo-600 focus:ring-indigo-500" />
                                        <label htmlFor="no-error-check" className="text-[11px] font-bold text-slate-500">ซ่อนรายการ "❌ไม่พบ Error" (Default)</label>
                                    </div>

                                    <div className="overflow-x-auto rounded-xl border border-slate-50">
                                        <table className="w-full text-left text-[11px] border-collapse">
                                            <thead className="bg-slate-50/80 text-slate-400 font-bold uppercase tracking-widest">
                                                <tr>
                                                    <th className="p-4 border-b">กะรับยา</th>
                                                    <th className="p-4 border-b">เวลา</th>
                                                    <th className="p-4 border-b">HN</th>
                                                    <th className="p-4 border-b">ความเสี่ยง</th>
                                                    <th className="p-4 border-b">ระดับ</th>
                                                    <th className="p-4 border-b">ผู้บันทึก</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {filteredHistory.map((h, i)=>(
                                                    <tr key={i} className="hover:bg-slate-50/50 transition-all group">
                                                        <td className="p-4 font-bold text-slate-600">{h.shiftDate}</td>
                                                        <td className="p-4 text-slate-400">{h.time}</td>
                                                        <td className="p-4 font-black text-indigo-600">{h.hn || '-'}</td>
                                                        <td className={`p-4 font-bold ${h.errorType===errorOptions[0]?'text-green-500':'text-rose-500'}`}>{h.errorType}</td>
                                                        <td className="p-4 text-center font-black text-slate-700">{h.severity || '-'}</td>
                                                        <td className="p-4 text-slate-400 italic">{h.recorder}</td>
                                                    </tr>
                                                ))}
                                                {filteredHistory.length === 0 && (
                                                    <tr><td colSpan="6" className="p-20 text-center text-slate-300 italic">ไม่พบข้อมูลตามเงื่อนไข...</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* PDF Template (Hidden from UI) */}
                    <div id="report-pdf-template" className="pdf-container">
                        <div style={{ padding: '15mm' }}>
                            <div style={{ textAlign: 'center', marginBottom: '10mm', borderBottom: '2px solid #4f46e5', paddingBottom: '5mm' }}>
                                <h1 style={{ fontSize: '22px', fontWeight: 'bold', color: '#1e293b', marginBottom: '2mm' }}>รายงานสรุป ER Medication Errors</h1>
                                <p style={{ fontSize: '14px', color: '#4b5563' }}>
                                    ช่วงเวลา: {filterType === 'day' ? filterDate : filterMonth} | 
                                    ใบสั่งยารวม: <span style={{fontWeight:'bold'}}>{stats.rx}</span> ใบ | 
                                    Error รวม: <span style={{fontWeight:'bold', color:'#e11d48'}}>{stats.errors}</span> รายการ ({stats.percent}%)
                                </p>
                            </div>
                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '10px' }}>
                                <thead>
                                    <tr style={{ backgroundColor: '#f3f4f6', color: '#374151' }}>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>กะรับยา</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>เวลา</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>HN</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>ความเสี่ยงที่พบ</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>รายละเอียด</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>รุนแรง</th>
                                        <th style={{ border: '1px solid #e5e7eb', padding: '8px' }}>ผู้ตรวจ/รคส./ผู้บันทึก</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredHistory.map((h, i) => (
                                        <tr key={i} style={{ backgroundColor: h.errorType === errorOptions[0] ? '#f9fafb' : '#fff' }}>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', textAlign: 'center' }}>{h.shiftDate}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', textAlign: 'center' }}>{h.time}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{h.hn}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', color: h.errorType === errorOptions[0] ? '#10b981' : '#e11d48', fontWeight: 'bold' }}>{h.errorType}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', fontSize: '9px' }}>{h.details}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', textAlign: 'center', fontWeight: 'bold' }}>{h.severity}</td>
                                            <td style={{ border: '1px solid #e5e7eb', padding: '6px', fontSize: '9px' }}>{h.inspector}<br/>{h.doctor}<br/>{h.recorder}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <div style={{ marginTop: '15mm', display: 'flex', justifyContent: 'space-between', fontSize: '11px', color: '#6b7280' }}>
                                <div style={{ textAlign: 'center' }}>
                                    <p>............................................................</p>
                                    <p style={{ marginTop: '2mm' }}>หัวหน้ากลุ่มงานเภสัชกรรม</p>
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                    <p>Generated at: {new Date().toLocaleString('th-TH')}</p>
                                    <p style={{ fontSize: '9px' }}>ER ERROR System v2.0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
