<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์บันทึกอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    
    <style>
        body { 
            font-family: 'Noto Sans Thai', 'Inter', sans-serif; 
            color: #0f172a; 
            font-size: 14px; 
            background-color: #f8fafc; 
        }
        .text-gradient-er { background: linear-gradient(135deg, #9f1239 0%, #e11d48 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .text-gradient-mr { background: linear-gradient(135deg, #065f46 0%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-er { background: linear-gradient(135deg, #dc2626 0%, #9f1239 100%); }
        .bg-gradient-mr { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); }
        
        .compact-card { 
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.05); 
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .compact-input { 
            padding: 10px 14px; 
            border-radius: 10px; 
            border: 1px solid #e2e8f0; 
            outline: none; 
            transition: all 0.2s; 
        }
        .compact-input:focus { 
            border-color: #94a3b8; 
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1); 
        }
        
        .btn-radio:checked + label { 
            box-shadow: inset 0 0 0 2px currentColor; 
            font-weight: 700; 
            background-color: currentColor; 
            color: white !important; 
        }
        
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 1px; 
            background-color: #f1f5f9; 
            border: 1px solid #e2e8f0; 
            border-radius: 16px; 
            overflow: hidden; 
        }
        .calendar-day { background-color: white; min-height: 90px; padding: 8px; }
        .calendar-header { background-color: #f8fafc; padding: 12px; text-align: center; font-weight: 700; font-size: 11px; color: #64748b; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Custom Tab Styles */
        .tab-button {
            position: relative;
            padding: 1rem 2rem;
            font-weight: 800;
            font-size: 0.875rem;
            transition: all 0.3s;
        }
        .tab-button-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 4px;
            border-radius: 4px 4px 0 0;
            background: currentColor;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyEL06mYIlpEnvw6McVa63_57GLCWeSiiqx7DQzjAJymqbncpmb4Au_F6J4g5DAMPf6/exec";

        const errorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];
        const riskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F"];
        const actions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];

        const THAI_MONTHS = [
            "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
            "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
        ];

        const normalizeDateToISO = (v) => {
            if (!v) return '';
            const d = new Date(v);
            if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
            return String(v).split('T')[0];
        };

        const formatDisplayDate = (v) => {
            if (!v) return '-';
            const [y, m, d] = normalizeDateToISO(v).split('-');
            return `${d}/${m}/${y}`;
        };

        const formatThaiFullDate = (iso) => {
            if(!iso) return '';
            const [y, m, d] = iso.split('-');
            return `${parseInt(d)} ${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatThaiMonthYear = (isoMonth) => {
            if(!isoMonth) return '';
            const [y, m] = isoMonth.split('-');
            return `${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatTime = (t) => {
            if (!t) return '00:00';
            const s = String(t);
            if (s.includes('T')) return s.split('T')[1].substring(0, 5);
            const p = s.split(':');
            if (p.length >= 2) return `${String(p[0]).padStart(2, '0')}:${String(p[1]).padStart(2, '0')}`;
            return '00:00';
        };

        Chart.register(ChartDataLabels);

        const App = () => {
            const [systemMode, setSystemMode] = useState('ER');
            const [activeTab, setActiveTab] = useState('form');
            const [viewMode, setViewMode] = useState('table');
            const [isLoading, setIsLoading] = useState(true);
            const [isPdfReady, setIsPdfReady] = useState(false);
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [] });
            const [form, setForm] = useState({
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: '-', totalErrors: '-',
                errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: ''
            });

            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugDropdownOpen, setIsDrugDropdownOpen] = useState(false);
            const [drugSearch, setDrugSearch] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);

            const [filterType, setFilterType] = useState('month');
            const [filterDateStart, setFilterDateStart] = useState(() => {
                const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
            });
            const [filterDateEnd, setFilterDateEnd] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);

            const chartsRef = useRef({ type: null, pharma: null, bar: null });
            const canvasRefs = { type: useRef(null), pharma: useRef(null), bar: useRef(null) };

            const theme = useMemo(() => ({
                bgApp: systemMode === 'ER' ? 'bg-gradient-to-br from-red-50 to-rose-100' : 'bg-gradient-to-br from-emerald-50 to-teal-100',
                textGrad: systemMode === 'ER' ? 'text-gradient-er' : 'text-gradient-mr',
                bgGrad: systemMode === 'ER' ? 'bg-gradient-er' : 'bg-gradient-mr',
                primaryStr: systemMode === 'ER' ? '#e11d48' : '#059669',
                btnActiveTab: systemMode === 'ER' ? 'bg-red-600 text-white shadow-md' : 'bg-teal-600 text-white shadow-md',
                lightBg: systemMode === 'ER' ? 'bg-red-50/60' : 'bg-teal-50/60',
                btnSubmit: systemMode === 'ER' ? 'bg-red-600 hover:bg-red-700' : 'bg-teal-600 hover:bg-teal-700',
                tabColor: systemMode === 'ER' ? 'text-red-600' : 'text-emerald-600'
            }), [systemMode]);

            useEffect(() => {
                const init = async () => {
                    try {
                        const getB64 = async (u) => {
                            const r = await fetch(u);
                            const ab = await r.arrayBuffer();
                            let b = '';
                            const by = new Uint8Array(ab);
                            for(let i=0; i<by.length; i++) b += String.fromCharCode(by[i]);
                            return window.btoa(b);
                        };
                        const [reg, bld] = await Promise.all([
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Regular.ttf'),
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Bold.ttf')
                        ]);
                        window.pdfMake.vfs = { ...window.pdfMake.vfs, 'SR.ttf': reg, 'SB.ttf': bld };
                        window.pdfMake.fonts = { Sarabun: { normal: 'SR.ttf', bold: 'SB.ttf' } };
                        setIsPdfReady(true);
                    } catch(e) { console.error("PDF Font failed", e); }
                    await fetchData();
                };
                init();
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const r = await fetch(GAS_URL);
                    const j = await r.json();
                    setData(j);
                } catch(e) { console.error("Fetch failed"); }
                setIsLoading(false);
            };

            useEffect(() => {
                const [h, m] = form.time.split(':').map(Number);
                const d = new Date(form.date);
                let sD, sM, sY, eD, eM, eY;
                if (h < 8) {
                    const p = new Date(d); p.setDate(p.getDate() - 1);
                    sD = p.getDate(); sM = String(p.getMonth() + 1).padStart(2, '0'); sY = p.getFullYear();
                    eD = d.getDate(); eM = String(d.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                } else {
                    const n = new Date(d); n.setDate(n.getDate() + 1);
                    sD = d.getDate(); sM = String(d.getMonth() + 1).padStart(2, '0'); sY = d.getFullYear();
                    eD = n.getDate(); eM = String(n.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                }
                setForm(p => ({ ...p, shiftDate: `${sD}/${sM}-${eD}/${eM}/${sY}` }));
            }, [form.date, form.time]);

            useEffect(() => {
                const shiftItems = data.history.filter(h => h.shiftDate === form.shiftDate && h.systemMode === systemMode);
                const shiftRx = shiftItems.find(h => h.totalRx)?.totalRx;
                const errs = shiftItems.filter(h => h.errorType !== errorOptions[0]).length;
                const isErr = form.errorType !== errorOptions[0];
                setForm(p => ({
                    ...p,
                    totalRx: shiftRx || '',
                    sequence: isErr ? errs + 1 : '-',
                    totalErrors: isErr ? errs + 1 : '-'
                }));
                setIsTotalRxLocked(!!shiftRx);
            }, [form.shiftDate, data.history, form.errorType, systemMode]);

            const baseFiltered = useMemo(() => {
                if (!data.history) return [];
                return data.history.filter(item => {
                    const matchMode = item.systemMode === systemMode || (!item.systemMode && systemMode === 'ER');
                    const iso = normalizeDateToISO(item.date);
                    const matchDate = filterType === 'day' ? (iso >= filterDateStart && iso <= filterDateEnd) : iso.startsWith(filterMonth);
                    const matchSearch = String(item.hn || '').includes(searchTerm) || 
                                      String(item.details || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                                      String(item.recorder || '').toLowerCase().includes(searchTerm.toLowerCase());
                    return matchMode && matchDate && matchSearch;
                });
            }, [data.history, systemMode, filterType, filterDateStart, filterDateEnd, filterMonth, searchTerm]);

            const displayList = useMemo(() => baseFiltered.filter(i => !(excludeNoError && i.errorType === errorOptions[0])), [baseFiltered, excludeNoError]);

            const stats = useMemo(() => {
                const daily = {};
                let totalRxCount = 0;
                const seenShifts = new Set();

                baseFiltered.forEach(h => {
                    const iso = normalizeDateToISO(h.date);
                    if (!daily[iso]) daily[iso] = { rx: 0, err: 0 };
                    if (h.totalRx && !seenShifts.has(`${h.shiftDate}-${h.systemMode}`)) {
                        seenShifts.add(`${h.shiftDate}-${h.systemMode}`);
                        totalRxCount += parseInt(h.totalRx);
                        daily[iso].rx += parseInt(h.totalRx);
                    }
                    if (h.errorType !== errorOptions[0]) {
                        daily[iso].err += 1;
                    }
                });

                const errors = baseFiltered.filter(h => h.errorType !== errorOptions[0]);
                const counts = { type: {}, pharma: {}, doc: {}, nurse: {}, drug: {} };

                errors.forEach(h => {
                    counts.type[h.errorType] = (counts.type[h.errorType] || 0) + 1;
                    if(h.recorder) counts.pharma[h.recorder] = (counts.pharma[h.recorder] || 0) + 1;
                    if(h.inspector) counts.doc[h.inspector] = (counts.doc[h.inspector] || 0) + 1;
                    if(h.doctor) counts.nurse[h.doctor] = (counts.nurse[h.doctor] || 0) + 1;
                    if(h.drugs) h.drugs.split(',').forEach(d => {
                        const dr = d.trim(); if(dr) counts.drug[dr] = (counts.drug[dr] || 0) + 1;
                    });
                });

                return { rx: totalRxCount, err: errors.length, pct: totalRxCount > 0 ? ((errors.length/totalRxCount)*100).toFixed(2) : '0.00', counts, daily };
            }, [baseFiltered]);

            useEffect(() => {
                if (activeTab === 'history') {
                    const opt = { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } },
                            datalabels: { color: '#fff', font: { weight: 'bold', size: 10 }, formatter: v => v > 0 ? v : '' } 
                        } 
                    };
                    
                    if (canvasRefs.bar.current) {
                        if (chartsRef.current.bar) chartsRef.current.bar.destroy();
                        const sorted = Object.keys(stats.daily).sort();
                        chartsRef.current.bar = new Chart(canvasRefs.bar.current, {
                            type: 'bar', data: {
                                labels: sorted.map(d => formatDisplayDate(d)),
                                datasets: [
                                    { label: 'ปกติ', data: sorted.map(d => Math.max(0, stats.daily[d].rx - stats.daily[d].err)), backgroundColor: '#10b981', stack: 'a' },
                                    { label: 'Error', data: sorted.map(d => stats.daily[d].err), backgroundColor: '#ef4444', stack: 'a' }
                                ]
                            }, options: { ...opt, scales: { x: { stacked: true }, y: { stacked: true } } }
                        });
                    }

                    if (canvasRefs.type.current) {
                        if (chartsRef.current.type) chartsRef.current.type.destroy();
                        chartsRef.current.type = new Chart(canvasRefs.type.current, {
                            type: 'doughnut', data: { labels: Object.keys(stats.counts.type), datasets: [{ data: Object.values(stats.counts.type), backgroundColor: ['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6'] }] },
                            options: opt
                        });
                    }

                    if (canvasRefs.pharma.current) {
                        if (chartsRef.current.pharma) chartsRef.current.pharma.destroy();
                        chartsRef.current.pharma = new Chart(canvasRefs.pharma.current, {
                            type: 'pie', data: { labels: Object.keys(stats.counts.pharma), datasets: [{ data: Object.values(stats.counts.pharma), backgroundColor: ['#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef'] }] },
                            options: opt
                        });
                    }
                }
            }, [activeTab, stats]);

            const genPDF = () => {
                if(!isPdfReady) return;
                
                const dateSummary = filterType === 'day' 
                    ? `ตั้งแต่ ${formatThaiFullDate(filterDateStart)} ถึง ${formatThaiFullDate(filterDateEnd)}`
                    : `ประจำเดือน ${formatThaiMonthYear(filterMonth)}`;

                const body = [[
                    { text: 'ที่', style: 'th' }, { text: 'วันที่', style: 'th' }, { text: 'เวลา', style: 'th' },
                    { text: 'ความเสี่ยงที่พบ', style: 'th' }, { text: 'รายละเอียด', style: 'th' },
                    { text: 'Error Type', style: 'th' }, { text: 'ระดับ', style: 'th' },
                    { text: 'การแก้ไข', style: 'th' }, { text: 'ผู้ตรวจ', style: 'th' },
                    { text: 'รคส.', style: 'th' }, { text: 'ผู้บันทึก', style: 'th' }
                ]];

                displayList.forEach((h, i) => {
                    body.push([
                        { text: i+1, alignment: 'center' },
                        { text: formatDisplayDate(h.date), alignment: 'center', noWrap: true },
                        { text: formatTime(h.time), alignment: 'center', noWrap: true },
                        { text: h.errorType || '-', color: h.errorType === errorOptions[0] ? '#10b981' : theme.primaryStr, bold: true },
                        { text: h.details || '-' },
                        { text: h.riskType || '-' },
                        { text: h.severity || '-', alignment: 'center', bold: true },
                        { text: h.action || '-' },
                        { text: h.inspector || '-' },
                        { text: h.doctor || '-' },
                        { text: (h.recorder || '').substring(0, 10), alignment: 'center' }
                    ]);
                });

                const doc = {
                    pageSize: 'A4', pageOrientation: 'landscape', pageMargins: [20, 20, 20, 30],
                    defaultStyle: { font: 'Sarabun', fontSize: 8.5, lineHeight: 1.1 },
                    styles: { 
                        th: { bold: true, alignment: 'center', fillColor: '#f1f5f9' }
                    },
                    content: [
                        { text: `รายงานสรุป ${systemMode} Medication Errors`, fontSize: 16, bold: true, alignment: 'center', color: theme.primaryStr, margin: [0,0,0,2] },
                        { text: dateSummary, fontSize: 11, alignment: 'center', margin: [0,0,0,4], bold: true },
                        { text: `จำนวนใบสั่งยา ${stats.rx.toLocaleString()} ใบ  จำนวน Errors ${stats.err.toLocaleString()} ใบ (${stats.pct}%)`, fontSize: 10, alignment: 'center', margin: [0,0,0,10] },
                        { 
                            table: { 
                                headerRows: 1, 
                                widths: [18, '7%', '5%', '14%', '*', '9%', 24, '13%', '7%', '7%', 48], 
                                body 
                            }, 
                            layout: {
                                hLineWidth: () => 0.5,
                                vLineWidth: () => 0.5,
                                hLineColor: () => '#94a3b8',
                                vLineColor: () => '#94a3b8',
                                paddingLeft: () => 3,
                                paddingRight: () => 3,
                                paddingTop: () => 4,
                                paddingBottom: () => 4
                            }
                        }
                    ],
                    footer: (c, p) => ({ text: `หน้า ${c} จาก ${p}`, alignment: 'center', fontSize: 8, margin: [0, 10] })
                };
                pdfMake.createPdf(doc).open();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const res = await fetch(GAS_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ ...form, systemMode, drugs: form.selectedDrugs.join(', ') }) 
                    });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setShowModal(true); await fetchData();
                        setForm(p => ({ ...p, errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '' }));
                        setTimeout(() => setShowModal(false), 2000);
                    }
                } catch(e) { console.error(e); }
                setIsSubmitting(false);
            };

            const renderCalendar = () => {
                const [y, m] = filterMonth.split('-').map(Number);
                const first = new Date(y, m - 1, 1).getDay();
                const days = new Date(y, m, 0).getDate();
                const grid = [];
                for(let i=0; i<first; i++) grid.push(<div key={`e-${i}`} className="calendar-day bg-slate-50/40"></div>);
                for(let d=1; d<=days; d++) {
                    const iso = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dData = stats.daily[iso] || { rx: 0, err: 0 };
                    grid.push(
                        <div key={d} className="calendar-day border-t border-l border-slate-100 flex flex-col justify-between hover:bg-slate-50 transition-colors">
                            <div className="day-num font-bold text-slate-400 text-xs">{d}</div>
                            <div className="space-y-0.5">
                                {dData.rx > 0 && <div className="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded-sm font-bold truncate">Rx: {dData.rx}</div>}
                                {dData.err > 0 && <div className="text-[9px] bg-red-100 text-red-700 px-1 rounded-sm font-bold truncate">Err: {dData.err}</div>}
                            </div>
                        </div>
                    );
                }
                return grid;
            };

            if (isLoading && data.history.length === 0) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4">
                    <div className="w-12 h-12 border-4 border-slate-200 border-t-slate-600 rounded-full animate-spin"></div>
                    <div className="font-bold text-slate-500 animate-pulse">กำลังโหลดข้อมูล Dashboard...</div>
                </div>
            );

            return (
                <div className={`${theme.bgApp} min-h-screen pb-24 transition-colors duration-500`}>
                    <header className="bg-white/90 backdrop-blur-md pt-8 pb-0 px-4 border-b border-slate-200 text-center sticky top-0 z-50 shadow-sm">

                                            {Object.keys(stats.counts.drug).length===0 && <span className="text-xs text-slate-300 font-bold italic">-- ไม่มีข้อมูลรายการยา --</span>}
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {/* Corrected Individual Cumulative Incident Labels */}
                                        <div className="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm">
                                            <h4 className="text-[11px] font-black text-slate-400 uppercase mb-5 tracking-widest">อุบัติการณ์สะสมรายบุคคล (ผู้สั่งใช้ยา/รคส.)</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.entries(stats.counts.nurse).map(([n,c])=>(
                                                    <div key={n} className="flex items-center gap-3 border border-slate-100 bg-slate-50/50 px-3 py-1.5 rounded-xl text-[10px] font-black">
                                                        <span className="text-slate-500">{n}</span>
                                                        <span className="bg-white border text-slate-800 px-2 rounded-lg shadow-sm">{c}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-white p-7 rounded-3xl border border-slate-100 shadow-sm">
                                            <h4 className="text-[11px] font-black text-slate-400 uppercase mb-5 tracking-widest">อุบัติการณ์สะสมรายบุคคล (ผู้ตรวจเช็ค)</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {Object.entries(stats.counts.doc).map(([n,c])=>(
                                                    <div key={n} className="flex items-center gap-3 border border-slate-100 bg-slate-50/50 px-3 py-1.5 rounded-xl text-[10px] font-black">
                                                        <span className="text-slate-500">{n}</span>
                                                        <span className="bg-white border text-slate-800 px-2 rounded-lg shadow-sm">{c}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-md animate-fadeIn">
                            <div className={`${theme.btnSubmit} px-12 py-10 rounded-[40px] text-white text-center shadow-2xl scale-110 border border-white/20 animate-bounce`}>
                                <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                                    <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h3 className="text-3xl font-black mb-2">บันทึกสำเร็จ!</h3>
                                <p className="text-white/80 font-bold text-sm">ข้อมูลถูกบันทึกใน {systemMode} Database แล้ว</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
