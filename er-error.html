<html lang="th">

    <title>ศูนย์จัดการอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
        /* บังคับ Font ทั้ง Body ให้เป็น Noto Sans Thai */
        body { 
            font-family: 'Noto Sans Thai', sans-serif !important;

</head>
<body class="font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyWAbFSTICYEwz0cdNLSRtYP68aFLaDSPrOwqQiXQrSmz-pwXKwHPpyQDtzkapw_mLenw/exec";

        const erErrorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];
        const erRiskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F", "G", "H", "I"];
        const erActions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];
        const mrDepartments = ['OPD', 'ER', 'IPDชาย', 'IPDหญิง', 'LR', 'อื่นๆ'];
        const mrPolicies = ['HAD', 'LASA', 'ADR', 'Med reconcile', 'DI'];

        const THAI_MONTHS = [
            "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
            "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
        ];

        // Component Icon สำหรับปุ่มวาง (Paste)
        const PasteIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
        );

        const normalizeDateToISO = (v) => {
            if (!v) return '';
            let strVal = String(v).split('T')[0];
            let parts = strVal.split('-');
            if (parts.length >= 3) {
                let y = parseInt(parts[0]);
                if (y > 2500) y -= 543; 
                return `${y}-${parts[1].padStart(2,'0')}-${parts[2].substring(0,2).padStart(2,'0')}`;
            }
            const d = new Date(v);
            if (!isNaN(d.getTime())) {
                let y = d.getFullYear();
                if (y > 2500) y -= 543;
                return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            return strVal;
        };

        const formatDisplayDate = (v) => {
            if (!v) return '-';
            const [y, m, d] = normalizeDateToISO(v).split('-');
            return `${d}/${m}/${parseInt(y) + 543}`;
        };

        const formatThaiFullDate = (iso) => {
            if(!iso) return '';
            const [y, m, d] = iso.split('-');
            return `${parseInt(d)} ${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatThaiMonthYear = (isoMonth) => {
            if(!isoMonth) return '';
            const [y, m] = isoMonth.split('-');
            return `${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatTime = (t) => {
            if (!t) return '00:00';
            const s = String(t);
            if (s.includes('T')) return s.split('T')[1].substring(0, 5);
            const p = s.split(':');
            if (p.length >= 2) return `${String(p[0]).padStart(2, '0')}:${String(p[1]).padStart(2, '0')}`;
            return '00:00';
        };

        Chart.register(ChartDataLabels);

        const App = () => {
            const [systemMode, setSystemMode] = useState('ER');
            const [activeTab, setActiveTab] = useState('form');
            const [viewMode, setViewMode] = useState('table');
            const [isLoading, setIsLoading] = useState(true);
            const [isPdfReady, setIsPdfReady] = useState(false);
            
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [], errorCategories: [], lastId: 0 });
            
            const initialFormState = {
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: '-', totalErrors: '-',
                errorType: erErrorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: '',
                mrType: '', mrError: '', drug1: '', drug2: '', qty: '', department: '', policy: []
            };

            const [form, setForm] = useState(initialFormState);

            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugDropdownOpen, setIsDrugDropdownOpen] = useState(false);
            const [isDrug1Open, setIsDrug1Open] = useState(false);
            const [isDrug2Open, setIsDrug2Open] = useState(false);
            
            const [erDrugSearch, setErDrugSearch] = useState('');
            const [mrDrug1Search, setMrDrug1Search] = useState('');
            const [mrDrug2Search, setMrDrug2Search] = useState('');
            
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);

            // ตัวกรอง (Filters)
            const [filterType, setFilterType] = useState('month');
            const [filterDateStart, setFilterDateStart] = useState(() => {
                const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
            });
            const [filterDateEnd, setFilterDateEnd] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);
            const [filterPolicy, setFilterPolicy] = useState('All'); // ตัวกรองนโยบาย (เฉพาะ MR)

            // Ref สำหรับ Chart.js
            const chartsRef = useRef({ type: null, pharma: null, bar: null, dept: null, sev: null });
            const canvasRefs = { type: useRef(null), pharma: useRef(null), bar: useRef(null), dept: useRef(null), sev: useRef(null) };
            
            const lastAutoText = useRef('');

            const theme = useMemo(() => ({
                bgApp: systemMode === 'ER' 
                    ? 'bg-gradient-to-br from-rose-950 via-red-900 to-red-950' 
                    : 'bg-gradient-to-br from-teal-950 via-emerald-900 to-teal-950',
                primaryStr: systemMode === 'ER' ? '#e11d48' : '#059669',
                btnColorStr: systemMode === 'ER' ? 'bg-red-500' : 'bg-emerald-500',
                btnActiveClass: systemMode === 'ER' 
                    ? 'bg-red-600 text-white font-bold border-red-600 shadow-md scale-105' 
                    : 'bg-emerald-600 text-white font-bold border-emerald-600 shadow-md scale-105',
                btnInactiveClass: 'bg-white text-slate-500 border-slate-200 hover:border-slate-300 hover:bg-slate-50',
                lightBg: systemMode === 'ER' ? 'bg-red-50/50' : 'bg-teal-50/50',
                btnSubmit: systemMode === 'ER' ? 'bg-red-600 hover:bg-red-700 shadow-red-600/30' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/30',
                tabActive: systemMode === 'ER' ? 'bg-white text-red-600 font-black shadow-lg rounded-t-2xl' : 'bg-white text-emerald-600 font-black shadow-lg rounded-t-2xl',
                tabInactive: 'bg-black/20 text-white/60 hover:bg-black/40 hover:text-white rounded-t-2xl font-bold backdrop-blur-sm transition-all'
            }), [systemMode]);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const r = await fetch(GAS_URL);
                    const j = await r.json();
                    if(j.history) setData(j);
                } catch(e) { console.error("Fetch failed", e); }
                setIsLoading(false);
            };

            useEffect(() => {
                const init = async () => {
                    try {
                        const getB64 = async (u) => {
                            const r = await fetch(u);
                            const ab = await r.arrayBuffer();
                            let b = '';
                            const by = new Uint8Array(ab);
                            for(let i=0; i<by.length; i++) b += String.fromCharCode(by[i]);
                            return window.btoa(b);
                        };
                        const [reg, bld] = await Promise.all([
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Regular.ttf'),
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Bold.ttf')
                        ]);
                        window.pdfMake.vfs = { ...window.pdfMake.vfs, 'SR.ttf': reg, 'SB.ttf': bld };
                        window.pdfMake.fonts = { Sarabun: { normal: 'SR.ttf', bold: 'SB.ttf' } };
                        setIsPdfReady(true);
                    } catch(e) { console.error("PDF Font failed", e); }
                    await fetchData();
                };
                init();
            }, []);

            const handleModeChange = (mode) => {
                if (mode !== systemMode) {
                    setSystemMode(mode);
                    setActiveTab('form');
                    setFilterPolicy('All');
                    setForm(prev => ({
                        ...initialFormState,
                        date: prev.date,
                        time: prev.time
                    }));
                }
            };

            const handleDateChange = (e) => {
                const newDate = e.target.value;
                setForm(prev => ({
                    ...initialFormState,
                    date: newDate,
                    time: prev.time,
                    errorType: erErrorOptions[0]
                }));
            };

            useEffect(() => { if (!isDrugDropdownOpen) setErDrugSearch(''); }, [isDrugDropdownOpen]);
            useEffect(() => { if (!isDrug1Open) setMrDrug1Search(''); }, [isDrug1Open]);
            useEffect(() => { if (!isDrug2Open) setMrDrug2Search(''); }, [isDrug2Open]);

            useEffect(() => {
                if (systemMode === 'ER') {
                    const [h, m] = form.time.split(':').map(Number);
                    const d = new Date(form.date);
                    let sD, sM, sY, eD;
                    
                    if (h < 8) {
                        const p = new Date(d); p.setDate(p.getDate() - 1);
                        sD = p.getDate(); eD = d.getDate();
                        sM = String(p.getMonth() + 1).padStart(2, '0');
                        sY = p.getFullYear();
                    } else {
                        const n = new Date(d); n.setDate(n.getDate() + 1);
                        sD = d.getDate(); eD = n.getDate();
                        sM = String(d.getMonth() + 1).padStart(2, '0');
                        sY = d.getFullYear();
                    }
                    
                    const calcShiftDate = `${sD}-${eD}/${sM}/${sY}`;
                    const cleanStr = (s) => String(s || '').replace(/\s+/g, '');
                    const targetShift = cleanStr(calcShiftDate);
                    
                    const shiftItems = data.history.filter(h => {
                        const isER = (h.systemMode === 'ER' || !h.systemMode);
                        const hShift = cleanStr(h.shiftDate || h['วันที่'] || h['กะ']); 
                        return isER && hShift === targetShift;
                    });
                    
                    const shiftRx = shiftItems.find(h => h.totalRx || h['จำนวนใบสั่งยา'] || h['ใบสั่งยารวม']);
                    const rxVal = shiftRx ? (shiftRx.totalRx || shiftRx['จำนวนใบสั่งยา'] || shiftRx['ใบสั่งยารวม']) : '';
                    
                    const errs = shiftItems.filter(h => {
                        const errType = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                        return errType && errType !== erErrorOptions[0] && errType !== '❌ไม่พบ Error';
                    }).length;
                    
                    const isErr = form.errorType !== erErrorOptions[0] && form.errorType !== '❌ไม่พบ Error';
                    
                    setForm(p => ({
                        ...p,
                        shiftDate: calcShiftDate,
                        totalRx: rxVal || p.totalRx, 
                        sequence: isErr ? errs + 1 : '-',
                        totalErrors: isErr ? errs + 1 : '-'
                    }));
                    setIsTotalRxLocked(!!rxVal);
                }
            }, [form.date, form.time, data.history, form.errorType, systemMode]);

            useEffect(() => {
                let currentHNStr = `HN ${form.hn || '.....'}`;
                let baseText = '';
                
                if (systemMode === 'ER') {
                    if (form.errorType !== erErrorOptions[0]) baseText += ` ${form.errorType}`;
                    if (form.selectedDrugs.length > 0) baseText += ` ได้แก่ยา ${form.selectedDrugs.join(', ')}`;
                } else {
                    if (form.mrError) baseText += ` ${form.mrError}`;
                    if (form.drug1) baseText += ` คือยา ${form.drug1}`;
                    if (form.drug2) baseText += ` จัดผิดเป็น ${form.drug2}`;
                    if (form.qty) baseText += ` จำนวน ${form.qty} เม็ด`;
                }

                const newAutoText = (currentHNStr + baseText).trim();

                setForm(p => {
                    // หากข้อความเหมือนเดิมเป๊ะ ไม่ต้องทำอะไร
                    if (p.details === newAutoText) return p;

                    // เขียนทับหากช่องรายละเอียดยังว่างอยู่ หรือผู้ใช้ไม่ได้แก้ทับระบบที่เรา Gen ให้
                    if (!p.details || p.details === lastAutoText.current) {
                        lastAutoText.current = newAutoText;
                        return { ...p, details: newAutoText };
                    }

                    // หากผู้ใช้พิมพ์ข้อความไว้เองแล้ว เราจะอัปเดตแค่เลข HN อย่างเดียว
                    const updatedDetails = p.details.replace(/^HN\s\S+/, currentHNStr);
                    if (updatedDetails !== p.details) {
                        return { ...p, details: updatedDetails };
                    }

                    return p;
                });
            }, [form.hn, form.errorType, form.mrError, form.selectedDrugs, form.drug1, form.drug2, form.qty, systemMode]);

            const baseFiltered = useMemo(() => {
                if (!data.history) return [];
                return data.history.filter(item => {
                    const matchMode = item.systemMode === systemMode || (!item.systemMode && systemMode === 'ER');
                    const itemDate = item.date || item['Date'] || item['Timestamp'] || item['วันที่']; 
                    const iso = normalizeDateToISO(itemDate);
                    const matchDate = filterType === 'day' ? (iso >= filterDateStart && iso <= filterDateEnd) : iso.startsWith(filterMonth);
                    const matchSearch = String(item.hn || item['HN'] || '').includes(searchTerm) || 
                                      String(item.details || item['รายละเอียด'] || '').toLowerCase().includes(searchTerm.toLowerCase());
                    
                    const matchPolicy = filterPolicy === 'All' ? true : String(item.policy || item['นโยบายยา'] || '').includes(filterPolicy);
                    
                    return matchMode && matchDate && matchSearch && matchPolicy;
                });
            }, [data.history, systemMode, filterType, filterDateStart, filterDateEnd, filterMonth, searchTerm, filterPolicy]);

            const displayList = useMemo(() => baseFiltered.filter(i => {
                const errVal = i.errorType || i['ความเสี่ยงที่พบ'] || i['ความเสี่ยง'] || i['Error'] || i.error || i['รายการ Error'] || '';
                const isNoErr = (errVal === erErrorOptions[0]) || (errVal === '');
                return !(excludeNoError && isNoErr);
            }), [baseFiltered, excludeNoError]);

            const stats = useMemo(() => {
                const daily = {};
                let totalRxCount = 0;
                const seenShifts = new Set();

                const counts = { type: {}, pharma: {}, doc: {}, nurse: {}, drug: {}, dept: {}, policy: {}, sev: {} };

                baseFiltered.forEach(h => {
                    const itemDate = h.date || h['Date'] || h['Timestamp'] || h['วันที่'];
                    const iso = normalizeDateToISO(itemDate);
                    if (!daily[iso]) daily[iso] = { rx: 0, err: 0 };
                    
                    if (systemMode === 'ER') {
                        const shiftVal = h.shiftDate || h['วันที่'] || h['กะ']; 
                        const rxVal = h.totalRx || h['จำนวนใบสั่งยา'] || h['ใบสั่งยารวม'];
                        const shiftId = shiftVal ? `${shiftVal}` : null;
                        if (rxVal && shiftId && !seenShifts.has(shiftId)) {
                            seenShifts.add(shiftId);
                            totalRxCount += parseInt(rxVal) || 0;
                            daily[iso].rx += parseInt(rxVal) || 0;
                        }
                    }
                    
                    const errVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                    const isErr = errVal && errVal !== erErrorOptions[0] && errVal !== '';
                    if (isErr) daily[iso].err += 1;

                    if (isErr) {
                        const typeLabel = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || h.type || h['ความคลาดเคลื่อน'];
                        if(typeLabel) counts.type[typeLabel] = (counts.type[typeLabel] || 0) + 1;
                        
                        const recorderLabel = h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'];
                        if(recorderLabel) counts.pharma[recorderLabel] = (counts.pharma[recorderLabel] || 0) + 1;

                        const sevLabel = h.severity || h['ระดับความรุนแรง'] || h['ระดับ'];
                        if(sevLabel) counts.sev[sevLabel] = (counts.sev[sevLabel] || 0) + 1;

                        if (systemMode === 'ER') {
                            const doctorLabel = h.doctor || h['รคส.'] || h['แพทย์'] || h['พยาบาล'];
                            if(doctorLabel) counts.nurse[doctorLabel] = (counts.nurse[doctorLabel] || 0) + 1;
                            const inspectorLabel = h.inspector || h['ผู้ตรวจ'] || h['ผู้ตรวจเช็ค'] || h['แพทย์'];
                            if(inspectorLabel) counts.doc[inspectorLabel] = (counts.doc[inspectorLabel] || 0) + 1;
                        } else {
                            const deptLabel = h.department || h['หน่วยงานที่เกิด'];
                            if(deptLabel) counts.dept[deptLabel] = (counts.dept[deptLabel] || 0) + 1;
                            
                            const polLabel = h.policy || h['นโยบายยา'];
                            if(polLabel) {
                                polLabel.split(',').forEach(p => {
                                    const pl = p.trim(); if(pl) counts.policy[pl] = (counts.policy[pl] || 0) + 1;
                                });
                            }
                        }
                        
                        const drugStr = h.drugs || h['ยาที่เกี่ยวข้อง'] || h['รายการยา'] || h.drug1 || h['ยา/ความแรงที่เกี่ยวข้อง(1)'];
                        if(drugStr) drugStr.split(',').forEach(d => {
                            const dr = d.trim(); if(dr) counts.drug[dr] = (counts.drug[dr] || 0) + 1;
                        });
                    }
                });

                const errors = baseFiltered.filter(h => {
                    const eVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                    return eVal && eVal !== erErrorOptions[0] && eVal !== '';
                });

                return { rx: totalRxCount, err: errors.length, pct: totalRxCount > 0 ? ((errors.length/totalRxCount)*100).toFixed(2) : '0.00', counts, daily };
            }, [baseFiltered, systemMode]);

            useEffect(() => {
                if (activeTab === 'history' && !isLoading) {
                    const opt = { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, family: "'Noto Sans Thai', sans-serif" } } },
                            datalabels: { color: '#fff', font: { weight: 'bold', size: 11 }, formatter: v => v > 0 ? v : '' } 
                        } 
                    };
                    
                    if (canvasRefs.bar.current && systemMode === 'ER') {
                        if (chartsRef.current.bar) chartsRef.current.bar.destroy();
                        const sorted = Object.keys(stats.daily).sort();
                        chartsRef.current.bar = new Chart(canvasRefs.bar.current, {
                            type: 'bar', data: {
                                labels: sorted.map(d => formatDisplayDate(d)),
                                datasets: [
                                    { label: 'ปกติ (ไม่มี Error)', data: sorted.map(d => Math.max(0, stats.daily[d].rx - stats.daily[d].err)), backgroundColor: '#10b981', stack: 'a', borderRadius: 4 },
                                    { label: 'Error', data: sorted.map(d => stats.daily[d].err), backgroundColor: '#ef4444', stack: 'a', borderRadius: 4 }
                                ]
                            }, options: { ...opt, scales: { x: { stacked: true }, y: { stacked: true } } }
                        });
                    }

                    if (canvasRefs.type.current) {
                        if (chartsRef.current.type) chartsRef.current.type.destroy();
                        const dataVals = Object.values(stats.counts.type);
                        if(dataVals.length > 0) {
                            chartsRef.current.type = new Chart(canvasRefs.type.current, {
                                type: 'doughnut', data: { labels: Object.keys(stats.counts.type), datasets: [{ data: dataVals, backgroundColor: ['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6','#6366f1','#ec4899'], borderWidth: 0 }] },
                                options: { ...opt, cutout: '65%' }
                            });
                        }
                    }

                    if (canvasRefs.pharma.current) {
                        if (chartsRef.current.pharma) chartsRef.current.pharma.destroy();
                        const pVals = Object.values(stats.counts.pharma);
                        if(pVals.length > 0) {
                            chartsRef.current.pharma = new Chart(canvasRefs.pharma.current, {
                                type: 'pie', data: { labels: Object.keys(stats.counts.pharma), datasets: [{ data: pVals, backgroundColor: ['#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#f43f5e'], borderWidth: 0 }] },
                                options: opt
                            });
                        }
                    }

                    if (systemMode === 'MR') {
                        if (canvasRefs.dept.current) {
                            if (chartsRef.current.dept) chartsRef.current.dept.destroy();
                            const dVals = Object.values(stats.counts.dept);
                            if(dVals.length > 0) {
                                chartsRef.current.dept = new Chart(canvasRefs.dept.current, {
                                    type: 'pie', data: { labels: Object.keys(stats.counts.dept), datasets: [{ data: dVals, backgroundColor: ['#0ea5e9', '#3b82f6', '#6366f1', '#a855f7', '#d946ef', '#f43f5e'], borderWidth: 0 }] },
                                    options: opt
                                });
                            }
                        }
                        if (canvasRefs.sev.current) {
                            if (chartsRef.current.sev) chartsRef.current.sev.destroy();
                            const sVals = Object.values(stats.counts.sev);
                            if(sVals.length > 0) {
                                chartsRef.current.sev = new Chart(canvasRefs.sev.current, {
                                    type: 'pie', data: { labels: Object.keys(stats.counts.sev), datasets: [{ data: sVals, backgroundColor: ['#84cc16', '#eab308', '#f97316', '#ef4444', '#b91c1c'], borderWidth: 0 }] },
                                    options: opt
                                });
                            }
                        }
                    }
                }
            }, [activeTab, stats, isLoading, systemMode]);

            const handlePaste = async (field) => {
                try {
                    const text = await navigator.clipboard.readText();
                    setForm(p => ({ ...p, [field]: text }));
                } catch (err) {
                    console.error('Clipboard access denied');
                }
            };

            const genPDF = () => {
                if(!isPdfReady) return;
                
                const dateSummary = filterType === 'day' 
                    ? `ตั้งแต่ ${formatThaiFullDate(filterDateStart)} ถึง ${formatThaiFullDate(filterDateEnd)}`

                let body = [];
                let colWidths = [];

                if (systemMode === 'ER') {
                    colWidths = [18, '7%', '5%', '14%', '*', '9%', 24, '13%', '7%', '7%', 48];
                    body.push([
                        { text: 'ที่', style: 'th' }, { text: 'วันที่', style: 'th' }, { text: 'เวลา', style: 'th' },
                        { text: 'ความเสี่ยงที่พบ', style: 'th' }, { text: 'รายละเอียด', style: 'th' },
                        { text: 'Risk Type', style: 'th' }, { text: 'ระดับ', style: 'th' },
                        { text: 'การแก้ไข', style: 'th' }, { text: 'แพทย์', style: 'th' },
                        { text: 'พยาบาล', style: 'th' }, { text: 'ผู้บันทึก', style: 'th' }
                    ]);

                    displayList.forEach((h, i) => {
                        const errVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h.error || h['รายการ Error'] || h['Error'] || '-';
                        const isNoErr = !errVal || errVal === erErrorOptions[0];
                        body.push([
                            { text: i+1, alignment: 'center' },
                            { text: formatDisplayDate(h.date || h['Date'] || h['วันที่']), alignment: 'center', noWrap: true },
                            { text: formatTime(h.time || h['เวลา (น.)'] || h['เวลา']), alignment: 'center', noWrap: true },
                            { text: errVal, color: isNoErr ? '#10b981' : theme.primaryStr, bold: true },
                            { text: h.details || h['รายละเอียด'] || '-', fontSize: 8 },
                            { text: h.riskType || h['ประเภทของความเสี่ยง'] || h['ประเภทความเสี่ยง'] || h.type || h['ความคลาดเคลื่อน'] || '-', fontSize: 8 },
                            { text: h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-', alignment: 'center', bold: true },
                            { text: h.action || h['การแก้ไข'] || '-', fontSize: 8 },
                            { text: h.inspector || h['ผู้ตรวจ'] || h['ผู้ตรวจเช็ค'] || h['แพทย์'] || '-', fontSize: 8 },
                            { text: h.doctor || h['รคส.'] || h['แพทย์'] || h['พยาบาล'] || '-', fontSize: 8 },
                            { text: (h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'] || '').substring(0, 10), alignment: 'center' }

                    });
                } else {
                    colWidths = [18, '7%', '10%', '12%', '*', '9%', 24, '10%', '12%', '8%', 45];
                    body.push([
                        { text: 'ที่', style: 'th' }, { text: 'วันที่', style: 'th' }, { text: 'ความคลาดเคลื่อน', style: 'th' },
                        { text: 'Error', style: 'th' }, { text: 'รายละเอียด', style: 'th' },
                        { text: 'หน่วยงาน', style: 'th' }, { text: 'ระดับ', style: 'th' },
                        { text: 'นโยบายยา', style: 'th' }, { text: 'ยา(1)', style: 'th' },
                        { text: 'แพทย์', style: 'th' }, { text: 'เภสัชกร', style: 'th' }
                    ]);

                    displayList.forEach((h, i) => {
                        body.push([
                            { text: h.id || h['ลำดับที่'] || i+1, alignment: 'center' },
                            { text: formatDisplayDate(h.date || h['วันที่'] || h['Date']), alignment: 'center', noWrap: true },
                            { text: h.type || h['ความคลาดเคลื่อน'] || '-', fontSize: 8, bold: true },
                            { text: h.error || h['Error'] || h['รายการ Error'] || '-', color: theme.primaryStr, bold: true },
                            { text: h.details || h['รายละเอียด'] || '-', fontSize: 8 },
                            { text: h.department || h['หน่วยงานที่เกิด'] || '-', fontSize: 8, alignment: 'center' },
                            { text: h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-', alignment: 'center', bold: true },
                            { text: h.policy || h['นโยบายยา'] || '-', fontSize: 8 },
                            { text: h.drug1 || h['ยา/ความแรงที่เกี่ยวข้อง(1)'] || h.drugs || '-', fontSize: 8 },
                            { text: h.doctor || h['แพทย์'] || '-', fontSize: 8 },
                            { text: (h.recorder || h['เภสัชกร'] || '').substring(0, 10), alignment: 'center' }
                        ]);
                    });
                }

                const doc = {
                    pageSize: 'A4', pageOrientation: 'landscape', pageMargins: [20, 20, 20, 30],
                    defaultStyle: { font: 'Sarabun', fontSize: 9, lineHeight: 1.1 },
                    styles: { th: { bold: true, alignment: 'center', fillColor: '#f1f5f9' } },
                    content: [
                        { text: `รายงานสรุป ${systemMode} Medication Errors`, fontSize: 16, bold: true, alignment: 'center', color: theme.primaryStr, margin: [0,0,0,2] },
                        { text: dateSummary, fontSize: 12, alignment: 'center', margin: [0,0,0,4], bold: true },
                        { text: systemMode === 'ER' ? `จำนวนใบสั่งยา ${stats.rx.toLocaleString()} ใบ  จำนวน Errors ${stats.err.toLocaleString()} ใบ (${stats.pct}%)` : `จำนวนอุบัติการณ์ทั้งหมด ${stats.err.toLocaleString()} รายการ`, fontSize: 11, alignment: 'center', margin: [0,0,0,10] },
                        { 
                            table: { 
                                headerRows: 1, 
                                widths: colWidths, 
                                body 
                            }, 
                            layout: { 
                                hLineWidth: () => 0.5, vLineWidth: () => 0.5, 
                                hLineColor: () => '#94a3b8', vLineColor: () => '#94a3b8', 
                                paddingLeft: () => 3, paddingRight: () => 3, paddingTop: () => 4, paddingBottom: () => 4 
                            }
                        }
                    ],
                    footer: (c, p) => ({ text: `หน้า ${c} จาก ${p}`, alignment: 'center', fontSize: 8, margin: [0, 10] })
                };
                pdfMake.createPdf(doc).open();
            };

            // เอฟเฟกต์สำหรับนับเวลาถอยหลังเพื่อปิดหน้าต่าง Modal
            useEffect(() => {
                let timer;
                if (showModal) {
                    timer = setTimeout(() => setShowModal(false), 3000); // 3 วินาทีปิดอัตโนมัติ
                }
                return () => clearTimeout(timer);
            }, [showModal]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const payload = systemMode === 'ER' 
                        ? { ...form, systemMode, drugs: form.selectedDrugs.join(', ') }
                        : { ...form, systemMode, type: form.mrType, error: form.mrError, policy: form.policy.join(', ') };
                    
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await res.json();
                    if(json.status === 'success') {
                        await fetchData();
                        // Reset Form แบบหมดจดสำหรับการกรอกครั้งใหม่
                        setForm(p => ({ ...p, errorType: erErrorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '', mrType: '', mrError: '', drug1: '', drug2: '', qty: '', policy: [], department: '' }));
                        lastAutoText.current = ''; 
                        setShowModal(true);
                    }
                } catch(e) { console.error(e); }
                setIsSubmitting(false);
            };

            const renderCalendar = () => {
                const [y, m] = filterMonth.split('-').map(Number);
                const first = new Date(y, m - 1, 1).getDay();
                const days = new Date(y, m, 0).getDate();
                const grid = [];
                for(let i=0; i<first; i++) grid.push(<div key={`e-${i}`} className="calendar-day bg-slate-50/40"></div>);
                for(let d=1; d<=days; d++) {
                    const iso = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dData = stats.daily[iso] || { rx: 0, err: 0 };
                    grid.push(
                        <div key={d} className="calendar-day border-t border-l border-slate-100 flex flex-col justify-between hover:bg-slate-50 transition-colors">
                            <div className="day-num font-bold text-slate-400 text-sm">{d}</div>
                            <div className="space-y-0.5">
                                {dData.rx > 0 && systemMode === 'ER' && <div className="text-[10px] bg-emerald-100 text-emerald-700 px-1 rounded-sm font-bold truncate">Rx: {dData.rx}</div>}
                                {dData.err > 0 && <div className="text-[10px] bg-red-100 text-red-700 px-1 rounded-sm font-bold truncate">Err: {dData.err}</div>}
                            </div>
                        </div>
                    );
                }
                return grid;
            };

            if (isLoading && data.history.length === 0) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4 bg-slate-900">
                    <div className="w-12 h-12 border-4 border-slate-700 border-t-white rounded-full animate-spin"></div>
                    <div className="font-bold text-white/50 animate-pulse tracking-widest text-sm">กำลังเชื่อมต่อฐานข้อมูล...</div>
                </div>
            );

            return (
                <div className={`${theme.bgApp} min-h-screen pb-24 transition-colors duration-700 font-sans`}>
                    
                    <header className="pt-8 pb-4 text-center">
                        <h1 className="text-3xl md:text-4xl font-black text-white drop-shadow-lg tracking-tight">ศูนย์จัดการอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</h1>
                    </header>

                    <main className="max-w-6xl mx-auto relative mt-2 px-2 md:px-0">
                        
                        <div className="flex max-w-[320px] md:max-w-md mx-auto px-4 translate-y-[1px] relative z-10 gap-1">
                            <button onClick={()=>handleModeChange('ER')} 
                                className={`flex-1 py-3 px-2 text-base md:text-lg border border-b-0 
                                ${systemMode === 'ER' ? theme.tabActive : theme.tabInactive}`}>
                                ER ERRORs
                            </button>
                            <button onClick={()=>handleModeChange('MR')} 
                                className={`flex-1 py-3 px-2 text-base md:text-lg border border-b-0 
                                ${systemMode === 'MR' ? theme.tabActive : theme.tabInactive}`}>
                                MR ERRORs
                            </button>
                        </div>

                        {/* กล่องเนื้อหาหลัก */}
                        <div className="bg-white rounded-3xl md:rounded-[40px] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] p-5 md:p-10 relative z-20 mx-1 md:mx-4">
                            
                            <button 
                                onClick={() => setActiveTab(activeTab === 'form' ? 'history' : 'form')}
                                className="absolute top-4 right-4 md:top-6 md:right-6 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs md:text-sm font-bold shadow-sm transition-all flex items-center gap-1.5 z-30 border border-slate-200"
                            >
                                {activeTab === 'form' ? '📊 ดูรายงานสถิติ' : '📝 กลับไปบันทึกข้อมูล'}
                            </button>

                            {activeTab === 'form' ? (
                                <form onSubmit={handleSubmit} className="space-y-4 md:space-y-5 animate-fadeIn max-w-4xl mx-auto mt-6 md:mt-2">
                                    
                                    {/* Top Section */}
                                    {systemMode === 'ER' ? (
                                        <div className={`${theme.lightBg} p-4 md:p-5 rounded-3xl flex flex-wrap gap-4 items-center border border-slate-100/50 shadow-inner`}>
                                            <div className="flex-1 min-w-[140px]">
                                                <label className="text-xs md:text-sm font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">วันที่พบ</label>
                                                <input type="date" value={form.date} onChange={handleDateChange} className="w-full compact-input font-bold text-base !py-2.5" required />
                                            </div>
                                            <div className="flex-1 min-w-[110px]">
                                                <label className="text-xs md:text-sm font-bold text-slate-500 mb-1.5 block uppercase tracking-wide">เวลา</label>
                                                <input type="time" value={form.time} onChange={e=>setForm({...form, time: e.target.value})} className="w-full compact-input font-bold text-base !py-2.5" required />
                                            </div>
                                            <div className="flex-[2] min-w-[280px] bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                                                <div>
                                                    <div className={`text-sm md:text-base font-black uppercase`} style={{color: theme.primaryStr}}>เวรจ่ายยา: {form.shiftDate}</div>
                                                    <div className="flex items-center gap-3 mt-1.5">
                                                        <span className="text-xs md:text-sm font-bold text-slate-400">ใบสั่งยารวม:</span>
                                                        <input type="number" value={form.totalRx} onChange={e=>setForm({...form, totalRx: e.target.value})} disabled={isTotalRxLocked} className="w-24 compact-input text-center font-black !py-1 !px-2 border-slate-300 bg-slate-50 text-base" required />
                                                        {isTotalRxLocked && <button type="button" onClick={()=>setIsTotalRxLocked(false)} className="text-xs md:text-sm text-blue-500 hover:text-blue-600 font-bold underline">แก้ไข</button>}

                                                </div>
                                                <div className="text-right border-l border-slate-100 pl-4 md:pl-5">
                                                    <div className="text-xs font-bold text-slate-400 uppercase">ลำดับที่</div>
                                                    <div className="text-2xl md:text-3xl font-black">{form.sequence} <span className="text-slate-200 text-xl">/</span> <span style={{color: theme.primaryStr}}>{form.totalErrors}</span></div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        // บรรทัด 1 ของ MR
                                        <div className={`${theme.lightBg} p-4 md:p-5 rounded-3xl grid grid-cols-1 md:grid-cols-4 gap-4 items-end border border-emerald-100/50 shadow-inner`}>
                                            <div className="md:col-span-1">
                                                <label className="text-xs md:text-sm font-black text-emerald-700 uppercase mb-1.5 block">วันที่พบ</label>
                                                <input type="date" value={form.date} onChange={handleDateChange} className="w-full compact-input font-bold text-sm md:text-base border-emerald-200 focus:ring-2 focus:ring-emerald-100 !py-2.5" required />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="text-xs md:text-sm font-black text-emerald-700 uppercase mb-1.5 block">HN ผู้ป่วย</label>
                                                <div className="flex gap-2">
                                                    <input type="text" value={form.hn} onChange={e=>setForm({...form, hn: e.target.value})} className="w-full compact-input font-bold text-sm md:text-base border-emerald-200 focus:ring-2 focus:ring-emerald-100 !py-2.5" placeholder="000XXX" required />
                                                    <button type="button" onClick={()=>handlePaste('hn')} className="px-4 bg-white text-emerald-600 rounded-xl text-xs font-bold hover:bg-emerald-50 border border-emerald-200 transition-colors flex items-center justify-center shadow-sm" title="วางข้อมูล HN จากคลิปบอร์ด"><PasteIcon /></button>
                                                </div>
                                            </div>
                                            <div className="md:col-span-1 h-[46px] bg-white px-4 rounded-xl border border-emerald-200 shadow-sm flex items-center justify-between">
                                                <span className="text-[10px] md:text-xs font-black text-slate-400 uppercase tracking-widest">Error ID:</span>
                                                <span className="text-xl md:text-2xl font-black text-emerald-600 leading-none">{data.lastId + 1}</span>
                                            </div>
                                        </div>

                                    {/* ER FORM SECTION */}
                                    {systemMode === 'ER' && (
                                        <div className="space-y-4 md:space-y-5 animate-fadeIn">

                                                <select value={form.errorType} onChange={e=>setForm({...form, errorType: e.target.value})} className={`w-full p-3 md:p-4 text-sm md:text-base font-bold rounded-2xl border-2 transition-all appearance-none cursor-pointer outline-none focus:ring-4 focus:ring-red-100 ${form.errorType === erErrorOptions[0] ? 'border-emerald-200 bg-emerald-50 text-emerald-700' : 'border-red-300 bg-red-50 text-red-800'}`}>
                                                    {erErrorOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                                </select>
                                            </div>

                                            {form.errorType !== erErrorOptions[0] && (
                                                <div className="p-5 md:p-6 bg-slate-50/70 rounded-3xl border border-slate-100 space-y-4 shadow-inner animate-fadeIn">

                                                        <div>
                                                            <label className="text-xs md:text-sm font-bold text-slate-500 mb-1.5 block uppercase">HN ผู้ป่วย</label>
                                                            <div className="flex gap-2">
                                                                <input type="text" value={form.hn} onChange={e=>setForm({...form, hn: e.target.value})} className="w-full compact-input font-bold text-sm md:text-base !py-2" placeholder="ระบุ HN" required />
                                                                <button type="button" onClick={()=>handlePaste('hn')} className="px-3 bg-white border rounded-xl text-slate-500 shadow-sm hover:bg-slate-100 transition-colors flex items-center justify-center" title="วางข้อมูล HN จากคลิปบอร์ด"><PasteIcon /></button>
                                                            </div>
                                                        </div>

                                                            <label className="text-xs md:text-sm font-bold text-slate-500 mb-1.5 block uppercase">ยาที่เกี่ยวข้อง (เลือกได้หลายรายการ)</label>

                                                    <div>
                                                        <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">ใบสั่งยารวม (Rx)</div>
                                                        <div className="text-5xl md:text-6xl font-black tracking-tight">{stats.rx.toLocaleString()}</div>
                                                    </div>
                                                )}
                                                <div className={systemMode === 'ER' ? "border-l border-slate-100 pl-8 md:pl-12" : "col-span-2"}>
                                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Error ที่ตรวจพบ</div>
                                                    <div className="text-5xl md:text-6xl font-black tracking-tight" style={{color: theme.primaryStr}}>{stats.err.toLocaleString()} {systemMode === 'ER' && stats.rx > 0 && <span className="text-xl font-bold text-slate-300 ml-2">({stats.pct}%)</span>}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={genPDF} className={`group flex flex-col items-center justify-center gap-4 rounded-3xl text-white font-black shadow-xl hover:shadow-2xl active:scale-95 transition-all relative overflow-hidden ${theme.btnColorStr}`}>
                                            <svg className="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                            </svg>
                                            <span className="text-sm uppercase tracking-wide font-black">ดาวน์โหลดรายงาน (PDF)</span>
                                        </button>
                                    </div>

                                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100 shadow-sm">
                                        <div className="flex flex-wrap justify-between items-center gap-4 mb-6">
                                            <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">คลังข้อมูลอุบัติการณ์ ({displayList.length})</h3>
                                            <div className="flex flex-wrap items-center gap-5">
                                            <label className="flex items-center gap-2.5 cursor-pointer group">
                                                <input type="checkbox" checked={excludeNoError} onChange={()=>setExcludeNoError(!excludeNoError)} className="sr-only" />
                                                <div className={`w-12 h-6 rounded-full shadow-inner transition-colors relative ${excludeNoError ? 'bg-slate-700' : 'bg-slate-200'}`}>
                                                    <div className={`absolute top-0.5 left-1 bg-white w-5 h-5 rounded-full transition-transform ${excludeNoError ? 'translate-x-5' : 'translate-x-0'}`}></div>
                                                </div>
                                                <span className="text-xs font-bold text-slate-600">ซ่อนบันทึกไม่พบ Error</span>
                                            </label>
                                                {filterType==='month' && (
                                                    <div className="flex bg-slate-100 p-1.5 rounded-xl shadow-inner border border-slate-200">
                                                        <button onClick={()=>setViewMode('table')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${viewMode==='table' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-400'}`}>แบบตาราง</button>
                                                        <button onClick={()=>setViewMode('calendar')} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${viewMode==='calendar' ? 'bg-white shadow-sm text-slate-800' : 'text-slate-400'}`}>แบบปฏิทิน</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {viewMode === 'calendar' && filterType === 'month' ? (
                                            <div className="calendar-grid animate-fadeIn">
                                                {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=><div key={d} className="calendar-header">{d}</div>)}
                                                {renderCalendar()}
                                            </div>
                                        ) : (
                                            <div className="overflow-x-auto border border-slate-100 rounded-2xl max-h-[500px] custom-scrollbar shadow-inner bg-slate-50/30">
                                                <table className="w-full text-left text-xs border-collapse min-w-[1200px]">
                                                    <thead className="bg-white sticky top-0 z-20 shadow-sm">
                                                        <tr>
                                                            {systemMode === 'ER' ? (
                                                                <>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-12 text-center">ลำดับที่</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">วันที่</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-16">เวลา</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-64">ความเสี่ยงที่พบ</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-64">รายละเอียด</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-32">Risk Type</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-16 text-center">ระดับ</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-48">การแก้ไข</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">แพทย์</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">พยาบาล</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">ผู้บันทึก</th>
                                                                </>
                                                            ) : (
                                                                <>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-12 text-center">ID</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">วันที่</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-32">ความคลาดเคลื่อน</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-48">Error</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-64">รายละเอียด</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24 text-center">หน่วยงาน</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-16 text-center">ระดับ</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-32">นโยบายยา</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-32">ยา(1)</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">แพทย์</th>
                                                                    <th className="p-4 font-black uppercase text-slate-400 border-b w-24">เภสัชกร</th>
                                                                </>
                                                            )}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 bg-white">
                                                        {displayList.map((h, i)=>{
                                                            if (systemMode === 'ER') {
                                                                const errVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h.error || h['รายการ Error'] || h['Error'];
                                                                const isNoErr = !errVal || errVal === erErrorOptions[0];
                                                                return (
                                                                    <tr key={i} className="hover:bg-slate-50/80 transition-colors">
                                                                        <td className="p-4 align-top text-center font-bold text-slate-500">{i+1}</td>
                                                                        <td className="p-4 align-top font-black text-slate-700">{formatDisplayDate(h.date || h['Date'] || h['Timestamp'] || h['วันที่'])}</td>
                                                                        <td className="p-4 align-top text-slate-500 font-medium">{formatTime(h.time || h['เวลา (น.)'] || h['เวลา'])}</td>
                                                                        <td className="p-4 align-top">
                                                                            <div className="font-black leading-tight" style={{color: isNoErr ? '#10b981' : theme.primaryStr}}>
                                                                                {errVal || '-'}
                                                                            </div>
                                                                        </td>
                                                                        <td className="p-4 align-top"><div className="text-slate-600 leading-relaxed italic text-[11px]">"{h.details || h['รายละเอียด'] || '-'}"</div></td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.riskType || h['ประเภทของความเสี่ยง'] || h['ประเภทความเสี่ยง'] || h.type || h['ความคลาดเคลื่อน'] || '-'}</td>
                                                                        <td className="p-4 align-top text-center font-black text-slate-700">{h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.action || h['การแก้ไข'] || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.inspector || h['ผู้ตรวจ'] || h['ผู้ตรวจเช็ค'] || h['แพทย์'] || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.doctor || h['รคส.'] || h['แพทย์'] || h['พยาบาล'] || '-'}</td>
                                                                        <td className="p-4 align-top font-black text-slate-700 text-[11px]">{h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'] || '-'}</td>
                                                                    </tr>
                                                                )
                                                            } else {
                                                                return (
                                                                    <tr key={i} className="hover:bg-slate-50/80 transition-colors">
                                                                        <td className="p-4 align-top text-center font-bold text-slate-500">{h.id || h['ลำดับที่'] || i+1}</td>
                                                                        <td className="p-4 align-top font-black text-slate-700">{formatDisplayDate(h.date || h['Date'] || h['Timestamp'] || h['วันที่'])}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px] font-bold">{h.type || h['ความคลาดเคลื่อน'] || '-'}</td>
                                                                        <td className="p-4 align-top">
                                                                            <div className="font-black leading-tight" style={{color: theme.primaryStr}}>{h.error || h['Error'] || h['รายการ Error'] || '-'}</div>
                                                                        </td>
                                                                        <td className="p-4 align-top"><div className="text-slate-600 leading-relaxed italic text-[11px]">"{h.details || h['รายละเอียด'] || '-'}"</div></td>
                                                                        <td className="p-4 align-top text-center font-black text-slate-600 text-[11px]">{h.department || h['หน่วยงานที่เกิด'] || '-'}</td>
                                                                        <td className="p-4 align-top text-center font-black text-slate-700">{h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.policy || h['นโยบายยา'] || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.drug1 || h['ยา/ความแรงที่เกี่ยวข้อง(1)'] || h.drugs || '-'}</td>
                                                                        <td className="p-4 align-top text-slate-600 text-[11px]">{h.doctor || h['แพทย์'] || '-'}</td>
                                                                        <td className="p-4 align-top font-black text-slate-700 text-[11px]">{h.recorder || h['เภสัชกร'] || '-'}</td>
                                                                    </tr>
                                                                )
                                                            }
                                                        })}
                                                        {displayList.length===0 && <tr><td colSpan="11" className="p-20 text-center text-slate-400 font-black text-base uppercase bg-slate-50/50">ไม่พบข้อมูลในระบบ</td></tr>}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>

                                    {systemMode === 'ER' ? (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="md:col-span-2 bg-white p-6 md:p-8 rounded-3xl border border-slate-100 shadow-sm h-[450px] flex flex-col">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                                                    <div className="w-2 h-5 bg-slate-400 rounded-full"></div>แนวโน้มอุบัติการณ์ความคลาดเคลื่อน (ภาพรวมรายวัน)
                                                </h4>
                                                <div className="flex-1 w-full"><canvas ref={canvasRefs.bar}></canvas></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[400px] flex flex-col items-center">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">สัดส่วนอุบัติการณ์แบ่งตามประเภท</h4>
                                                <div className="flex-1 w-full relative"><canvas ref={canvasRefs.type}></canvas></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[400px] flex flex-col items-center">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">จำนวนอุบัติการณ์แบ่งตามผู้บันทึก</h4>
                                                <div className="flex-1 w-full relative"><canvas ref={canvasRefs.pharma}></canvas></div>
                                            </div>
                                        </div>
                                    ) : (
                                        // Dashboard พิเศษสำหรับ MR (4 Pie Charts)
                                        <div className="space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[350px] flex flex-col items-center">
                                                    <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">แบ่งตามชนิดความคลาดเคลื่อน (Type)</h4>
                                                    <div className="flex-1 w-full relative"><canvas ref={canvasRefs.type}></canvas></div>
                                                </div>
                                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[350px] flex flex-col items-center">
                                                    <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">แบ่งตามหน่วยงานที่เกิดเหตุ</h4>
                                                    <div className="flex-1 w-full relative"><canvas ref={canvasRefs.dept}></canvas></div>
                                                </div>
                                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[350px] flex flex-col items-center">
                                                    <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">แบ่งตามระดับความรุนแรง (Severity)</h4>
                                                    <div className="flex-1 w-full relative"><canvas ref={canvasRefs.sev}></canvas></div>
                                                </div>
                                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[350px] flex flex-col items-center">
                                                    <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">แบ่งตามเภสัชกร (ผู้บันทึก)</h4>
                                                    <div className="flex-1 w-full relative"><canvas ref={canvasRefs.pharma}></canvas></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100 shadow-sm">
                                        <h4 className="text-sm font-black text-slate-400 uppercase mb-5 tracking-widest flex items-center gap-2">
                                            <div className="w-5 h-1.5 bg-amber-400 rounded-full"></div>
                                            ยาที่ตรวจพบความคลาดเคลื่อนสูงสุด (TOP 10)
                                        </h4>
                                        <div className="flex flex-wrap gap-3">
                                            {Object.entries(stats.counts.drug).sort((a,b)=>b[1]-a[1]).slice(0, 10).map(([n,c])=>(
                                                <div key={n} className="flex items-center gap-3 border border-slate-200 bg-white px-5 py-2.5 rounded-2xl text-xs font-black shadow-sm group hover:border-slate-400 transition-all">
                                                    <span className="text-slate-600 group-hover:text-slate-900">{n}</span>
                                                    <span className={`px-3 py-1 rounded-lg text-white ${theme.btnColorStr} shadow-sm`}>{c}</span>
                                                </div>
                                            ))}
                                            {Object.keys(stats.counts.drug).length === 0 && <span className="text-sm text-slate-400 italic">ไม่มีข้อมูลยาที่มีความคลาดเคลื่อน</span>}
                                        </div>
                                    </div>
                                    
                                    {systemMode === 'ER' && (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-5 tracking-widest">อุบัติการณ์สะสมรายบุคคล (แพทย์/พยาบาล)</h4>
                                                <div className="flex flex-wrap gap-3">
                                                    {Object.entries(stats.counts.nurse).map(([n,c])=>(
                                                        <div key={n} className="flex items-center gap-3 border border-slate-100 bg-slate-50/50 px-4 py-2 rounded-xl text-xs font-black">
                                                            <span className="text-slate-500">{n}</span>
                                                            <span className="bg-white border text-slate-800 px-2.5 py-0.5 rounded-lg shadow-sm">{c}</span>
                                                        </div>
                                                    ))}
                                                    {Object.keys(stats.counts.nurse).length === 0 && <span className="text-sm text-slate-400 italic">ไม่มีข้อมูล</span>}
                                                </div>
                                            </div>
                                            <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm">
                                                <h4 className="text-xs font-black text-slate-400 uppercase mb-5 tracking-widest">อุบัติการณ์สะสมรายบุคคล (แพทย์ผู้ตรวจเช็ค)</h4>
                                                <div className="flex flex-wrap gap-3">
                                                    {Object.entries(stats.counts.doc).map(([n,c])=>(
                                                        <div key={n} className="flex items-center gap-3 border border-slate-100 bg-slate-50/50 px-4 py-2 rounded-xl text-xs font-black">
                                                            <span className="text-slate-500">{n}</span>
                                                            <span className="bg-white border text-slate-800 px-2.5 py-0.5 rounded-lg shadow-sm">{c}</span>
                                                        </div>
                                                    ))}
                                                    {Object.keys(stats.counts.doc).length === 0 && <span className="text-sm text-slate-400 italic">ไม่มีข้อมูล</span>}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {showModal && (
                        <div onClick={() => setShowModal(false)} className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-md animate-fadeIn cursor-pointer" title="คลิกเพื่อปิดหน้าต่าง">
                            <div className={`${theme.btnSubmit} px-14 py-12 rounded-[40px] text-white text-center shadow-2xl scale-110 border border-white/20 animate-bounce`}>
                                <div className="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                                    <svg className="w-14 h-14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h3 className="text-4xl font-black mb-3">บันทึกสำเร็จ!</h3>
                                <p className="text-white/80 font-bold text-base">ข้อมูลถูกบันทึกในระบบเรียบร้อยแล้ว<br/><span className="text-sm font-normal mt-2 block opacity-80">(คลิกที่ใดก็ได้เพื่อปิด)</span></p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
