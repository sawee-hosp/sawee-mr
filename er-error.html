<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์บันทึกอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</title>
    
    <!-- Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <!-- PDFMake Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    
    <style>
        body { 
            font-family: 'Noto Sans Thai', 'Inter', sans-serif; 
            color: #0f172a;
            font-size: 14px; 
            background-color: #f8fafc;
        }
        .text-gradient-er {
            background: linear-gradient(135deg, #9f1239 0%, #e11d48 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .text-gradient-mr {
            background: linear-gradient(135deg, #065f46 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gradient-er { background: linear-gradient(135deg, #dc2626 0%, #9f1239 100%); }
        .bg-gradient-mr { background: linear-gradient(135deg, #059669 0%, #064e3b 100%); }
        
        .compact-card { box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); border-radius: 16px; }
        
        .compact-input { padding: 8px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; transition: all 0.2s; }
        .compact-input:focus { border-color: #64748b; box-shadow: 0 0 0 3px rgba(100,116,139,0.15); }
        
        .btn-radio:checked + label {
            box-shadow: inset 0 0 0 2px currentColor;
            font-weight: 700;
            background-color: currentColor;
            color: white !important;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyEL06mYIlpEnvw6McVa63_57GLCWeSiiqx7DQzjAJymqbncpmb4Au_F6J4g5DAMPf6/exec";

        const errorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];
        const riskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F"];
        const actions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];

        // ฟังก์ชันช่วยแปลงฟอร์แมตวันที่เป็น YYYY-MM-DD
        const normalizeDateToISO = (dateVal) => {
            if (!dateVal) return '';
            
            const parsed = new Date(dateVal);
            if (!isNaN(parsed.getTime())) {
                const y = parsed.getFullYear();
                const m = String(parsed.getMonth() + 1).padStart(2, '0');
                const d = String(parsed.getDate()).padStart(2, '0');
                if (y > 2000 && y < 2200) {
                    return `${y}-${m}-${d}`;
                }
            }

            const strVal = String(dateVal).trim();
            if (strVal.includes('/')) {
                const datePart = strVal.split(/[\sT]/)[0];
                const parts = datePart.split('/');
                if (parts.length === 3) {
                    let y, m, d;
                    if (parts[2].length === 4) { 
                        y = parts[2]; m = parts[1]; d = parts[0];
                        if (parseInt(m) > 12 && parseInt(d) <= 12) { const temp = d; d = m; m = temp; }
                    } else if (parts[0].length === 4) { 
                        y = parts[0]; m = parts[1]; d = parts[2];
                    } else { 
                        y = parts[2]; m = parts[1]; d = parts[0];
                    }
                    
                    let numY = parseInt(y);
                    if (numY > 2400) numY -= 543; 
                    if (numY < 100) numY += 2000;

                    return `${numY}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                }
            }
            
            if (/^\d{4}-\d{2}-\d{2}/.test(strVal)) return strVal.substring(0, 10);
            return strVal;
        };

        const formatDisplayDate = (val) => {
            if (!val) return '-';
            const iso = normalizeDateToISO(val);
            if (!iso || !iso.includes('-')) return val;
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`; // ค.ศ.
        };

        // ลงทะเบียน Plugin สำหรับแสดงตัวเลขบน Chart
        Chart.register(ChartDataLabels);

        const App = () => {
            const [systemMode, setSystemMode] = useState('ER');
            const [activeTab, setActiveTab] = useState('form');
            const [isLoading, setIsLoading] = useState(true);
            const [isPdfReady, setIsPdfReady] = useState(false);
            const [showPdfAlert, setShowPdfAlert] = useState(false);
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [] });
            
            const [form, setForm] = useState({
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: '-', totalErrors: '-',
                errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: ''
            });
            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugDropdownOpen, setIsDrugDropdownOpen] = useState(false);
            const [drugSearch, setDrugSearch] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);

            const [filterType, setFilterType] = useState('month'); // default to month for better overview
            const [filterDateStart, setFilterDateStart] = useState(() => {
                const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
            });
            const [filterDateEnd, setFilterDateEnd] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);

            const typeChartRef = useRef(null);
            const pharmaChartRef = useRef(null);
            const barChartRef = useRef(null);
            const chartInstances = useRef({ type: null, pharma: null, bar: null });

            const theme = useMemo(() => ({
                bgApp: systemMode === 'ER' ? 'bg-gradient-to-br from-red-100 via-rose-50 to-rose-200' : 'bg-gradient-to-br from-emerald-100 via-teal-50 to-teal-200',
                textGrad: systemMode === 'ER' ? 'text-gradient-er' : 'text-gradient-mr',
                bgGrad: systemMode === 'ER' ? 'bg-gradient-er' : 'bg-gradient-mr',
                primaryStr: systemMode === 'ER' ? '#e11d48' : '#059669',
                borderActive: systemMode === 'ER' ? 'border-red-500 text-red-700' : 'border-teal-500 text-teal-700',
                lightBg: systemMode === 'ER' ? 'bg-red-50/80' : 'bg-teal-50/80',
                btnActiveTab: systemMode === 'ER' ? 'bg-gradient-to-r from-red-600 to-rose-700 text-white shadow-lg border-transparent' : 'bg-gradient-to-r from-teal-600 to-emerald-700 text-white shadow-lg border-transparent',
                btnSubmit: systemMode === 'ER' ? 'bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-700 hover:to-rose-800' : 'bg-gradient-to-r from-teal-600 to-emerald-700 hover:from-teal-700 hover:to-emerald-800',
            }), [systemMode]);

            useEffect(() => {
                const loadPdfFonts = async () => {
                    try {
                        const fetchFontBase64 = async (url) => {
                            const res = await fetch(url);
                            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                            const arrayBuffer = await res.arrayBuffer();
                            let binary = '';
                            const bytes = new Uint8Array(arrayBuffer);
                            const len = bytes.byteLength;
                            for (let i = 0; i < len; i++) {
                                binary += String.fromCharCode(bytes[i]);
                            }
                            return window.btoa(binary);
                        };
                        
                        // Using raw github content to bypass jsdelivr restrictions
                        const fontUrls = {
                            regular: 'https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Regular.ttf',
                            bold: 'https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Bold.ttf'
                        };
                        
                        const [regular, bold] = await Promise.all([
                            fetchFontBase64(fontUrls.regular),
                            fetchFontBase64(fontUrls.bold)
                        ]);
                        
                        window.pdfMake.vfs = { ...window.pdfMake.vfs, 'Sarabun-Regular.ttf': regular, 'Sarabun-Bold.ttf': bold };
                        window.pdfMake.fonts = { 
                            Sarabun: { 
                                normal: 'Sarabun-Regular.ttf', 
                                bold: 'Sarabun-Bold.ttf', 
                                italics: 'Sarabun-Regular.ttf', 
                                bolditalics: 'Sarabun-Bold.ttf' 
                            } 
                        };
                        setIsPdfReady(true);
                    } catch (error) { 
                        console.error("PDF Font error", error); 
                        setIsPdfReady(false); 
                        setShowPdfAlert(true);
                    }
                };
                loadPdfFonts();
                fetchData();
            }, []);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error("Fetch Data Failed:", e); }
                setIsLoading(false);
            };

            useEffect(() => {
                const [h, m] = form.time.split(':').map(Number);
                const d = new Date(form.date);
                let sD, sM, sY, eD, eM, eY;
                if (h < 8) {
                    const p = new Date(d); p.setDate(p.getDate() - 1);
                    sD = p.getDate(); sM = String(p.getMonth() + 1).padStart(2, '0'); sY = p.getFullYear();
                    eD = d.getDate(); eM = String(d.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                } else {
                    const n = new Date(d); n.setDate(n.getDate() + 1);
                    sD = d.getDate(); sM = String(d.getMonth() + 1).padStart(2, '0'); sY = d.getFullYear();
                    eD = n.getDate(); eM = String(n.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                }
                setForm(prev => ({ ...prev, shiftDate: (sM === eM) ? `${sD}-${eD}/${sM}/${sY}` : `${sD}/${sM}-${eD}/${eM}/${eY}` }));
            }, [form.date, form.time]);

            useEffect(() => {
                const itemsInShift = data.history.filter(h => h.shiftDate === form.shiftDate);
                const shiftTotalRx = itemsInShift.find(h => h.totalRx && h.totalRx !== "")?.totalRx;
                
                const actualErrorsCount = itemsInShift.filter(h => h.errorType !== errorOptions[0]).length;
                const isErrorNow = form.errorType !== errorOptions[0];
                
                setForm(prev => ({
                    ...prev,
                    totalRx: shiftTotalRx ? shiftTotalRx : '',
                    sequence: isErrorNow ? actualErrorsCount + 1 : '-',
                    totalErrors: isErrorNow ? actualErrorsCount + 1 : '-'
                }));
                setIsTotalRxLocked(!!shiftTotalRx);
            }, [form.shiftDate, data.history, form.errorType]);

            useEffect(() => {
                if (form.errorType !== errorOptions[0]) {
                    const drugs = form.selectedDrugs.length > 0 ? form.selectedDrugs.join(', ') : '...';
                    setForm(prev => ({ ...prev, details: `HN ${form.hn || '...'} ${form.errorType} คือ ${drugs}` }));
                } else setForm(prev => ({ ...prev, details: '' }));
            }, [form.hn, form.errorType, form.selectedDrugs]);

            const handlePaste = async (field) => {
                try {
                    const text = await navigator.clipboard.readText();
                    setForm(prev => ({ ...prev, [field]: text }));
                } catch (err) { console.warn("Paste failed", err); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const payload = { ...form, systemMode, drugs: form.selectedDrugs.join(', ') };
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setShowModal(true);
                        await fetchData();
                        setForm(prev => ({ ...prev, errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '' }));
                        setTimeout(() => setShowModal(false), 1500);
                    }
                } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
                setIsSubmitting(false);
            };

            // 1. ประวัติพื้นฐานแบบเต็ม (ไม่สนใจการซ่อน Error) เพื่อใช้คำนวณสถิติรวมที่แม่นยำ
            const baseFilteredHistory = useMemo(() => {
                if (!data.history) return [];
                return data.history.filter(item => {
                    const matchSystem = item.systemMode === systemMode || (!item.systemMode && systemMode === 'ER');
                    
                    const itemISO = normalizeDateToISO(item.date);
                    let matchDate = false;

                    if (filterType === 'day') {
                        matchDate = itemISO >= filterDateStart && itemISO <= filterDateEnd;
                    } else {
                        matchDate = itemISO.startsWith(filterMonth);
                    }
                    
                    const searchStr = searchTerm || '';
                    const matchSearch = String(item.hn || '').includes(searchStr) || String(item.details || '').toLowerCase().includes(searchStr.toLowerCase());
                    
                    return matchSystem && matchDate && matchSearch;
                });
            }, [data.history, systemMode, filterType, filterDateStart, filterDateEnd, filterMonth, searchTerm]);

            // 2. ประวัติสำหรับตารางแสดงผล (กระทบด้วยปุ่มซ่อน/แสดง)
            const filteredHistory = useMemo(() => {
                return baseFilteredHistory.filter(item => {
                    if (excludeNoError && item.errorType === errorOptions[0]) return false;
                    return true;
                });
            }, [baseFilteredHistory, excludeNoError]);

            // ฟังก์ชันตรวจสอบจำนวนใบสั่งยา ห้ามนับซ้ำ (นับแค่ 1 ครั้งต่อกะ/วัน)
            const calculateTotalRx = (historyData) => {
                const uniqueShifts = new Map();
                historyData.forEach(h => {
                    if (h.totalRx && h.shiftDate) {
                        uniqueShifts.set(h.shiftDate, parseInt(h.totalRx));
                    }
                });
                let total = 0;
                uniqueShifts.forEach(val => total += val);
                return total;
            };

            const stats = useMemo(() => {
                const rx = calculateTotalRx(baseFilteredHistory);
                
                const errorsList = baseFilteredHistory.filter(h => h.errorType !== errorOptions[0]);
                const errors = errorsList.length;
                const percent = rx > 0 ? ((errors / rx) * 100).toFixed(2) : "0.00";
                
                const typeCounts = {};
                const pharmaCounts = {}; // Col M
                const inspectorCounts = {}; // Col K
                const doctorCounts = {}; // Col L
                const dailyStats = {};

                errorsList.forEach(h => {
                    typeCounts[h.errorType] = (typeCounts[h.errorType] || 0) + 1;
                    if(h.recorder) pharmaCounts[h.recorder] = (pharmaCounts[h.recorder] || 0) + 1; // เภสัชกร (Col M)
                    if(h.inspector) inspectorCounts[h.inspector] = (inspectorCounts[h.inspector] || 0) + 1; // แพทย์ (Col K)
                    if(h.doctor) doctorCounts[h.doctor] = (doctorCounts[h.doctor] || 0) + 1; // พยาบาล (Col L)
                });

                // เตรียมข้อมูลสำหรับ Stacked Bar (อิงจาก baseFilteredHistory)
                baseFilteredHistory.forEach(h => {
                    const dateISO = normalizeDateToISO(h.date);
                    if (!dateISO) return;
                    if (!dailyStats[dateISO]) dailyStats[dateISO] = { rxTotal: 0, errors: 0, shifts: new Set() };
                    
                    if (h.totalRx && !dailyStats[dateISO].shifts.has(h.shiftDate)) {
                        dailyStats[dateISO].shifts.add(h.shiftDate);
                        dailyStats[dateISO].rxTotal += parseInt(h.totalRx);
                    }
                    if (h.errorType !== errorOptions[0]) {
                        dailyStats[dateISO].errors += 1;
                    }
                });

                return { rx, errors, percent, typeCounts, pharmaCounts, inspectorCounts, doctorCounts, dailyStats };
            }, [baseFilteredHistory]);

            const topDrugs = useMemo(() => {
                const drugCounts = {};
                filteredHistory.forEach(h => {
                    if (h.errorType !== errorOptions[0] && h.drugs) {
                        const drugList = h.drugs.split(',').map(d => d.trim()).filter(d => d);
                        drugList.forEach(d => {
                            drugCounts[d] = (drugCounts[d] || 0) + 1;
                        });
                    }
                });
                return Object.entries(drugCounts)
                    .map(([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count);
            }, [filteredHistory]);

            const topInspectors = useMemo(() => {
                return Object.entries(stats.inspectorCounts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
            }, [stats.inspectorCounts]);

            const topDoctors = useMemo(() => {
                return Object.entries(stats.doctorCounts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
            }, [stats.doctorCounts]);

            useEffect(() => {
                if (activeTab === 'history') {
                    const destroyChart = (key) => {
                        if (chartInstances.current[key]) {
                            chartInstances.current[key].destroy();
                            chartInstances.current[key] = null;
                        }
                    };

                    const commonOptions = { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'right', labels: { font: { family: 'Noto Sans Thai', size: 11 } } },
                            datalabels: {
                                color: '#fff',
                                font: { weight: 'bold', family: 'Noto Sans Thai', size: 12 },
                                formatter: (value) => value > 0 ? value : ''
                            }
                        } 
                    };

                    // 1. Error Types Chart
                    if (typeChartRef.current) {
                        destroyChart('type');
                        const ctx = typeChartRef.current.getContext('2d');
                        const labels = Object.keys(stats.typeCounts);
                        const dataVals = Object.values(stats.typeCounts);
                        chartInstances.current.type = new Chart(ctx, {
                            type: 'doughnut',
                            data: {
                                labels: labels.length ? labels : ['ไม่มีข้อมูล'],
                                datasets: [{ data: dataVals.length ? dataVals : [1], backgroundColor: dataVals.length ? ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6', '#d946ef', '#f43f5e'] : ['#e2e8f0'], borderWidth: 1 }]
                            },
                            options: commonOptions
                        });
                    }

                    // 2. Pharmacist Chart
                    if (pharmaChartRef.current) {
                        destroyChart('pharma');
                        const ctx = pharmaChartRef.current.getContext('2d');
                        const labels = Object.keys(stats.pharmaCounts);
                        const dataVals = Object.values(stats.pharmaCounts);
                        chartInstances.current.pharma = new Chart(ctx, {
                            type: 'pie',
                            data: {
                                labels: labels.length ? labels : ['ไม่มีข้อมูล'],
                                datasets: [{ data: dataVals.length ? dataVals : [1], backgroundColor: dataVals.length ? ['#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e'] : ['#e2e8f0'], borderWidth: 1 }]
                            },
                            options: commonOptions
                        });
                    }

                    // 3. Stacked Bar Chart (Rx vs Errors per day)
                    if (barChartRef.current) {
                        destroyChart('bar');
                        const ctx = barChartRef.current.getContext('2d');
                        const sortedDates = Object.keys(stats.dailyStats).sort();
                        
                        const displayLabels = sortedDates.map(dateStr => {
                            const [y, m, d] = dateStr.split('-');
                            return `${d}/${m}/${y}`; // ค.ศ.
                        });
                        
                        const errorData = sortedDates.map(d => stats.dailyStats[d].errors);
                        const normalData = sortedDates.map(d => Math.max(0, stats.dailyStats[d].rxTotal - stats.dailyStats[d].errors));

                        chartInstances.current.bar = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: displayLabels,
                                datasets: [
                                    { label: 'ใบสั่งยาปกติ', data: normalData, backgroundColor: '#10b981', stack: 'Stack 0' },
                                    { label: 'พบ Error', data: errorData, backgroundColor: '#ef4444', stack: 'Stack 0' }
                                ]
                            },
                            options: {
                                responsive: true, maintainAspectRatio: false,
                                plugins: { 
                                    legend: { position: 'top', labels: { font: { family: 'Noto Sans Thai' } } },
                                    datalabels: {
                                        color: '#fff',
                                        font: { weight: 'bold', family: 'Noto Sans Thai', size: 10 },
                                        formatter: (value) => value > 0 ? value : ''
                                    }
                                },
                                scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
                            }
                        });
                    }
                }
            }, [activeTab, stats.typeCounts, stats.pharmaCounts, stats.dailyStats]);

            const generateReportPDF = () => {
                if (!isPdfReady) { 
                    setShowPdfAlert(true);
                    return; 
                }
                const periodText = filterType === 'day' ? `${formatDisplayDate(filterDateStart)} - ${formatDisplayDate(filterDateEnd)}` : filterMonth;
                
                // 10 Columns
                const tbBody = [[
                    { text: 'วันที่', style: 'th' }, { text: 'เวลา', style: 'th' }, 
                    { text: 'ความเสี่ยงที่พบ', style: 'th' }, { text: 'รายละเอียดความเสี่ยง', style: 'th' }, 
                    { text: 'Error Type', style: 'th' }, { text: 'ระดับ', style: 'th' }, 
                    { text: 'การแก้ไข', style: 'th' }, { text: 'ผู้ตรวจ', style: 'th' }, 
                    { text: 'รคส.', style: 'th' }, { text: 'ผู้บันทึก', style: 'th' }
                ]];
                
                // ฟังก์ชันสำหรับสกัดเฉพาะเวลา HH:MM ออกจากรูปแบบต่างๆ (รวมถึง ISO Date)
                const formatTime = (t) => {
                    if (!t) return '-';
                    const str = String(t);
                    if (str.includes('T')) {
                        const timePart = str.split('T')[1];
                        return timePart.substring(0, 5); // ได้ HH:MM
                    }
                    const parts = str.split(':');
                    if (parts.length >= 2) return `${parts[0].padStart(2, '0')}:${parts[1].padStart(2, '0')}`;
                    return str.substring(0, 5);
                };
                
                filteredHistory.forEach(h => {
                    const isNoError = h.errorType === errorOptions[0];
                    tbBody.push([
                        { text: formatDisplayDate(h.date), alignment: 'center', margin: [0, 2], noWrap: true },
                        { text: formatTime(h.time), alignment: 'center', margin: [0, 2] },
                        { text: h.errorType || '-', color: isNoError ? '#10b981' : theme.primaryStr, bold: true, margin: [0, 2] },
                        { text: h.details || '-', margin: [0, 2] },
                        { text: h.riskType || '-', margin: [0, 2] },
                        { text: h.severity || '-', alignment: 'center', margin: [0, 2], bold: true },
                        { text: h.action || '-', margin: [0, 2] },
                        { text: h.inspector || '-', margin: [0, 2] },
                        { text: h.doctor || '-', margin: [0, 2] },
                        { text: h.recorder || '-', margin: [0, 2] }

                });

                    pageSize: 'A4', pageOrientation: 'landscape', pageMargins: [20, 20, 20, 20],

                        { text: `รายงานสรุป ${systemMode} Medication Errors`, style: 'header', alignment: 'center' },
                        { text: `ช่วงเวลา: ${periodText}  |  ใบสั่งยารวม: ${stats.rx} ใบ  |  Error รวม: ${stats.errors} รายการ (${stats.percent}%)`, alignment: 'center', margin: [0, 0, 0, 10], color: '#4b5563', fontSize: 11, bold: true },

                                headerRows: 1, 
                                widths: ['8%', '6%', '13%', '*', '10%', '4%', '12%', '8%', '8%', '8%'], 
                                body: tbBody 
                            },

                        }
                    ],
                    styles: { 
                        header: { fontSize: 16, bold: true, margin: [0, 0, 0, 5], color: theme.primaryStr }, 
                        th: { bold: true, fontSize: 10, fillColor: '#f1f5f9', alignment: 'center', margin: [0, 2] }

            };

                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}

                                                <div className="md:col-span-2">

                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="text-xs font-bold text-slate-700 mb-2 block">ประเภทความเสี่ยง</label>

                                                            <div key={rt}>
                                                                <input type="radio" id={`rt-${rt}`} name="riskType" value={rt} checked={form.riskType===rt} onChange={e=>setForm({...form, riskType: e.target.value})} className="hidden btn-radio" style={{color: theme.primaryStr}}/>
                                                                <label htmlFor={`rt-${rt}`} className="block w-full py-2.5 text-center bg-white border border-slate-300 rounded-lg text-xs font-medium cursor-pointer transition-all text-slate-600 shadow-sm">{rt}</label>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="md:col-span-2">

                                                    <div className="flex gap-2">
                                                        {severities.map(sv => (
                                                            <div key={sv} className="flex-1">
                                                                <input type="radio" id={`sv-${sv}`} name="severity" value={sv} checked={form.severity===sv} onChange={e=>setForm({...form, severity: e.target.value})} className="hidden btn-radio" style={{color: theme.primaryStr}}/>
                                                                <label htmlFor={`sv-${sv}`} className="block w-full py-2.5 text-center bg-white border border-slate-300 rounded-lg text-sm font-bold cursor-pointer transition-all text-slate-500 shadow-sm">{sv}</label>

                                                    <select value={form.action} onChange={e=>setForm({...form, action: e.target.value})} className="w-full compact-input bg-white text-sm" required><option value="">-- เลือก --</option>{actions.map(a=><option key={a} value={a}>{a}</option>)}</select>

                                            return (
                                                <div key={field}>

                                                        <input list={field+'s'} value={form[field]} onChange={e=>setForm({...form, [field]: e.target.value})} className="flex-1 compact-input text-sm" required />
                                                        <button type="button" onClick={()=>handlePaste(field)} className="px-3 bg-white border border-slate-300 text-xs font-bold text-slate-600 rounded-lg shadow-sm hover:bg-slate-100 transition-colors">วาง</button>

                                                    <datalist id={field+'s'}>{data[field+'s'].map(n=><option key={n} value={n}/>)}</datalist>

                                                        <td className="p-3 min-w-[150px]">
                                                            <div className="font-bold text-sm" style={{color: h.errorType===errorOptions[0] ? '#10b981' : theme.primaryStr}}>{h.errorType}</div>
                                                            {h.severity && <div className="text-xs bg-slate-200 text-slate-800 px-1.5 py-0.5 rounded font-black inline-block mt-1">ระดับ {h.severity}</div>}
                                                        </td>
                                                        <td className="p-3 text-xs text-slate-600 min-w-[200px] leading-relaxed">{h.details || '-'}</td>
                                                        <td className="p-3 text-xs text-slate-500 whitespace-nowrap font-medium">{h.recorder}</td>
                                                    </tr>
                                                ))}
                                                {filteredHistory.length===0 && <tr><td colSpan="5" className="p-12 text-center text-slate-400 font-medium text-base">ไม่พบข้อมูลตามเงื่อนไขที่ค้นหา</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* ส่วนที่ 3: แผนภูมิแท่ง (Stacked Bar) */}
                                <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-md">
                                    <h3 className="text-sm font-bold text-slate-700 mb-4 text-center">สัดส่วนใบสั่งยารวม และ Error เรียงตามวันที่</h3>
                                    <div className="relative h-[300px] w-full">
                                        <canvas ref={barChartRef}></canvas>
                                    </div>
                                </div>

                                {/* ส่วนที่ 4: แผนภูมิวงกลมคู่ (Pie Charts) */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-md flex flex-col">
                                        <h3 className="text-sm font-bold text-slate-700 mb-4 text-center">สัดส่วนประเภท Error ที่พบ</h3>
                                        <div className="relative h-64 w-full flex-1">
                                            <canvas ref={typeChartRef}></canvas>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-md flex flex-col">
                                        <h3 className="text-sm font-bold text-slate-700 mb-4 text-center">สัดส่วน Error แยกตามเภสัชกร</h3>
                                        <div className="relative h-64 w-full flex-1">
                                            <canvas ref={pharmaChartRef}></canvas>
                                        </div>
                                    </div>
                                </div>

                                {/* ส่วนที่ 5: ยาและบุคลากร */}
                                <div className="space-y-4">
                                    <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-sm">
                                        <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">รายการยาที่คลาดเคลื่อนบ่อยในช่วงเวลานี้</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {topDrugs.length > 0 ? topDrugs.map(d => (
                                                <div key={d.name} className={`flex items-center gap-2 border border-slate-200 px-3 py-1.5 rounded-lg ${theme.lightBg}`}>
                                                    <span className="text-sm font-bold text-slate-700">{d.name}</span>
                                                    <span className={`text-xs font-black px-2 py-0.5 rounded-md bg-white border border-slate-200`} style={{color: theme.primaryStr}}>{d.count} ครั้ง</span>
                                                </div>
                                            )) : <span className="text-sm text-slate-400">ไม่มีข้อมูลยาที่ผิดพลาดในรอบนี้</span>}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-sm">
                                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">แยกตามแพทย์</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {topInspectors.length > 0 ? topInspectors.map(d => (
                                                    <div key={d.name} className={`flex items-center gap-2 border border-slate-200 px-3 py-1.5 rounded-lg bg-blue-50/70`}>
                                                        <span className="text-sm font-bold text-slate-700">{d.name}</span>
                                                        <span className={`text-xs font-black px-2 py-0.5 rounded-md bg-white border border-slate-200 text-blue-600`}>{d.count} ครั้ง</span>
                                                    </div>
                                                )) : <span className="text-sm text-slate-400">ไม่มีข้อมูล</span>}
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl compact-card p-5 md:p-6 border border-slate-100 shadow-sm">
                                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">แยกตามพยาบาล</h3>
                                            <div className="flex flex-wrap gap-2">
                                                {topDoctors.length > 0 ? topDoctors.map(d => (
                                                    <div key={d.name} className={`flex items-center gap-2 border border-slate-200 px-3 py-1.5 rounded-lg bg-purple-50/70`}>
                                                        <span className="text-sm font-bold text-slate-700">{d.name}</span>
                                                        <span className={`text-xs font-black px-2 py-0.5 rounded-md bg-white border border-slate-200 text-purple-600`}>{d.count} ครั้ง</span>
                                                    </div>
                                                )) : <span className="text-sm text-slate-400">ไม่มีข้อมูล</span>}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        )}
                    </main>

                    {}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
                            <div className={`${theme.btnSubmit} px-8 py-6 rounded-2xl text-white text-center shadow-2xl scale-110 border border-white/20 transition-all`}>
                                <svg className="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                <h3 className="text-xl font-bold">บันทึกข้อมูลเรียบร้อย</h3>
                            </div>
                        </div>
                    )}

                    {showPdfAlert && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                </div>
                                <h3 className="text-lg font-black text-slate-800 mb-2">ไม่สามารถโหลดฟอนต์ PDF ได้</h3>
                                <p className="text-sm text-slate-600 mb-6">กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต เพื่อให้ระบบสามารถดาวน์โหลดฟอนต์ภาษาไทยสำหรับการพิมพ์รายงานได้</p>
                                <button onClick={() => setShowPdfAlert(false)} className="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-colors">ตกลง</button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
