<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER ERROR Report System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f2f5; }
        .tab-active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .datalist-input::-webkit-calendar-picker-indicator { display: block !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: slideIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { jsPDF } = window.jspdf;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyEL06mYIlpEnvw6McVa63_57GLCWeSiiqx7DQzjAJymqbncpmb4Au_F6J4g5DAMPf6/exec";

        const errorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];

        const riskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F"];
        const actions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];

        const App = () => {
            const [activeTab, setActiveTab] = useState('form');
            const [isLoading, setIsLoading] = useState(true);
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [] });
            
            // Form State
            const [form, setForm] = useState({
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: 1, totalErrors: 0,
                errorType: errorOptions[0], hn: '', selectedDrugs: [],
                details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: ''
            });
            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugOpen, setIsDrugOpen] = useState(false);
            const [drugSearch, setDrugSearch] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);

            // History Filter State
            const [filterType, setFilterType] = useState('day');
            const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const res = await fetch(GAS_URL);
                    const json = await res.json();
                    setData(json);
                } catch (e) { console.error("Fetch failed", e); }
                setIsLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            // Shift Calculation: d-d/mm/yyyy
            useEffect(() => {
                const [h, m] = form.time.split(':').map(Number);
                const d = new Date(form.date);
                let sD, sM, sY, eD, eM, eY;

                if (h < 8) {
                    const prev = new Date(d); prev.setDate(prev.getDate() - 1);
                    sD = prev.getDate(); sM = String(prev.getMonth() + 1).padStart(2, '0'); sY = prev.getFullYear();
                    eD = d.getDate(); eM = String(d.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                } else {
                    const next = new Date(d); next.setDate(next.getDate() + 1);
                    sD = d.getDate(); sM = String(d.getMonth() + 1).padStart(2, '0'); sY = d.getFullYear();
                    eD = next.getDate(); eM = String(next.getMonth() + 1).padStart(2, '0'); eY = d.getFullYear();
                }
                const fmt = (sM === eM) ? `${sD}-${eD}/${sM}/${sY}` : `${sD}/${sM}-${eD}/${eM}/${eY}`;
                setForm(prev => ({ ...prev, shiftDate: fmt }));
            }, [form.date, form.time]);

            // Sync with history
            useEffect(() => {
                const historyInShift = data.history.filter(h => h.shiftDate === form.shiftDate);
                const firstRx = historyInShift.find(h => h.totalRx && h.totalRx !== "");
                const errorCount = historyInShift.filter(h => h.errorType !== errorOptions[0]).length;

                setForm(prev => ({
                    ...prev,
                    totalRx: firstRx ? firstRx.totalRx : '',
                    sequence: historyInShift.length + 1,
                    totalErrors: errorCount
                }));
                setIsTotalRxLocked(!!firstRx);
            }, [form.shiftDate, data.history]);

            // Auto-Text Generation
            useEffect(() => {
                if (form.errorType !== errorOptions[0]) {
                    const dStr = form.selectedDrugs.join(', ') || '...';
                    setForm(prev => ({ ...prev, details: `HN ${form.hn || '...'} ${form.errorType} คือ ${dStr}` }));
                } else {
                    setForm(prev => ({ ...prev, details: '' }));
                }
            }, [form.hn, form.errorType, form.selectedDrugs]);

            const handlePaste = async (field) => {
                try {
                    const text = await navigator.clipboard.readText();
                    setForm(prev => ({ ...prev, [field]: text }));
                } catch (err) { console.error("Paste failed", err); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                const payload = { ...form, drugs: form.selectedDrugs.join(', ') };
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const resJson = await res.json();
                    if(resJson.status === 'success') {
                        setShowModal(true);
                        await fetchData();
                        // Reset Form (Keeping essential staff info if needed, but per request reset fully)
                        setForm(prev => ({ ...prev, errorType: errorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '' }));
                        setTimeout(() => setShowModal(false), 2000);
                    }
                } catch (e) { alert("เกิดข้อผิดพลาด"); }
                setIsSubmitting(false);
            };

            const filteredHistory = useMemo(() => {
                return data.history.filter(item => {
                    const matchSearch = item.hn.includes(searchTerm) || item.details.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchDate = filterType === 'day' 
                        ? item.date.includes(filterDate.split('-').reverse().join('/'))
                        : item.shiftDate.includes(`/${filterMonth.split('-')[1]}/${filterMonth.split('-')[0]}`);
                    
                    if (excludeNoError && item.errorType === errorOptions[0]) return false;
                    return matchDate && matchSearch;
                });
            }, [data.history, filterType, filterDate, filterMonth, searchTerm, excludeNoError]);

            const generatePDF = () => {
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                
                // Header
                doc.setFontSize(16);
                doc.text("รายงานสรุป ER Medication Errors", 148, 15, { align: 'center' });
                doc.setFontSize(10);
                const period = filterType === 'day' ? filterDate : filterMonth;
                doc.text(`ช่วงเวลา: ${period} | รายการทั้งหมด: ${filteredHistory.length} รายการ`, 148, 22, { align: 'center' });

                // Table
                const tableData = filteredHistory.map(h => [
                    h.shiftDate, h.time, h.hn, h.errorType, h.details, h.severity, h.inspector, h.doctor, h.recorder
                ]);

                doc.autoTable({
                    startY: 30,
                    head: [['กะรับยา', 'เวลา', 'HN', 'ความเสี่ยง', 'รายละเอียด', 'ระดับ', 'ผู้ตรวจ', 'รคส.', 'ผู้บันทึก']],
                    body: tableData,
                    theme: 'grid',
                    styles: { fontSize: 8, font: 'helvetica' },
                    headStyles: { fillColor: [37, 99, 235] },
                    margin: { top: 30 }
                });

                doc.save(`ER_Error_Report_${period}.pdf`);
            };

            if (isLoading) return <div className="h-screen flex items-center justify-center font-bold text-blue-600">กำลังเชื่อมต่อข้อมูล...</div>;

            return (
                <div className="min-h-screen">
                    {/* Modal */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm animate-content">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl text-center">
                                <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h3 className="text-xl font-bold">บันทึกเรียบร้อย!</h3>
                                <p className="text-gray-500">ข้อมูลของคุณถูกส่งไปยัง Google Sheet แล้ว</p>
                            </div>
                        </div>
                    )}

                    <nav className="bg-white border-b sticky top-0 z-40">
                        <div className="max-w-4xl mx-auto flex">
                            <button onClick={()=>setActiveTab('form')} className={`flex-1 py-4 font-bold text-sm ${activeTab === 'form' ? 'tab-active' : 'text-gray-400'}`}>บันทึกข้อมูล</button>
                            <button onClick={()=>setActiveTab('history')} className={`flex-1 py-4 font-bold text-sm ${activeTab === 'history' ? 'tab-active' : 'text-gray-400'}`}>รายงานย้อนหลัง</button>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto p-4 md:p-6 mb-20">
                        {activeTab === 'form' ? (
                            <div className="bg-white rounded-3xl shadow-md p-6 md:p-8 border border-gray-100 animate-content">
                                <div className="mb-6">
                                    <h1 className="text-xl font-bold text-gray-800">แบบฟอร์มบันทึก ER ERROR</h1>
                                    <p className="text-blue-500 text-sm font-medium">โดยเภสัชกรเวรเช้าประจำวัน</p>
                                </div>

                                <form onSubmit={handleSubmit} className="space-y-6">
                                    {/* Shift Info */}
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-100 space-y-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-xs font-bold text-gray-500">วันที่เกิดเหตุ (เลือก)</label>
                                                <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="w-full mt-1 p-2 border rounded-xl" required />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500">เวลา (น.)</label>
                                                <input type="time" value={form.time} onChange={e=>setForm({...form, time: e.target.value})} className="w-full mt-1 p-2 border rounded-xl" required />
                                            </div>
                                        </div>
                                        <div className="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl border border-blue-50 gap-4">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] font-bold text-blue-400">กะรับยาประจำวันที่</span>
                                                <div className="flex items-center gap-4">
                                                    <span className="text-xl font-black text-blue-700">{form.shiftDate}</span>
                                                    <span className="text-xs font-bold text-slate-400">|</span>
                                                    <span className="text-sm font-bold text-slate-600">ใบสั่งยา: {form.totalRx || '-'} ใบ</span>
                                                </div>
                                            </div>
                                            <div className="bg-slate-100 px-4 py-1 rounded-lg text-center">
                                                <div className="text-[10px] text-gray-400 font-bold uppercase tracking-tight">ลำดับที่ / Error สะสม</div>
                                                <div className="text-lg font-bold">
                                                    {form.errorType === errorOptions[0] ? '-' : form.sequence} / <span className="text-red-500">{form.errorType === errorOptions[0] ? '-' : form.totalErrors}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="pt-2">
                                            <label className="text-xs font-bold text-gray-400">จำนวนใบสั่งยาทั้งหมดของกะนี้ (กรอกครั้งเดียวต่อกะ)</label>
                                            <div className="flex gap-2 mt-1">
                                                <input type="number" value={form.totalRx} onChange={e=>setForm({...form, totalRx: e.target.value})} disabled={isTotalRxLocked} className="flex-1 p-2 border rounded-xl disabled:bg-gray-100 font-bold" required placeholder="จำนวนใบสั่งยา..." />
                                                {isTotalRxLocked && <button type="button" onClick={()=>setIsTotalRxLocked(false)} className="text-blue-500 text-xs font-bold px-3">แก้ไข</button>}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Risk Found Dropdown */}
                                    <div>
                                        <label className="text-sm font-bold text-gray-700 mb-2 block">ความเสี่ยงที่พบ</label>
                                        <select value={form.errorType} onChange={e=>setForm({...form, errorType: e.target.value})} className={`w-full p-3 border-2 rounded-2xl font-bold outline-none ${form.errorType === errorOptions[0] ? 'border-green-300 text-green-700' : 'border-red-300 text-red-700'}`}>
                                            {errorOptions.map(o => <option key={o} value={o}>{o}</option>)}
                                        </select>
                                    </div>

                                    {/* Conditional Form Content */}
                                    {form.errorType !== errorOptions[0] && (
                                        <div className="space-y-5 bg-red-50/50 p-6 rounded-3xl border border-red-50 animate-content">
                                            <div className="relative">
                                                <label className="text-xs font-bold text-red-800">HN</label>
                                                <div className="flex gap-2 mt-1">
                                                    <input type="text" value={form.hn} onChange={e=>setForm({...form, hn: e.target.value})} className="flex-1 p-2 border border-red-100 rounded-xl" required placeholder="เช่น 6100xxxx" />
                                                    <button type="button" onClick={()=>handlePaste('hn')} className="bg-white px-4 border border-red-200 rounded-xl text-xs font-bold text-red-500 shadow-sm">วาง</button>
                                                </div>
                                            </div>

                                            <div className="relative">
                                                <label className="text-xs font-bold text-red-800">ยาที่เกี่ยวข้อง</label>
                                                <div className="relative">
                                                    <div onClick={()=>setIsDrugOpen(!isDrugOpen)} className="w-full mt-1 p-2 border border-red-100 bg-white rounded-xl min-h-[42px] flex flex-wrap gap-1 cursor-pointer">
                                                        {form.selectedDrugs.length === 0 ? <span className="text-slate-300 text-xs">คลิกเพื่อเลือกยา...</span> : form.selectedDrugs.map(d=>(
                                                            <span key={d} className="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px] font-bold flex items-center gap-1">
                                                                {d} <span onClick={(e)=>{e.stopPropagation(); setForm({...form, selectedDrugs: form.selectedDrugs.filter(x=>x!==d)})}}>×</span>
                                                            </span>
                                                        ))}
                                                    </div>
                                                    {isDrugOpen && (
                                                        <div className="absolute z-50 w-full mt-1 bg-white border border-red-100 shadow-xl rounded-xl overflow-hidden animate-content">
                                                            <div className="p-2 border-b flex gap-2">
                                                                <input type="text" placeholder="ค้นหายา..." value={drugSearch} onChange={e=>setDrugSearch(e.target.value)} className="flex-1 p-2 border rounded-lg text-xs" onClick={e=>e.stopPropagation()} />
                                                                <button type="button" onClick={()=>setIsDrugOpen(false)} className="text-xs font-bold text-red-400">ปิด</button>
                                                            </div>
                                                            <div className="max-h-48 overflow-y-auto">
                                                                {data.drugs.filter(d=>d.toLowerCase().includes(drugSearch.toLowerCase())).map(d=>(
                                                                    <div key={d} onClick={()=>setForm({...form, selectedDrugs: form.selectedDrugs.includes(d)?form.selectedDrugs.filter(x=>x!==d):[...form.selectedDrugs, d]})} className={`p-2 text-xs border-b last:border-0 cursor-pointer hover:bg-red-50 ${form.selectedDrugs.includes(d)?'bg-red-50 font-bold text-red-700':''}`}>{d}</div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-xs font-bold text-red-800">รายละเอียดเพิ่มเติม</label>
                                                <textarea value={form.details} onChange={e=>setForm({...form, details: e.target.value})} className="w-full mt-1 p-2 border border-red-100 rounded-xl text-xs h-20 bg-orange-50/30" />
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="text-xs font-bold text-red-800">ประเภทความเสี่ยง</label>
                                                    <select value={form.riskType} onChange={e=>setForm({...form, riskType: e.target.value})} className="w-full mt-1 p-2 border border-red-100 rounded-xl text-xs bg-white" required>
                                                        <option value="">-- เลือก --</option>
                                                        {riskTypes.map(t=><option key={t} value={t}>{t}</option>)}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="text-xs font-bold text-red-800">ระดับความรุนแรง</label>
                                                    <select value={form.severity} onChange={e=>setForm({...form, severity: e.target.value})} className="w-full mt-1 p-2 border border-red-100 rounded-xl text-xs bg-white" required>
                                                        <option value="">-- เลือก --</option>
                                                        {severities.map(s=><option key={s} value={s}>{s}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-xs font-bold text-red-800">การแก้ไข</label>
                                                <select value={form.action} onChange={e=>setForm({...form, action: e.target.value})} className="w-full mt-1 p-2 border border-red-100 rounded-xl text-xs bg-white" required>
                                                    <option value="">-- เลือกการแก้ไข --</option>
                                                    {actions.map(a=><option key={a} value={a}>{a}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                    )}

                                    {/* Staff Selection */}
                                    <div className="bg-slate-50 p-5 rounded-2xl grid grid-cols-1 md:grid-cols-3 gap-5 border border-slate-100">
                                        {[
                                            { label: 'ผู้ตรวจ (พยาบาล)', field: 'inspector', list: 'inspectors' },
                                            { label: 'รคส. (แพทย์)', field: 'doctor', list: 'doctors' },
                                            { label: 'ผู้บันทึก (เภสัชกร)', field: 'recorder', list: 'recorders' }
                                        ].map(item => (
                                            <div key={item.field}>
                                                <label className="text-[10px] font-bold text-gray-400 uppercase">{item.label}</label>
                                                <div className="flex gap-1 mt-1">
                                                    <input list={item.list} value={form[item.field]} onChange={e=>setForm({...form, [item.field]: e.target.value})} className="flex-1 p-2 border rounded-xl text-xs" required />
                                                    <button type="button" onClick={()=>handlePaste(item.field)} className="px-2 bg-white border border-slate-200 rounded-lg text-[9px] font-bold hover:bg-slate-100">วาง</button>
                                                </div>
                                                <datalist id={item.list}>{data[item.list].map(n=><option key={n} value={n}/>)}</datalist>
                                            </div>
                                        ))}
                                    </div>

                                    <button type="submit" disabled={isSubmitting} className={`w-full p-4 rounded-2xl text-lg font-bold text-white shadow-lg transition-all ${isSubmitting?'bg-gray-300':'bg-blue-600 hover:bg-blue-700'}`}>
                                        {isSubmitting ? 'กำลังบันทึก...' : 'บันทึกรายงาน ER ERROR'}
                                    </button>
                                </form>
                            </div>
                        ) : (
                            /* --- History Tab --- */
                            <div className="animate-content space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-500">
                                        <div className="text-xs font-bold text-gray-400">ใบสั่งยารวม</div>
                                        <div className="text-3xl font-black text-blue-600">
                                            {useMemo(() => {
                                                const shifts = new Set(); let sum = 0;
                                                filteredHistory.forEach(h => {
                                                    if(h.totalRx && !shifts.has(h.shiftDate)) { sum += parseInt(h.totalRx); shifts.add(h.shiftDate); }
                                                });
                                                return sum;
                                            }, [filteredHistory])} <span className="text-xs font-normal">ใบ</span>
                                        </div>
                                    </div>
                                    <div className="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-red-500 flex justify-between items-center">
                                        <div>
                                            <div className="text-xs font-bold text-gray-400">Error รวม</div>
                                            <div className="text-3xl font-black text-red-600">
                                                {filteredHistory.filter(h=>h.errorType !== errorOptions[0]).length} <span className="text-xs font-normal text-gray-400">รายการ</span>
                                            </div>
                                        </div>
                                        <button onClick={generatePDF} className="bg-red-50 text-red-600 p-3 rounded-2xl flex flex-col items-center gap-1 hover:bg-red-100 transition-colors">
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                            <span className="text-[10px] font-bold">สร้าง PDF</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl shadow-sm p-6 border border-gray-100">
                                    <div className="flex flex-col md:flex-row justify-between gap-4 mb-6">
                                        <div className="flex gap-2 bg-gray-50 p-1 rounded-xl">
                                            <button onClick={()=>setFilterType('day')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition ${filterType==='day'?'bg-white shadow text-blue-600':'text-gray-400'}`}>รายวัน</button>
                                            <button onClick={()=>setFilterType('month')} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition ${filterType==='month'?'bg-white shadow text-blue-600':'text-gray-400'}`}>รายเดือน</button>
                                        </div>
                                        <div className="flex flex-1 gap-2">
                                            <input type="text" placeholder="ค้นหา HN..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="flex-1 p-2 border rounded-xl text-xs" />
                                            {filterType==='day' ? <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="p-2 border rounded-xl text-xs" /> : <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="p-2 border rounded-xl text-xs" />}
                                        </div>
                                    </div>
                                    
                                    <div className="mb-4 flex items-center gap-2 px-2">
                                        <input type="checkbox" id="exclude-no-error" checked={excludeNoError} onChange={e=>setExcludeNoError(e.target.checked)} className="w-4 h-4 rounded accent-blue-600" />
                                        <label htmlFor="exclude-no-error" className="text-xs font-bold text-gray-500">ไม่นับรวม ❌ไม่พบ Error (Default)</label>
                                    </div>

                                    <div className="overflow-x-auto rounded-xl border border-gray-50">
                                        <table className="w-full text-left text-[11px]">
                                            <thead className="bg-slate-50 text-slate-400 font-bold uppercase tracking-wider">
                                                <tr>
                                                    <th className="p-3">กะรับยา</th>
                                                    <th className="p-3">HN</th>
                                                    <th className="p-3">ความเสี่ยง</th>
                                                    <th className="p-3">ระดับ</th>
                                                    <th className="p-3">ผู้บันทึก</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {filteredHistory.map((h, i)=>(
                                                    <tr key={i} className="hover:bg-gray-50/50">
                                                        <td className="p-3 font-bold text-slate-600">{h.shiftDate}</td>
                                                        <td className="p-3 font-black text-blue-600">{h.hn || '-'}</td>
                                                        <td className={`p-3 font-bold ${h.errorType===errorOptions[0]?'text-green-400':'text-red-500'}`}>{h.errorType}</td>
                                                        <td className="p-3 text-center font-black">{h.severity || '-'}</td>
                                                        <td className="p-3 text-gray-400">{h.recorder}</td>
                                                    </tr>
                                                ))}
                                                {filteredHistory.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-gray-300 italic">ไม่พบข้อมูลตามเงื่อนไข</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
