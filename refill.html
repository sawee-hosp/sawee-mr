<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sawee Rxfill System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    
    /* 🎨 Background Gradient ทะแยงสีเขียวน้ำทะเล */
    .bg-ocean-gradient {
      background: linear-gradient(135deg, #0d9488 0%, #059669 100%);
    }

    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
    .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Custom Scrollbar สำหรับตาราง */
    .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px;}
    .custom-scroll::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px;}
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
  </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">
  <div id="root" class="flex-grow flex flex-col"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ⭐️ 1. ตั้งค่า Firebase ของคุณที่นี่
    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2"
    };

    // ⭐️ 2. ใส่ URL ของ Google Apps Script ที่ใช้รับไฟล์ PDF ลง Drive
    const GAS_DRIVE_URL = "https://script.google.com/macros/s/AKfycbyxqnZlYJKW22S_DO9PnYFQYsxs6SMbUVI5ckB7yZCDC6KhlqKpE8incdkzmuyVILCd/exec";

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    // --- STREAMING_CHUNK: Components พื้นฐาน ---
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 4000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-rose-500' : 'bg-teal-500';
      return (
        <div className={`fixed bottom-8 right-8 ${bgColor} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center z-50 animate-fade-in-up border border-white/20 backdrop-blur-sm`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-3 text-xl`}></i>
          <span className="font-medium">{message}</span>
        </div>
      );
    };

    const MessageBox = ({ title, message, onConfirm }) => (
      <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
        <div className="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full mx-4">
          <h3 className="text-xl font-bold text-slate-800 mb-2">{title}</h3>
          <p className="text-slate-600 mb-6">{message}</p>
          <div className="flex justify-end">
            <button onClick={onConfirm} className="bg-teal-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-teal-700 transition">ตกลง</button>
          </div>
        </div>
      </div>
    );

    // --- STREAMING_CHUNK: Main App Component ---
    function App() {
      const [loading, setLoading] = useState(true);
      const [appDb, setAppDb] = useState(null); 
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [msgBox, setMsgBox] = useState(null);
      const [currentReqId, setCurrentReqId] = useState(null);
      const [colleagues, setColleagues] = useState([]); // เพื่อนร่วม รพ.สต.

      const showToast = (message, type = 'success') => setToast({ message, type });
      const showAlert = (title, message) => setMsgBox({ title, message });

      const fetchData = async () => {
        setLoading(true);
        try {
          const [hospSnap, unitSnap, drugSnap, parSnap, balSnap, reqSnap] = await Promise.all([
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('master_drugs').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').orderBy('created_at', 'desc').get()
          ]);

          const units = unitSnap.docs.map(d => d.data());
          const drugs = drugSnap.docs.map(d => {
            const data = d.data();
            const matchedUnit = units.find(u => u.unit_id === data.unit_id);
            return { ...data, unit_display_name: matchedUnit ? matchedUnit.unit_name : data.unit_id };
          });

          setAppDb({
            hospitals: hospSnap.docs.map(d => d.data()),
            units: units,
            drugs: drugs,
            parLevels: parSnap.docs.map(d => d.data()),
            balances: balSnap.docs.map(d => d.data()),
            requisitions: reqSnap.docs.map(d => ({ id: d.id, ...d.data() }))
          });
        } catch (error) {
          console.error(error);
          showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
        } finally {
          setLoading(false);
        }
      };

      const fetchColleagues = async (hospitalId) => {
        try {
          const snapshot = await db.collection('users').where('hospital_id', '==', hospitalId).get();
          const users = snapshot.docs.map(d => d.data());
          setColleagues(users);
        } catch (e) { console.error("Error fetching colleagues", e); }
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
              const userData = { uid: user.uid, email: user.email, ...userDoc.data() };
              setCurrentUser(userData);
              if(userData.role === 'hospital') fetchColleagues(userData.hospital_id);
              setCurrentView('dashboard');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          fetchData(); 
        });
        return () => unsubscribe();
      }, []);

      const handleAuth = async (action, data) => {
        setLoading(true);
        try {
          if (action === 'login') {
            await auth.signInWithEmailAndPassword(data.email, data.password);
            showToast('เข้าสู่ระบบสำเร็จ');
          } else if (action === 'register') {
            if(!data.hospitalId) throw new Error("กรุณาระบุ รพ.สต. ต้นสังกัด");
            const userCred = await auth.createUserWithEmailAndPassword(data.email, data.password);
            await db.collection('users').doc(userCred.user.uid).set({
              name: data.name,
              hospital_id: data.hospitalId,
              role: 'hospital',
              created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('ลงทะเบียนสำเร็จ');
          }
        } catch (error) {
          showToast(error.message, 'error');
          setLoading(false);
        }
      };

      // --- STREAMING_CHUNK: View - Authentication ---
      const AuthView = ({ mode }) => {
        const [formData, setFormData] = useState({ email: '', password: '', name: '', hospitalId: '' });
        const isLogin = mode === 'login';

        return (
          <div className="flex-grow flex items-center justify-center p-6 bg-ocean-gradient">
            <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/50">
              <div className="text-center mb-8">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-teal-100 text-teal-600 mb-4 shadow-inner">
                  <i className="fa-solid fa-pills text-3xl"></i>
                </div>
                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Sawee Rxfill</h1>
                <p className="text-teal-600 font-medium mt-1">{isLogin ? 'ระบบเติมยา รพ.สต.' : 'ลงทะเบียนผู้ใช้งานใหม่'}</p>
              </div>
              
              <div className="space-y-4">
                {!isLogin && (
                  <input type="text" className="w-full border-slate-200 border rounded-xl p-3 bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-teal-500 transition" placeholder="ชื่อ-นามสกุล" onChange={e => setFormData({...formData, name: e.target.value})} />
                )}
                <input type="email" className="w-full border-slate-200 border rounded-xl p-3 bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-teal-500 transition" placeholder="อีเมล (Email)" onChange={e => setFormData({...formData, email: e.target.value})} />
                <input type="password" className="w-full border-slate-200 border rounded-xl p-3 bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-teal-500 transition" placeholder="รหัสผ่าน (Password)" onChange={e => setFormData({...formData, password: e.target.value})} onKeyDown={e => e.key === 'Enter' && isLogin && handleAuth('login', formData)} />
                
                {!isLogin && (
                  <select className="w-full border-slate-200 border rounded-xl p-3 bg-slate-50 focus:bg-white outline-none focus:ring-2 focus:ring-teal-500 transition" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                    <option value="">-- เลือก รพ.สต. ต้นสังกัด --</option>
                    {appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
                  </select>
                )}

                <button onClick={() => handleAuth(isLogin ? 'login' : 'register', formData)} className="w-full bg-teal-600 text-white rounded-xl p-3.5 font-bold text-lg hover:bg-teal-700 shadow-lg shadow-teal-500/30 transition transform hover:-translate-y-0.5">
                  {isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียน'}
                </button>
              </div>
              
              <div className="mt-6 text-center text-sm font-medium">
                {isLogin ? (
                  <button onClick={() => setCurrentView('register')} className="text-teal-600 hover:text-teal-800">ยังไม่มีบัญชี? ลงทะเบียนที่นี่</button>
                ) : (
                  <button onClick={() => setCurrentView('login')} className="text-slate-500 hover:text-slate-800">กลับไปหน้าเข้าสู่ระบบ</button>
                )}
              </div>
            </div>
          </div>
        );
      };

      if (loading) {
        return (
          <div className="flex-grow flex flex-col items-center justify-center bg-ocean-gradient">
            <div className="loader mb-4 shadow-lg"></div>
            <p className="text-white font-semibold text-lg tracking-wide animate-pulse shadow-black drop-shadow-md">กำลังโหลดข้อมูลระบบ...</p>
          </div>
        );
      }
      if (currentView === 'login' || currentView === 'register') return <><AuthView mode={currentView} />{toast && <Toast {...toast} onClose={() => setToast(null)} />}</>;

      // --- STREAMING_CHUNK: View - Dashboard ---
      const DashboardView = () => {
        const isHospital = currentUser?.role === 'hospital';
        const myReqs = isHospital ? appDb.requisitions.filter(r => r.hospitalId === currentUser.hospital_id) : appDb.requisitions;
        const myHospital = appDb.hospitals.find(h => h.hospital_id === currentUser.hospital_id);
        
        return (
          <div className="space-y-6 animate-fade-in pb-10">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
              <div>
                <h2 className="text-3xl font-extrabold text-slate-800 tracking-tight">แดชบอร์ดภาพรวม</h2>
                <p className="text-slate-500 text-lg mt-1">ยินดีต้อนรับ, <span className="font-semibold text-teal-700">{currentUser.name}</span> {isHospital && `(${myHospital?.hospital_name})`}</p>
              </div>
              <div>
                {isHospital && (
                  <button onClick={() => setCurrentView('create_req')} className="bg-teal-600 text-white px-6 py-3 rounded-xl shadow-lg shadow-teal-500/30 font-semibold hover:bg-teal-700 transition transform hover:-translate-y-1 flex items-center">
                    <i className="fa-solid fa-truck-medical mr-2 text-xl"></i> ทำรายการเติมยา (Rxfill)
                  </button>
                )}
              </div>
            </div>
            
            {/* กล่องสถานะ */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 relative overflow-hidden group">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition duration-300"><i className="fa-solid fa-file-lines text-6xl text-blue-500"></i></div>
                <div className="text-slate-500 font-medium mb-1 relative z-10">รายการทั้งหมด</div>
                <div className="text-4xl font-extrabold text-slate-800 relative z-10">{myReqs.length}</div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 relative overflow-hidden group">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition duration-300"><i className="fa-solid fa-clock text-6xl text-amber-500"></i></div>
                <div className="text-slate-500 font-medium mb-1 relative z-10">รอดำเนินการ</div>
                <div className="text-4xl font-extrabold text-amber-500 relative z-10">{myReqs.filter(r => r.status === 'Pending').length}</div>
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 relative overflow-hidden group">
                <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-110 transition duration-300"><i className="fa-solid fa-box-check text-6xl text-emerald-500"></i></div>
                <div className="text-slate-500 font-medium mb-1 relative z-10">อนุมัติ/จัดยาแล้ว</div>
                <div className="text-4xl font-extrabold text-emerald-500 relative z-10">{myReqs.filter(r => r.status === 'Completed').length}</div>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              {/* ตารางประวัติ */}
              <div className="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col h-full">
                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                  <h3 className="font-bold text-lg text-slate-800"><i className="fa-solid fa-clock-rotate-left mr-2 text-teal-600"></i> ประวัติการเติมยา</h3>
                </div>
                <div className="overflow-x-auto custom-scroll flex-grow">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="border-b text-sm text-slate-500 bg-white">
                        <th className="p-4 font-semibold">รหัสเอกสาร</th>
                        {!isHospital && <th className="p-4 font-semibold">หน่วยงาน</th>}
                        <th className="p-4 font-semibold">รอบบิล</th>
                        <th className="p-4 font-semibold">สถานะ</th>
                        <th className="p-4 font-semibold text-right">จัดการ</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-50">
                      {myReqs.map(req => {
                        const hosp = appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
                        return (
                          <tr key={req.id} className="hover:bg-slate-50/80 transition">
                            <td className="p-4 font-mono text-sm text-slate-700">{req.id}</td>
                            {!isHospital && <td className="p-4 text-slate-600">{hosp?.hospital_name}</td>}
                            <td className="p-4 font-medium">{req.month}/{req.year}</td>
                            <td className="p-4">
                              <span className={`px-3 py-1 rounded-full text-xs font-bold tracking-wide ${req.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                {req.status === 'Pending' ? 'รออนุมัติ' : 'จัดยาแล้ว'}
                              </span>
                            </td>
                            <td className="p-4 text-right">
                               <button onClick={() => { setCurrentReqId(req.id); setCurrentView('view_req'); }} className="bg-slate-100 hover:bg-teal-100 text-slate-600 hover:text-teal-700 px-3 py-1.5 rounded-lg text-sm font-medium transition duration-200">
                                 เปิดดู
                               </button>
                            </td>
                          </tr>
                        );
                      })}
                      {myReqs.length === 0 && <tr><td colSpan="5" className="p-10 text-center text-slate-400 italic">ยังไม่มีประวัติการทำรายการ</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* รายชื่อบุคลากร (เฉพาะฝั่ง รพ.สต.) */}
              {isHospital && (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                  <div className="p-5 border-b border-slate-100 bg-slate-50/50">
                    <h3 className="font-bold text-lg text-slate-800"><i className="fa-solid fa-users mr-2 text-indigo-500"></i> บุคลากรในหน่วยงาน</h3>
                  </div>
                  <div className="p-2 flex-grow overflow-y-auto custom-scroll max-h-96">
                    {colleagues.map((user, idx) => (
                      <div key={idx} className="flex items-center p-3 hover:bg-slate-50 rounded-xl transition">
                        <div className="w-10 h-10 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center font-bold text-lg shadow-sm">
                          {user.name.charAt(0)}
                        </div>
                        <div className="ml-3">
                          <div className="font-semibold text-slate-800">{user.name} {user.email === currentUser.email && <span className="text-xs bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full ml-1">คุณ</span>}</div>
                          <div className="text-xs text-slate-500">{user.email}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- STREAMING_CHUNK: View - เติมยา (Rxfill) + VMI Logic ---
      const RxfillView = () => {
        const today = new Date();
        const currentMonth = today.getMonth() + 1;
        const currentYear = today.getFullYear();
        const date = today.getDate();
        const hospId = currentUser.hospital_id;

        // เช็คช่วงเวลาการเบิก (วันที่ 25 ถึงสิ้นเดือน)
        const isAllowedPeriod = date >= 25 || currentUser.role === 'admin'; // Admin bypass
        
        // VMI Settings
        const [multiplier, setMultiplier] = useState(1.25); // Default: ส่งยา 7 วัน = Stock 1.25x ของการใช้
        const [proofFile, setProofFile] = useState(null);
        const [isSubmitting, setIsSubmitting] = useState(false);

        const [items, setItems] = useState(() => {
          const myPars = appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
          return myPars.map(par => {
            const drug = appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
            const excess = bal ? Number(bal.excess_balance) : 0;
            const parStock = Number(par.par_qty) || 0; // ในระบบ VMI นี้ Par คือฐานตั้งต้น หรือยอดใช้อ้างอิง
            
            return {
              drugId: par.drug_id, 
              name: drug ? drug.drug_name : 'ไม่พบชื่อยา', 
              unit: drug ? drug.unit_display_name : '',
              packSize: Number(drug ? drug.pack_size : 1),
              parQty: parStock, 
              prevExcess: excess, 
              usage: 0, // ยอดใช้เดือนล่าสุด
              avgUsage: parStock, // สมมติให้ค่า Par เดิม เป็นค่าเฉลี่ย 3 เดือน (ปรับแก้ได้)
              targetStock: Math.ceil(parStock * 1.25), 
              netNeed: 0, 
              dispensePack: 0, 
              dispenseQty: 0, 
              newExcess: excess
            };
          });
        });

        // อัปเดตการคำนวณ VMI เมื่อมีการเปลี่ยน Multiplier หรือ กรอก Usage
        const recalculateRow = (row, mult) => {
          // คำนวณสต๊อกเป้าหมาย (Target Stock) = Average Usage * Multiplier
          const target = Math.ceil(row.avgUsage * mult);
          row.targetStock = target;

          // คำนวณความต้องการสุทธิ (Need) = Target Stock - ยอดยกมา (ที่เหลืออยู่จริง)
          // *หมายเหตุ: ในระบบจริง ยอดยกมา = ยอดยกมาเดือนก่อน - ยอดใช้เดือนนี้
          const currentBal = Math.max(0, row.prevExcess - row.usage);
          let netNeed = target - currentBal;

          if (netNeed <= 0) {
            row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0;
            row.newExcess = currentBal;
          } else {
            row.netNeed = netNeed;
            row.dispensePack = Math.ceil(netNeed / row.packSize);
            row.dispenseQty = row.dispensePack * row.packSize;
            row.newExcess = currentBal + row.dispenseQty - target; // ยอดที่จะเหลือยกไป
          }
          return row;
        };

        const handleMultiplierChange = (val) => {
          const mult = parseFloat(val);
          setMultiplier(mult);
          setItems(items.map(row => recalculateRow({...row}, mult)));
        };

        const updateField = (index, field, val) => {
          const num = parseInt(val) || 0;
          const newItems = [...items];
          newItems[index][field] = num;
          newItems[index] = recalculateRow(newItems[index], multiplier);
          setItems(newItems);
        };

        const handleFileChange = (e) => {
          const file = e.target.files[0];
          if (file && file.type === "application/pdf") {
            if(file.size > 5 * 1024 * 1024) {
              showAlert("ไฟล์ใหญ่เกินไป", "กรุณาแนบไฟล์ PDF ขนาดไม่เกิน 5MB");
              e.target.value = "";
              return;
            }
            const reader = new FileReader();
            reader.onload = (event) => {
              const base64String = event.target.result.split(',')[1];
              setProofFile({ name: file.name, base64: base64String });
            };
            reader.readAsDataURL(file);
          } else {
            showAlert("ประเภทไฟล์ไม่ถูกต้อง", "กรุณาแนบไฟล์นามสกุล .pdf เท่านั้น (Export จาก JHCIS)");
            e.target.value = "";
          }
        };

        const handleSubmit = async () => {
          if (!proofFile) return showAlert("ข้อมูลไม่ครบถ้วน", "กรุณาแนบไฟล์ PDF รายงานการใช้ยาจาก JHCIS เพื่อเป็นหลักฐานประกอบการเติมยา");
          if (items.filter(i => i.usage > 0).length === 0) return showAlert("เตือน", "กรุณาระบุยอดการใช้ยาอย่างน้อย 1 รายการ");

          setIsSubmitting(true);
          const newId = `RXF-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*10000).toString().padStart(4, '0')}`;
          
          try {
            // 1. ส่งไฟล์ไปเข้า Google Drive ผ่าน Apps Script
            showToast('กำลังอัปโหลดไฟล์ PDF... กรุณารอสักครู่', 'success');
            let fileUrl = "";
            if (GAS_DRIVE_URL.startsWith("http")) {
               const res = await fetch(GAS_DRIVE_URL, {
                 method: 'POST',
                 body: JSON.stringify({ filename: `${newId}_${proofFile.name}`, base64: proofFile.base64 })
               });
               const data = await res.json();
               if(data.status === 'success') fileUrl = data.fileUrl;
               else throw new Error("อัปโหลดไฟล์ล้มเหลว: " + data.message);
            } else {
               // สำรองกรณีไม่ได้ใส่ URL
               fileUrl = "ไม่มีลิงก์ (ไม่ได้ตั้งค่า GAS URL)";
            }

            // 2. บันทึกข้อมูลลง Firebase
            await db.collection('requisitions').doc(newId).set({
              hospitalId: hospId,
              month: currentMonth,
              year: currentYear,
              status: 'Pending',
              multiplier: multiplier,
              proofUrl: fileUrl,

            });

            fetchData();

                </thead>
                <tbody className="divide-y divide-slate-100">
                  {items.map((item, idx) => (
                    <tr key={item.drugId} className="hover:bg-slate-50 transition">
                      <td className="p-3">
                        <div className="font-semibold text-slate-800">{item.name}</div>
                        <div className="text-xs text-slate-500 font-medium">หน่วยย่อย: {item.unit}</div>

                        <input type="number" min="0" className="w-20 border border-blue-300 rounded-md p-1.5 text-center outline-none focus:ring-2 focus:ring-blue-600 font-bold text-blue-800 bg-white shadow-inner" value={item.usage || ''} onChange={e => updateField(idx, 'usage', e.target.value)} placeholder="0" />

              </button>
            </div>
          </div>

              batch.set(db.collection('current_excess').doc(docId), {
                hospital_id: req.hospitalId, drug_id: item.drugId,

              }, { merge: true });
            });

            showToast('อนุมัติและตัดจ่ายสต๊อกเรียบร้อย');
            fetchData();
            setCurrentView('dashboard');

              <div className="flex gap-2">
                <button onClick={() => setActiveTab('drugs')} className={`px-4 py-2 rounded-lg font-medium transition ${activeTab==='drugs'?'bg-teal-600':'bg-slate-700 hover:bg-slate-600'}`}>รายการยา</button>
                <button onClick={() => setActiveTab('hospitals')} className={`px-4 py-2 rounded-lg font-medium transition ${activeTab==='hospitals'?'bg-teal-600':'bg-slate-700 hover:bg-slate-600'}`}>รพ.สต.</button>
                <button onClick={() => setActiveTab('par')} className={`px-4 py-2 rounded-lg font-medium transition ${activeTab==='par'?'bg-teal-600':'bg-slate-700 hover:bg-slate-600'}`}>ตั้งค่า Par / ยอดยกมา</button>
              </div>
            </div>

            <div className="p-6 flex-grow overflow-auto bg-slate-50">
              
              {/* Tab ยา */}
              {activeTab === 'drugs' && (
                <div>
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-bold text-slate-800">รายการยาและเวชภัณฑ์ทั้งหมด</h3>
                    <button onClick={() => setEditItem({})} className="bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-teal-700"><i className="fa-solid fa-plus mr-2"></i>เพิ่มรายการใหม่</button>
                  </div>
                  
                  {editItem !== null && (
                    <form onSubmit={saveDrug} className="bg-white p-5 rounded-xl shadow-md border border-teal-100 mb-6 grid grid-cols-2 md:grid-cols-6 gap-4 items-end animate-fade-in">
                      <div className="col-span-2 md:col-span-1">
                        <label className="block text-xs font-bold text-slate-500 mb-1">รหัสยา</label>
                        <input name="drug_id" defaultValue={editItem.drug_id} required className="w-full border rounded p-2 text-sm outline-none focus:border-teal-500" placeholder="เช่น 01201" readOnly={!!editItem.drug_id} />
                      </div>
                      <div className="col-span-2 md:col-span-2">
                        <label className="block text-xs font-bold text-slate-500 mb-1">ชื่อยา</label>
                        <input name="drug_name" defaultValue={editItem.drug_name} required className="w-full border rounded p-2 text-sm outline-none focus:border-teal-500" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">Pack Size</label>
                        <input name="pack_size" type="number" defaultValue={editItem.pack_size} required className="w-full border rounded p-2 text-sm outline-none focus:border-teal-500" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">หน่วยนับ</label>
                        <select name="unit_id" defaultValue={editItem.unit_id} className="w-full border rounded p-2 text-sm bg-white">
                          {appDb.units.map(u => <option key={u.unit_id} value={u.unit_id}>{u.unit_name}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-1">ประเภท</label>
                        <select name="type" defaultValue={editItem.type} className="w-full border rounded p-2 text-sm bg-white">
                          <option value="DRUG">ยา</option><option value="MED">เวชภัณฑ์</option>
                        </select>
                      </div>
                      <div className="col-span-2 md:col-span-6 flex justify-end gap-2 mt-2">
                        <button type="button" onClick={() => setEditItem(null)} className="text-slate-500 px-4 py-2 hover:bg-slate-100 rounded">ยกเลิก</button>
                        <button type="submit" className="bg-teal-600 text-white px-6 py-2 rounded font-medium shadow-sm hover:bg-teal-700">บันทึก</button>
                      </div>
                    </form>
                  )}

                  <div className="bg-white border rounded-xl overflow-hidden shadow-sm">
                    <table className="w-full text-left">
                      <thead className="bg-slate-100 text-slate-600 text-sm border-b">
                        <tr><th className="p-3">รหัส</th><th className="p-3">ชื่อยา</th><th className="p-3 text-center">Pack</th><th className="p-3">หน่วย</th><th className="p-3 text-center">จัดการ</th></tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {appDb.drugs.map(d => (
                          <tr key={d.drug_id} className="hover:bg-slate-50">
                            <td className="p-3 font-mono text-sm">{d.drug_id}</td>
                            <td className="p-3 font-medium text-slate-800">{d.drug_name} <span className="text-xs bg-slate-200 text-slate-600 px-2 py-0.5 rounded ml-2">{d.type}</span></td>
                            <td className="p-3 text-center">{d.pack_size}</td>
                            <td className="p-3">{d.unit_display_name}</td>
                            <td className="p-3 text-center space-x-3">
                              <button onClick={() => setEditItem(d)} className="text-amber-500 hover:text-amber-700"><i className="fa-solid fa-pen-to-square"></i></button>
                              <button onClick={() => deleteDocument('master_drugs', d.drug_id)} className="text-rose-500 hover:text-rose-700"><i className="fa-solid fa-trash-can"></i></button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* Tab Par / Stock แบบแก้ไขทันที (Quick Edit) */}
              {activeTab === 'par' && (
                <div className="animate-fade-in">
                  <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6">
                    <h3 className="font-bold text-blue-800"><i className="fa-solid fa-circle-info mr-2"></i>ระบบปรับปรุงยอดสต๊อกเริ่มต้น (Initial Stock)</h3>
                    <p className="text-sm text-blue-600 mt-1">แอดมินสามารถปรับฐานการคำนวณ (Par) และยอดยกมาของแต่ละ รพ.สต. เพื่อให้การคำนวณ VMI ในรอบถัดไปแม่นยำขึ้น ระบบจะบันทึกอัตโนมัติเมื่อเปลี่ยนช่อง (Auto-save)</p>
                  </div>
                  
                  {appDb.hospitals.map(hosp => (
                    <div key={hosp.hospital_id} className="mb-8 bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                      <div className="bg-slate-800 text-white p-3 font-bold flex justify-between items-center">
                        <span><i className="fa-solid fa-house-medical mr-2 text-teal-400"></i>{hosp.hospital_name} ({hosp.hospital_id})</span>
                      </div>
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm">
                          <thead className="bg-slate-100 text-slate-600">
                            <tr><th className="p-2 border-r">รายการยา</th><th className="p-2 text-center bg-teal-50 w-32 border-r">ฐานยอดใช้ (Par)</th><th className="p-2 text-center bg-amber-50 w-32">ยอดยกมา (แก้ไข)</th></tr>
                          </thead>
                          <tbody>
                            {appDb.drugs.map(drug => {
                              const docId = `${hosp.hospital_id}_${drug.drug_id}`;
                              const par = appDb.parLevels.find(p => p.hospital_id === hosp.hospital_id && p.drug_id === drug.drug_id)?.par_qty || 0;
                              const bal = appDb.balances.find(b => b.hospital_id === hosp.hospital_id && b.drug_id === drug.drug_id)?.excess_balance || 0;
                              
                              return (
                                <tr key={drug.drug_id} className="border-b hover:bg-slate-50">
                                  <td className="p-2 border-r font-medium">{drug.drug_name}</td>
                                  <td className="p-1 border-r bg-teal-50/30">
                                    <input type="number" defaultValue={par} className="w-full border-none bg-transparent text-center outline-none focus:bg-white focus:ring-1 focus:ring-teal-500 rounded p-1 font-bold text-teal-700" 
                                      onBlur={e => db.collection('config_par').doc(docId).set({hospital_id: hosp.hospital_id, drug_id: drug.drug_id, par_qty: Number(e.target.value)}, {merge:true})} />
                                  </td>
                                  <td className="p-1 bg-amber-50/30">
                                    <input type="number" defaultValue={bal} className="w-full border-none bg-transparent text-center outline-none focus:bg-white focus:ring-1 focus:ring-amber-500 rounded p-1 font-bold text-amber-700" 
                                      onBlur={e => db.collection('current_excess').doc(docId).set({hospital_id: hosp.hospital_id, drug_id: drug.drug_id, excess_balance: Number(e.target.value), last_updated: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true})} />
                                  </td>
                                </tr>
                              )
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {/* Tab โรงพยาบาล (แถมโครงสร้างให้) */}
              {activeTab === 'hospitals' && (
                 <div className="bg-white border rounded-xl overflow-hidden shadow-sm p-8 text-center text-slate-500">
                    <i className="fa-solid fa-tools text-5xl mb-4 text-slate-300"></i>
                    <p>ระบบจัดการ รพ.สต. กำลังอยู่ในช่วงพัฒนาเพิ่ม...</p>
                 </div>
              )}
            </div>
          </div>
        );
      };

      // --- STREAMING_CHUNK: Layout หลัก ---
      return (
        <div className="flex-grow flex flex-col md:flex-row bg-slate-100">
          {/* Sidebar */}
          <div className="w-full md:w-72 bg-slate-900 text-slate-300 flex flex-col no-print shadow-2xl z-20 shrink-0">
            <div className="p-6 flex items-center bg-slate-950 border-b border-slate-800">
              <div className="bg-teal-500 w-10 h-10 rounded-lg flex items-center justify-center text-white mr-4 shadow-lg shadow-teal-500/20">
                <i className="fa-solid fa-pills text-xl"></i>
              </div>
              <div>
                <h1 className="text-xl font-bold text-white tracking-wide">Sawee Rxfill</h1>
                <div className="text-xs text-teal-400 font-mono">VMI Edition</div>
              </div>
            </div>
            
            <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-3.5 rounded-xl font-medium transition duration-200 flex items-center ${currentView==='dashboard'?'bg-teal-600 text-white shadow-lg shadow-teal-900/50':'hover:bg-slate-800 hover:text-white'}`}>
                <i className="fa-solid fa-chart-pie w-6 text-center mr-2"></i> แดชบอร์ด
              </button>
              
              {currentUser?.role === 'hospital' && (
                <button onClick={() => setCurrentView('create_req')} className={`w-full text-left p-3.5 rounded-xl font-medium transition duration-200 flex items-center ${currentView==='create_req'?'bg-teal-600 text-white shadow-lg shadow-teal-900/50':'hover:bg-slate-800 hover:text-white'}`}>
                  <i className="fa-solid fa-truck-medical w-6 text-center mr-2"></i> เติมยา (Rxfill)
                </button>
              )}
              
              {currentUser?.role === 'admin' && (
                <button onClick={() => setCurrentView('admin_manager')} className={`w-full text-left p-3.5 rounded-xl font-medium transition duration-200 flex items-center ${currentView==='admin_manager'?'bg-teal-600 text-white shadow-lg shadow-teal-900/50':'hover:bg-slate-800 hover:text-white'}`}>
                  <i className="fa-solid fa-database w-6 text-center mr-2"></i> จัดการฐานข้อมูล
                </button>
              )}
            </nav>
            
            <div className="p-5 border-t border-slate-800 bg-slate-900/50">
              <div className="flex items-center mb-4 px-2">
                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold text-sm mr-3">
                  {currentUser?.name?.charAt(0)}
                </div>
                <div className="overflow-hidden">
                  <div className="text-white text-sm font-medium truncate">{currentUser?.name}</div>
                  <div className="text-xs text-slate-500 truncate">{currentUser?.role === 'admin' ? 'Administrator' : 'เจ้าหน้าที่ รพ.สต.'}</div>
                </div>
              </div>
              <button onClick={() => { setMsgBox({title: 'ออกจากระบบ', message: 'คุณต้องการออกจากระบบใช่หรือไม่?', onConfirm: () => { auth.signOut(); setMsgBox(null); }}) }} className="w-full text-center p-2.5 rounded-lg border border-slate-700 text-slate-400 hover:bg-rose-600 hover:text-white hover:border-rose-600 transition duration-200 font-medium text-sm">
                <i className="fa-solid fa-right-from-bracket mr-2"></i> ออกจากระบบ
              </button>
            </div>
          </div>
          
          {/* Main Content Area */}
          <div className="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
            <main className="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-100">
              <div className="max-w-7xl mx-auto">
                {currentView === 'dashboard' && <DashboardView />}
                {currentView === 'create_req' && <CreateReqView />}
                {currentView === 'view_req' && <ViewReqView />}
                {currentView === 'admin_manager' && <AdminManagerView />}
              </div>
            </main>
            
            {/* ⭐️ Footer ใหม่ */}
            <footer className="bg-slate-800 text-slate-400 text-center py-4 text-sm font-medium no-print shadow-inner z-10 shrink-0">
              Sawee Rxfill System V2 (VMI) &copy; 2026 | กรณีมีปัญหาการใช้งาน กรุณาติดต่อ Admin โทร: <span className="text-teal-400 font-bold">089-290-9255</span>
            </footer>
          </div>
          
          {toast && <Toast {...toast} onClose={() => setToast(null)} />}
          {msgBox && <MessageBox {...msgBox} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
