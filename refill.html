<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sawee Rxfill (Firebase Edition)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; }
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d9488; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    // ⭐️ Config ของคุณใส่ไว้ให้แล้วครับ
    const firebaseConfig = {
      apiKey: "AIzaSyAnzXAEkH8Zz0Ur4lCQ00qa4UqYATTikAs",
      authDomain: "sawee-rxfill.firebaseapp.com",
      projectId: "sawee-rxfill",
      storageBucket: "sawee-rxfill.firebasestorage.app",
      messagingSenderId: "186506077335",
      appId: "1:186506077335:web:71c5f6f90bb26e767df5d2",
      measurementId: "G-XFL0L1L213"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const auth = firebase.auth();

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div className={`fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg flex items-center z-50`}>
          <i className={`fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'} mr-2`}></i>
          {message}
        </div>
      );
    };

    function App() {
      const [loading, setLoading] = useState(true);
      const [appDb, setAppDb] = useState(null); 
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState('login');
      const [toast, setToast] = useState(null);
      const [currentReqId, setCurrentReqId] = useState(null);

      const showToast = (message, type = 'success') => setToast({ message, type });

      const fetchData = async () => {
        setLoading(true);
        try {
          const [hospSnap, unitSnap, drugSnap, parSnap, balSnap, reqSnap] = await Promise.all([
            db.collection('master_hospitals').get(),
            db.collection('master_unit').get(),
            db.collection('master_drugs').get(),
            db.collection('config_par').get(),
            db.collection('current_excess').get(),
            db.collection('requisitions').orderBy('created_at', 'desc').get()
          ]);

          const units = unitSnap.docs.map(d => d.data());
          const drugs = drugSnap.docs.map(d => {
            const data = d.data();
            const matchedUnit = units.find(u => u.unit_id === data.unit_id);
            return { ...data, unit_display_name: matchedUnit ? matchedUnit.unit_name : data.unit_id };
          });
          const requisitions = reqSnap.docs.map(d => ({ id: d.id, ...d.data() }));

          setAppDb({
            hospitals: hospSnap.docs.map(d => d.data()),
            drugs: drugs,
            parLevels: parSnap.docs.map(d => d.data()),
            balances: balSnap.docs.map(d => d.data()),
            requisitions: requisitions
          });
        } catch (error) {
          console.error(error);
          showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {
            const userDoc = await db.collection('users').doc(user.uid).get();
            if (userDoc.exists) {
              setCurrentUser({ uid: user.uid, email: user.email, ...userDoc.data() });
              setCurrentView('dashboard');
            }
          } else {
            setCurrentUser(null);
            setCurrentView('login');
          }
          fetchData(); 
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = async (email, password) => {
        setLoading(true);
        try {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('เข้าสู่ระบบสำเร็จ');
        } catch (error) {
          showToast('อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
          setLoading(false);
        }
      };

      const handleRegister = async (formData) => {
        try {
          const userCredential = await auth.createUserWithEmailAndPassword(formData.email, formData.password);
          const user = userCredential.user;
          await db.collection('users').doc(user.uid).set({
            name: formData.name,
            hospital_id: formData.hospitalId,
            role: 'hospital',
            created_at: firebase.firestore.FieldValue.serverTimestamp()
          });
          showToast('ลงทะเบียนสำเร็จ ระบบล็อกอินให้อัตโนมัติ');
        } catch (error) {
          showToast(error.message, 'error');
        }
      };

      // ⭐️ ฟังก์ชันดูดข้อมูลจาก Sheets โดยตรง
      const migrateFromSheets = async () => {
        const gasUrl = prompt("กรุณาวาง URL ของ Google Apps Script (Web App) เดิมที่คุณเคยใช้เชื่อมต่อ:");
        if (!gasUrl) return;

        showToast('กำลังโหลดข้อมูลจาก Sheets... อาจใช้เวลาสักครู่');
        
        try {
          const res = await fetch(gasUrl, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'getInitialData' })
          });
          
          const responseData = await res.json();
          if(responseData.status !== 'success') {
             throw new Error(responseData.message || "รูปแบบข้อมูลผิดพลาด");
          }

          const data = responseData.data;
          const batch = db.batch();

          // โอนถ่ายข้อมูล รพ.สต.
          if(data.hospitals) {
            data.hospitals.forEach(h => {
              if(h.hospital_id) batch.set(db.collection('master_hospitals').doc(String(h.hospital_id)), h);
            });
          }

          // โอนถ่ายข้อมูลยา
          if(data.drugs) {
            data.drugs.forEach(d => {
              if(d.drug_id) {
                d.pack_size = Number(d.pack_size) || 1;
                batch.set(db.collection('master_drugs').doc(String(d.drug_id)), d);
              }
            });
          }

          // โอนถ่ายข้อมูล Par
          if(data.parLevels) {
            data.parLevels.forEach(p => {
              if(p.hospital_id && p.drug_id) {
                const docId = `${p.hospital_id}_${p.drug_id}`;
                p.par_qty = Number(p.par_qty) || 0;
                batch.set(db.collection('config_par').doc(docId), p);
              }
            });
          }

          // โอนถ่ายข้อมูลยอดยกมา
          if(data.balances) {
            data.balances.forEach(b => {
              if(b.hospital_id && b.drug_id) {
                const docId = `${b.hospital_id}_${b.drug_id}`;
                b.excess_balance = Number(b.excess_balance) || 0;
                b.last_updated = firebase.firestore.FieldValue.serverTimestamp();
                batch.set(db.collection('current_excess').doc(docId), b);
              }
            });
          }

          await batch.commit();
          showToast('✅ ย้ายข้อมูลจาก Google Sheets เข้าสู่ Firebase สำเร็จ!');
          
          // เปลี่ยนสิทธิ์ตัวเองให้เป็น Admin ด้วย
          await db.collection('users').doc(currentUser.uid).update({ role: 'admin' });
          setCurrentUser({...currentUser, role: 'admin'});
          
          fetchData(); // โหลดหน้าใหม่
        } catch (e) {
          showToast('ผิดพลาด: ' + e.message, 'error');
        }
      };

      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
            <div className="loader mb-4"></div>
            <p className="text-teal-600 font-semibold animate-pulse">กำลังโหลดข้อมูลจาก Firebase...</p>
          </div>
        );
      }

      const LoginView = () => {
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
              <div className="flex flex-col items-center mb-8">
                <div className="bg-teal-600 p-4 rounded-full text-white mb-4 shadow-lg text-2xl">
                  <i className="fa-solid fa-fire"></i>
                </div>
                <h1 className="text-2xl font-bold">Sawee Rxfill</h1>
                <p className="text-slate-500 text-sm">Powered by Firebase</p>
              </div>
              <div className="space-y-4">
                <input type="email" className="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-teal-500" placeholder="อีเมล (Email)" value={email} onChange={e => setEmail(e.target.value)} />
                <input type="password" className="w-full border rounded-lg p-3 outline-none focus:ring-2 focus:ring-teal-500" placeholder="รหัสผ่าน (Password)" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin(email, password)} />
                <button onClick={() => handleLogin(email, password)} className="w-full bg-teal-600 text-white rounded-lg p-3 font-semibold hover:bg-teal-700">เข้าสู่ระบบ</button>
              </div>
              <div className="flex justify-between mt-4 text-sm text-teal-600">
                <button onClick={() => setCurrentView('register')} className="hover:underline">ลงทะเบียนผู้ใช้ใหม่</button>
                <button onClick={() => {
                  const resetEmail = prompt("กรุณากรอกอีเมลของคุณเพื่อรับลิงก์ตั้งรหัสผ่านใหม่:");
                  if(resetEmail) {
                    auth.sendPasswordResetEmail(resetEmail).then(() => showToast('ส่งลิงก์ไปที่อีเมลแล้ว')).catch(e => showToast(e.message, 'error'));
                  }
                }} className="hover:underline">ลืมรหัสผ่าน?</button>
              </div>
            </div>
          </div>
        );
      };

      const RegisterView = () => {
        const [formData, setFormData] = useState({ email: '', password: '', name: '', hospitalId: '' });
        const [isSubmitting, setIsSubmitting] = useState(false);

        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
              <h2 className="text-2xl font-bold mb-6 text-center text-teal-800">ลงทะเบียนเข้าใช้งาน</h2>
              <div className="space-y-4">
                <input type="email" className="w-full border rounded-lg p-3" placeholder="อีเมล (สำหรับ Login และกู้รหัส)" onChange={e => setFormData({...formData, email: e.target.value})} />
                <input type="password" className="w-full border rounded-lg p-3" placeholder="รหัสผ่าน (ขั้นต่ำ 6 ตัวอักษร)" onChange={e => setFormData({...formData, password: e.target.value})} />
                <input type="text" className="w-full border rounded-lg p-3" placeholder="ชื่อ-นามสกุล ผู้ใช้งาน" onChange={e => setFormData({...formData, name: e.target.value})} />
                <select className="w-full border rounded-lg p-3 bg-white" onChange={e => setFormData({...formData, hospitalId: e.target.value})}>
                  <option value="">-- เลือก รพ.สต. (ถ้ามี) --</option>
                  {appDb?.hospitals?.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_name}</option>)}
                </select>
                <button onClick={() => { setIsSubmitting(true); handleRegister(formData).finally(()=>setIsSubmitting(false)); }} disabled={isSubmitting} className="w-full bg-teal-600 text-white rounded-lg p-3 font-semibold hover:bg-teal-700">
                  {isSubmitting ? 'กำลังบันทึก...' : 'ลงทะเบียน'}
                </button>
                <button onClick={() => setCurrentView('login')} className="w-full text-slate-500 mt-2 hover:underline">กลับไปหน้าเข้าสู่ระบบ</button>
              </div>
            </div>
          </div>
        );
      };

      const DashboardView = () => {
        const isHospital = currentUser?.role === 'hospital';
        const myReqs = isHospital ? appDb.requisitions.filter(r => r.hospitalId === currentUser.hospital_id) : appDb.requisitions;
        
        return (
          <div className="space-y-6 animate-fade-in">
            <div className="flex justify-between items-end">
              <div>
                <h2 className="text-2xl font-bold">แดชบอร์ด</h2>
                <p className="text-slate-500">ยินดีต้อนรับ, {currentUser.name}</p>
              </div>
              <div className="space-x-2">
                {/* ⭐️ ปุ่มนี้จะโผล่มาให้แอดมิน หรือคนที่ลงทะเบียนคนแรกกดเพื่อนำเข้าข้อมูล */}
                {(currentUser.role === 'admin' || !appDb?.hospitals || appDb.hospitals.length === 0) && (
                  <button onClick={migrateFromSheets} className="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow text-sm hover:bg-indigo-700">
                     <i className="fa-solid fa-cloud-arrow-down mr-1"></i> ดึงข้อมูลจาก Sheets ลง Firebase
                  </button>
                )}
                {isHospital && (
                  <button onClick={() => setCurrentView('create_req')} className="bg-teal-600 text-white px-4 py-2 rounded-lg shadow">
                    <i className="fa-solid fa-plus mr-2"></i> สร้างใบเบิก
                  </button>
                )}
              </div>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
              <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-500">
                <div className="text-slate-500 text-sm mb-1">ใบเบิกทั้งหมด</div>
                <div className="text-3xl font-bold text-slate-800">{myReqs.length}</div>
              </div>
              <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-amber-500">
                <div className="text-slate-500 text-sm mb-1">รอดำเนินการ</div>
                <div className="text-3xl font-bold text-slate-800">{myReqs.filter(r => r.status === 'Pending').length}</div>
              </div>
              <div className="bg-white rounded-xl shadow-sm p-6 border-l-4 border-green-500">
                <div className="text-slate-500 text-sm mb-1">อนุมัติแล้ว</div>
                <div className="text-3xl font-bold text-slate-800">{myReqs.filter(r => r.status === 'Completed').length}</div>
              </div>
            </div>

            <div className="bg-white rounded-xl shadow-sm overflow-hidden">
              <div className="p-4 border-b font-semibold bg-slate-50">ประวัติการเบิก</div>
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="border-b text-sm text-slate-500">
                    <th className="p-4">รหัสเอกสาร</th>
                    {!isHospital && <th className="p-4">รพ.สต.</th>}
                    <th className="p-4">รอบบิล</th>
                    <th className="p-4">สถานะ</th>
                    <th className="p-4 text-right">จัดการ</th>
                  </tr>
                </thead>
                <tbody>
                  {myReqs.map(req => {
                    const hosp = appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
                    return (
                      <tr key={req.id} className="border-b hover:bg-slate-50">
                        <td className="p-4 font-medium">{req.id}</td>
                        {!isHospital && <td className="p-4 text-slate-600">{hosp?.hospital_name}</td>}
                        <td className="p-4">{req.month}/{req.year}</td>
                        <td className="p-4">
                          <span className={`px-3 py-1 rounded-full text-xs font-medium ${req.status === 'Pending' ? 'bg-amber-100 text-amber-700' : 'bg-green-100 text-green-700'}`}>
                            {req.status === 'Pending' ? 'รออนุมัติ' : 'จัดยาแล้ว'}
                          </span>
                        </td>
                        <td className="p-4 text-right">
                           <button onClick={() => { setCurrentReqId(req.id); setCurrentView('view_req'); }} className="text-teal-600 hover:text-teal-800 text-sm">
                             <i className="fa-solid fa-file-lines mr-1"></i> เปิดดู
                           </button>
                        </td>
                      </tr>
                    );
                  })}
                  {myReqs.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">ยังไม่มีข้อมูล</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const CreateReqView = () => {
        const currentMonth = new Date().getMonth() + 1;
        const currentYear = new Date().getFullYear();
        const hospId = currentUser.hospital_id;

        const [items, setItems] = useState(() => {
          const myPars = appDb.parLevels.filter(p => String(p.hospital_id) === String(hospId));
          return myPars.map(par => {
            const drug = appDb.drugs.find(d => String(d.drug_id) === String(par.drug_id));
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(hospId) && String(b.drug_id) === String(par.drug_id));
            const excess = bal ? bal.excess_balance : 0;
            const typeLabel = drug ? (drug.type === 'DRUG' ? 'ยา' : 'เวชภัณฑ์') : '';
            return {
              drugId: par.drug_id, 
              name: drug ? drug.drug_name : 'ไม่พบข้อมูลยา', 
              type: typeLabel,
              unit: drug ? drug.unit_display_name : '',
              packSize: drug ? drug.pack_size : 1,
              parQty: par.par_qty, 
              prevExcess: excess, 
              usage: 0, netNeed: 0, dispensePack: 0, dispenseQty: 0, newExcess: excess
            };
          });
        });
        const [isSubmitting, setIsSubmitting] = useState(false);

        const updateUsage = (index, val) => {
          const usage = parseInt(val) || 0;
          const newItems = [...items];
          const row = newItems[index];
          row.usage = usage;
          let netNeed = usage - row.prevExcess;
          if (netNeed <= 0) {
             row.netNeed = 0; row.dispensePack = 0; row.dispenseQty = 0; row.newExcess = Math.abs(netNeed);
          } else {
             row.netNeed = netNeed; row.dispensePack = Math.ceil(netNeed / row.packSize);
             row.dispenseQty = row.dispensePack * row.packSize; row.newExcess = row.dispenseQty - netNeed;
          }
          setItems(newItems);
        };

        const handleSubmit = async () => {
          setIsSubmitting(true);
          const newId = `REQ-${currentYear}-${String(currentMonth).padStart(2, '0')}-${Math.floor(Math.random()*1000).toString().padStart(3, '0')}`;
          
          try {
            await db.collection('requisitions').doc(newId).set({
              hospitalId: hospId,
              month: currentMonth,
              year: currentYear,
              status: 'Pending',
              items: items, 
              created_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            showToast('ส่งใบเบิกสำเร็จ');
            fetchData();
            setCurrentView('dashboard');
          } catch (e) {
            showToast(e.message, 'error');
          } finally {
            setIsSubmitting(false);
          }
        };

        return (
          <div className="bg-white rounded-xl shadow-sm p-6">
            <div className="flex justify-between mb-4">
              <h2 className="text-xl font-bold">ใบเบิกยาใหม่ ({currentMonth}/{currentYear})</h2>
              <button onClick={() => setCurrentView('dashboard')} className="text-slate-500">ยกเลิก</button>
            </div>
            <div className="overflow-x-auto mb-6">
              <table className="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                  <tr className="bg-teal-50 text-teal-800 text-sm">
                    <th className="p-3 border-b-2 border-teal-200">รายการยา</th>
                    <th className="p-3 text-center border-b-2 border-teal-200">Pack</th>
                    <th className="p-3 text-center bg-blue-50 border-b-2 border-blue-200">ยกมา (A)</th>
                    <th className="p-3 text-center bg-yellow-50 border-b-2 border-yellow-200">ใช้จริง (B)</th>
                    <th className="p-3 text-center border-b-2 border-slate-200">ต้องการ (B-A)</th>
                    <th className="p-3 text-center bg-green-50 border-b-2 border-green-200">จ่าย (Pack)</th>
                    <th className="p-3 text-center bg-green-50 border-b-2 border-green-200">จ่ายจริง</th>
                    <th className="p-3 text-center bg-purple-50 border-b-2 border-purple-200">ยกไปเดือนหน้า</th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((item, idx) => (
                    <tr key={item.drugId} className="border-b hover:bg-slate-50">
                      <td className="p-3">
                        {item.name} <br/>
                        <span className="text-xs text-slate-500 font-medium">[{item.type}] Par Stock: {item.parQty} {item.unit}</span>
                      </td>
                      <td className="p-3 text-center">{item.packSize}</td>
                      <td className="p-3 text-center text-blue-600 font-semibold">{item.prevExcess}</td>
                      <td className="p-3 text-center bg-yellow-50">
                        <input type="number" min="0" className="w-20 border rounded p-1 text-center outline-none focus:border-teal-500" value={item.usage || ''} onChange={e => updateUsage(idx, e.target.value)} />
                      </td>
                      <td className="p-3 text-center">{item.netNeed}</td>
                      <td className="p-3 text-center text-green-600 font-bold">{item.dispensePack}</td>
                      <td className="p-3 text-center text-green-600">{item.dispenseQty}</td>
                      <td className="p-3 text-center text-purple-600 font-bold">{item.newExcess}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="flex justify-end">
              <button onClick={handleSubmit} disabled={isSubmitting} className="bg-teal-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-teal-700 disabled:opacity-50">
                {isSubmitting ? 'กำลังบันทึก...' : <span><i className="fa-solid fa-paper-plane mr-2"></i> ส่งเบิกยา</span>}
              </button>
            </div>
          </div>
        );
      };

      const ViewReqView = () => {
        const req = appDb.requisitions.find(r => r.id === currentReqId);
        if(!req) return null;
        const hosp = appDb.hospitals.find(h => h.hospital_id === req.hospitalId);
        const [isApproving, setIsApproving] = useState(false);

        const handleApprove = async () => {
          setIsApproving(true);
          try {
            const batch = db.batch(); 
            
            batch.update(db.collection('requisitions').doc(req.id), { status: 'Completed' });
            
            req.items.forEach(item => {
              const docId = `${req.hospitalId}_${item.drugId}`;
              batch.set(db.collection('current_excess').doc(docId), {
                hospital_id: req.hospitalId,
                drug_id: item.drugId,
                excess_balance: item.newExcess,
                last_updated: firebase.firestore.FieldValue.serverTimestamp()
              }, { merge: true });
            });

            await batch.commit();
            showToast('อนุมัติและอัปเดตสต๊อกเรียบร้อย');
            fetchData();
            setCurrentView('dashboard');
          } catch (e) {
            showToast(e.message, 'error');
          } finally {
            setIsApproving(false);
          }
        };

        return (
          <div className="bg-white rounded-xl shadow-sm p-6 print:p-0 print:shadow-none">
            <div className="flex justify-between mb-6 no-print">
              <button onClick={() => setCurrentView('dashboard')} className="text-slate-500">← กลับ</button>
              <div className="space-x-2">
                <button onClick={() => window.print()} className="bg-slate-200 text-slate-700 px-4 py-2 rounded"><i className="fa-solid fa-print mr-2"></i>พิมพ์</button>
                {currentUser.role === 'admin' && req.status === 'Pending' && (
                  <button onClick={handleApprove} disabled={isApproving} className="bg-teal-600 text-white px-4 py-2 rounded">
                    {isApproving ? 'รอสักครู่...' : <span><i className="fa-solid fa-check mr-2"></i>อนุมัติจ่ายยา</span>}
                  </button>
                )}
              </div>
            </div>
            
            <div className="print-area">
              <div className="text-center mb-6 border-b-2 border-slate-800 pb-4">
                <h1 className="text-2xl font-bold">ใบเบิกและจัดยา รพ.สต. เครือข่าย รพ.สวี</h1>
                <p>รอบเดือน: {req.month}/{req.year} | เอกสาร: {req.id}</p>
                <p className="text-lg font-semibold mt-2">หน่วยงาน: {hosp?.hospital_name}</p>
              </div>
              <table className="w-full text-left border-collapse border border-slate-300">
                <thead>
                  <tr className="bg-slate-100 text-slate-800 border-b border-slate-300">
                    <th className="p-2 border-r text-center">ลำดับ</th>
                    <th className="p-2 border-r">รายการยา</th>
                    <th className="p-2 border-r text-center">ยอดใช้</th>
                    <th className="p-2 border-r text-center">จัดเป็นแพ็ค</th>
                    <th className="p-2 text-center bg-slate-200">ยอดเม็ด/ขวด ที่จัด</th>
                  </tr>
                </thead>
                <tbody>
                  {req.items.map((it, i) => {
                    return (
                      <tr key={i} className="border-b border-slate-300">
                        <td className="p-2 border-r text-center">{i+1}</td>
                        <td className="p-2 border-r">
                           {it.name}
                           <div className="text-xs text-slate-500 font-normal">({it.unit})</div>
                        </td>
                        <td className="p-2 border-r text-center text-slate-500">{it.usage}</td>
                        <td className="p-2 border-r text-center font-bold">{it.dispensePack}</td>
                        <td className="p-2 text-center font-bold text-lg bg-slate-50">{it.dispenseQty}</td>
                      </tr>
                    )
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const StockConfigView = () => {
        const [selectedHosp, setSelectedHosp] = useState(appDb.hospitals[0]?.hospital_id || '');
        const [localData, setLocalData] = useState({});
        const [savingId, setSavingId] = useState(null);

        useEffect(() => {
          if (!selectedHosp) return;
          const newLocalData = {};
          appDb.drugs.forEach(d => {
            const par = appDb.parLevels.find(p => String(p.hospital_id) === String(selectedHosp) && String(p.drug_id) === String(d.drug_id));
            const bal = appDb.balances.find(b => String(b.hospital_id) === String(selectedHosp) && String(b.drug_id) === String(d.drug_id));
            newLocalData[d.drug_id] = { parQty: par ? par.par_qty : 0, excessQty: bal ? bal.excess_balance : 0 };
          });
          setLocalData(newLocalData);
        }, [selectedHosp, appDb]);

        const handleUpdateField = (drugId, field, value) => {
          setLocalData(prev => ({ ...prev, [drugId]: { ...prev[drugId], [field]: parseInt(value) || 0 } }));
        };

        const handleSaveRow = async (drugId) => {
          setSavingId(drugId);
          try {
             const batch = db.batch();
             const docId = `${selectedHosp}_${drugId}`;
             
             batch.set(db.collection('config_par').doc(docId), { hospital_id: selectedHosp, drug_id: drugId, par_qty: localData[drugId].parQty }, { merge: true });
             batch.set(db.collection('current_excess').doc(docId), { hospital_id: selectedHosp, drug_id: drugId, excess_balance: localData[drugId].excessQty, last_updated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
             
             await batch.commit();
             showToast('บันทึกการเปลี่ยนแปลงแล้ว');
             fetchData();
          } catch (e) {
             showToast(e.message, 'error');
          } finally {
             setSavingId(null);
          }
        };

        return (
          <div className="bg-white rounded-xl shadow-sm p-6 animate-fade-in">
            <h2 className="text-2xl font-bold mb-2">ตั้งค่า Par Stock และปรับปรุงยอดยกมา</h2>
            
            <div className="mb-6">
              <label className="block text-sm font-semibold text-slate-700 mb-2">เลือก รพ.สต. ที่ต้องการตั้งค่า</label>
              <select className="border rounded-lg p-2 w-full max-w-md bg-white outline-none" value={selectedHosp} onChange={e => setSelectedHosp(e.target.value)}>
                {appDb.hospitals.map(h => <option key={h.hospital_id} value={h.hospital_id}>{h.hospital_id} - {h.hospital_name}</option>)}
              </select>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-slate-100 text-slate-700 text-sm border-b-2 border-slate-200">
                    <th className="p-3">รหัส - ชื่อยา/เวชภัณฑ์</th>
                    <th className="p-3 text-center">Pack</th>
                    <th className="p-3 text-center bg-blue-50">ยอด Par Stock</th>
                    <th className="p-3 text-center bg-yellow-50">ยอดยกมาปัจจุบัน</th>
                    <th className="p-3 text-right">ดำเนินการ</th>
                  </tr>
                </thead>
                <tbody>
                  {appDb.drugs.map(drug => {
                    const rowData = localData[drug.drug_id];
                    if (!rowData) return null;
                    const typeLabel = drug.type === 'DRUG' ? 'ยา' : 'เวชภัณฑ์';

                    return (
                      <tr key={drug.drug_id} className="border-b hover:bg-slate-50">
                        <td className="p-3 font-medium text-slate-800">
                          {drug.drug_id} - {drug.drug_name}
                          <div className="text-xs text-slate-500 font-normal">[{typeLabel}] หน่วย: {drug.unit_display_name}</div>
                        </td>
                        <td className="p-3 text-center text-sm text-slate-500">{drug.pack_size}</td>
                        <td className="p-3 bg-blue-50 text-center"><input type="number" min="0" className="w-24 border rounded p-1 text-center font-semibold text-blue-700" value={rowData.parQty} onChange={(e) => handleUpdateField(drug.drug_id, 'parQty', e.target.value)} /></td>
                        <td className="p-3 bg-yellow-50 text-center"><input type="number" min="0" className="w-24 border rounded p-1 text-center font-semibold text-amber-700" value={rowData.excessQty} onChange={(e) => handleUpdateField(drug.drug_id, 'excessQty', e.target.value)} /></td>
                        <td className="p-3 text-right"><button onClick={() => handleSaveRow(drug.drug_id)} disabled={savingId === drug.drug_id} className="bg-teal-600 text-white px-3 py-1.5 rounded text-sm disabled:opacity-50">{savingId === drug.drug_id ? '...' : 'บันทึก'}</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      if (currentView === 'login') return <><LoginView />{toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}</>;
      if (currentView === 'register') return <><RegisterView />{toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}</>;

      return (
        <div className="min-h-screen flex">
          <div className="w-64 bg-teal-800 text-white flex flex-col no-print">
            <div className="p-6 flex items-center border-b border-teal-700">
              <i className="fa-solid fa-heart-pulse text-2xl text-teal-300 mr-3"></i>
              <h1 className="text-xl font-bold">Sawee Rxfill</h1>
            </div>
            <nav className="flex-1 p-4 space-y-2">
              <button onClick={() => setCurrentView('dashboard')} className={`w-full text-left p-3 rounded-lg ${currentView==='dashboard'?'bg-teal-700':'hover:bg-teal-700 text-teal-100'}`}><i className="fa-solid fa-house mr-3 w-5"></i> แดชบอร์ด</button>
              {currentUser?.role === 'hospital' && <button onClick={() => setCurrentView('create_req')} className={`w-full text-left p-3 rounded-lg ${currentView==='create_req'?'bg-teal-700':'hover:bg-teal-700 text-teal-100'}`}><i className="fa-solid fa-plus mr-3 w-5"></i> เบิกยาใหม่</button>}
              {currentUser?.role === 'admin' && <button onClick={() => setCurrentView('stock_config')} className={`w-full text-left p-3 rounded-lg ${currentView==='stock_config'?'bg-teal-700':'hover:bg-teal-700 text-teal-100'}`}><i className="fa-solid fa-boxes-stacked mr-3 w-5"></i> ตั้งค่าสต๊อก (Admin)</button>}
            </nav>
            <div className="p-4 border-t border-teal-700">
              <div className="text-teal-200 text-sm mb-3"><i className="fa-solid fa-user mr-2"></i> {currentUser?.name}</div>
              <button onClick={() => auth.signOut()} className="w-full text-left p-2 rounded text-teal-200 hover:bg-red-600 hover:text-white transition"><i className="fa-solid fa-right-from-bracket mr-2"></i> ออกจากระบบ</button>
            </div>
          </div>
          
          <div className="flex-1 p-8 bg-slate-100 overflow-auto">
            <div className="max-w-5xl mx-auto">
              {currentView === 'dashboard' && <DashboardView />}
              {currentView === 'create_req' && <CreateReqView />}
              {currentView === 'view_req' && <ViewReqView />}
              {currentView === 'stock_config' && <StockConfigView />}
            </div>
          </div>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
