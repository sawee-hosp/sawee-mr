<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sawi Hospital - Environment Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .modal-active { overflow: hidden; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

<div class="min-h-screen flex flex-col h-screen">
    <!-- Navbar -->
    <header class="bg-white shadow-sm z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-hospital text-blue-600 text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-900">Environment Dashboard</h1>
            </div>
            <button onclick="fetchDashboardData()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100 transition text-sm font-medium flex items-center gap-2">
                <i class="fa-solid fa-rotate-right" id="refresh-icon"></i> รีเฟรชข้อมูล
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 overflow-hidden flex flex-col md:flex-row">
        <!-- Sidebar Filters -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 overflow-y-auto p-4 shrink-0">
            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">กรองตามหน่วยงาน (Room)</h2>
            <ul id="room-filter-list" class="space-y-1 mb-6">
                <!-- Javascript will populate this -->
            </ul>

            <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">กรองตามประเภท (Type)</h2>
            <ul id="type-filter-list" class="space-y-1">
                <!-- Javascript will populate this -->
            </ul>
        </aside>

        <!-- Dashboard Grid -->
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
            <!-- Loading Indicator -->
            <div id="loading-state" class="flex flex-col items-center justify-center h-64">
                <div class="loader mb-4"></div>
                <p class="text-gray-500">กำลังดึงข้อมูลล่าสุดจากระบบ...</p>
            </div>

            <!-- Device Grid -->
            <div id="device-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
                <!-- Cards will be injected here -->
            </div>
        </main>
    </div>
</div>

<!-- Modal (Detail & Chart) -->
<div id="detail-modal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:p-0">
        <!-- Background overlay -->
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity backdrop-blur-sm" onclick="closeModal()"></div>

        <!-- Modal Panel -->
        <div class="relative bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:max-w-4xl w-full flex flex-col" style="max-height: 90vh;">
            
            <!-- Header -->
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center shrink-0">
                <div>
                    <h3 class="text-lg leading-6 font-bold text-gray-900" id="modal-title">Device Name</h3>
                    <p class="text-sm text-gray-500" id="modal-room">Room / Type</p>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Body (Scrollable) -->
            <div class="px-6 py-5 overflow-y-auto flex-1">
                
                <!-- Current Status Badge -->
                <div class="flex flex-wrap gap-4 mb-6">
                    <div class="bg-blue-50 text-blue-700 px-4 py-3 rounded-xl flex items-center gap-3">
                        <i class="fa-solid fa-battery-half text-xl"></i>
                        <div>
                            <p class="text-xs text-blue-500 font-medium">แบตเตอรี่</p>
                            <p class="font-bold" id="modal-battery">--%</p>
                        </div>
                    </div>
                    <div class="bg-gray-50 text-gray-700 px-4 py-3 rounded-xl flex items-center gap-3">
                        <i class="fa-regular fa-clock text-xl"></i>
                        <div>
                            <p class="text-xs text-gray-500 font-medium">อัปเดตล่าสุด</p>
                            <p class="font-bold text-sm" id="modal-lastupdate">--</p>
                        </div>
                    </div>
                </div>

                <hr class="border-gray-100 mb-6">

                <!-- Chart Controls -->
                <div id="chart-section">
                    <div class="flex flex-col sm:flex-row justify-between items-end sm:items-center gap-4 mb-4">
                        <h4 class="font-bold text-gray-800"><i class="fa-solid fa-chart-line text-blue-500 mr-2"></i>ประวัติข้อมูล (History)</h4>
                        
                        <div class="flex items-center gap-2 text-sm">
                            <input type="date" id="date-start" class="border border-gray-300 rounded-md px-3 py-1.5 focus:ring-blue-500 focus:border-blue-500">
                            <span>ถึง</span>
                            <input type="date" id="date-end" class="border border-gray-300 rounded-md px-3 py-1.5 focus:ring-blue-500 focus:border-blue-500">
                            <button onclick="fetchHistory()" class="bg-gray-800 text-white px-3 py-1.5 rounded-md hover:bg-gray-700 transition">ดึงข้อมูล</button>
                        </div>
                    </div>

                    <!-- Statistics Cards -->
                    <div class="grid grid-cols-3 gap-4 mb-4" id="stats-container">
                        <div class="bg-red-50 rounded-lg p-3 text-center">
                            <p class="text-xs text-red-500 font-semibold mb-1">Max Temp</p>
                            <p class="text-lg font-bold text-red-700" id="stat-max">--</p>
                        </div>
                        <div class="bg-blue-50 rounded-lg p-3 text-center">
                            <p class="text-xs text-blue-500 font-semibold mb-1">Min Temp</p>
                            <p class="text-lg font-bold text-blue-700" id="stat-min">--</p>
                        </div>
                        <div class="bg-green-50 rounded-lg p-3 text-center">
                            <p class="text-xs text-green-500 font-semibold mb-1">Avg Temp</p>
                            <p class="text-lg font-bold text-green-700" id="stat-avg">--</p>
                        </div>
                    </div>

                    <!-- Chart Canvas -->
                    <div class="w-full h-64 relative">
                        <div id="chart-loading" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-80 z-10 hidden">
                            <div class="loader" style="width: 30px; height: 30px; border-width: 3px;"></div>
                        </div>
                        <canvas id="historyChart"></canvas>
                    </div>
                </div>

                <div id="smoke-message" class="hidden text-center py-10 bg-gray-50 rounded-xl text-gray-500">
                    <i class="fa-solid fa-shield-halved text-4xl mb-3 text-gray-300"></i>
                    <p>อุปกรณ์ประเภทเครื่องตรวจควัน ไม่รองรับการแสดงกราฟอุณหภูมิ</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // การตั้งค่า
    // =========================================================================
    // ⚠️ นำ URL Web App ของคุณมาใส่ตรงนี้ ⚠️
    const API_URL = "https://script.google.com/macros/s/AKfycbw8cH12hxQ78miJ-zrHOp28mnP5E7C2bWnDeqnUqxOODOdVUAqmhTGB2Q-3IYfKIepNLQ/exec";

    let allDevices = [];
    let currentFilter = { type: 'room', value: 'all' };
    let chartInstance = null;
    let selectedDeviceId = null;

    // Initialization
    document.addEventListener("DOMContentLoaded", () => {
        // Set default dates to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-start').value = today;
        document.getElementById('date-end').value = today;
        
        fetchDashboardData();
    });

    // =========================================================================
    // ฟังก์ชันดึงข้อมูลและแสดงผล
    // =========================================================================
    async function fetchDashboardData() {
        showLoading(true);
        const icon = document.getElementById('refresh-icon');
        icon.classList.add('fa-spin');

        try {
            // redirect: 'follow' จำเป็นสำหรับการเรียก Google Script
            const response = await fetch(`${API_URL}?action=getDashboard`, { method: 'GET', redirect: 'follow' });
            const result = await response.json();

            if (result.success) {
                allDevices = result.data;
                buildSidebarFilters();
                renderCards();
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            console.error("Fetch error:", error);
            alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ URL Web App");
        } finally {
            showLoading(false);
            icon.classList.remove('fa-spin');
        }
    }

    function showLoading(isLoading) {
        document.getElementById('loading-state').style.display = isLoading ? 'flex' : 'none';
        document.getElementById('device-grid').style.display = isLoading ? 'none' : 'grid';
    }

    // =========================================================================
    // การจัดการ Sidebar Filters
    // =========================================================================
    function buildSidebarFilters() {
        const rooms = new Set();
        const types = new Set();
        
        allDevices.forEach(d => {
            if(d.room) rooms.add(d.room);
            if(d.type) types.add(d.type);
        });

        const roomList = document.getElementById('room-filter-list');
        const typeList = document.getElementById('type-filter-list');

        // Render Room Filters
        roomList.innerHTML = `<li onclick="setFilter('room', 'all')" class="cursor-pointer px-3 py-2 rounded-md text-sm font-medium ${currentFilter.value === 'all' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">All Rooms</li>`;
        Array.from(rooms).sort().forEach(room => {
            roomList.innerHTML += `<li onclick="setFilter('room', '${room}')" class="cursor-pointer px-3 py-2 rounded-md text-sm font-medium ${currentFilter.value === room ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'} truncate" title="${room}">${room}</li>`;
        });

        // Render Type Filters
        typeList.innerHTML = `<li onclick="setFilter('type', 'all')" class="cursor-pointer px-3 py-2 rounded-md text-sm font-medium ${currentFilter.value === 'all' ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'}">All Types</li>`;
        Array.from(types).sort().forEach(type => {
            typeList.innerHTML += `<li onclick="setFilter('type', '${type}')" class="cursor-pointer px-3 py-2 rounded-md text-sm font-medium ${currentFilter.value === type ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-100'} truncate">${type}</li>`;
        });
    }

    function setFilter(filterType, value) {
        currentFilter = { type: filterType, value: value };
        buildSidebarFilters(); // re-render to update active state classes
        renderCards();
    }

    // =========================================================================
    // การวาดการ์ดอุปกรณ์ (Device Cards)
    // =========================================================================
    function renderCards() {
        const grid = document.getElementById('device-grid');
        grid.innerHTML = '';

        // กรองข้อมูล
        const filteredDevices = allDevices.filter(d => {
            if (currentFilter.value === 'all') return true;
            return d[currentFilter.type] === currentFilter.value;
        });

        filteredDevices.forEach(device => {
            const current = device.current || {};
            const isAlert = current.alert === "True";
            const isSmoke = device.name.includes("ตรวจควัน") || device.type?.includes("Smoke") || current.smokeStatus !== undefined && current.smokeStatus !== "";

            // Style สำหรับการ์ด
            let borderStyle = "border border-gray-200";
            let alertBadge = "";
            
            if (isAlert) {
                borderStyle = "border-2 border-red-500 shadow-red-100";
                alertBadge = `<span class="absolute -top-3 -right-3 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full shadow-md animate-pulse"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Alert</span>`;
            }

            // ข้อมูลหลักที่จะแสดง
            let mainValueHTML = "";
            if (isSmoke) {
                const statusColor = (current.smokeStatus === "alarm") ? "text-red-500" : "text-green-500";
                const statusIcon = (current.smokeStatus === "alarm") ? "fa-fire" : "fa-shield-check";
                const statusText = (current.smokeStatus === "alarm") ? "พบกลุ่มควัน!" : (current.smokeStatus || "N/A");
                
                mainValueHTML = `
                    <div class="flex items-center gap-3">
                        <div class="p-3 rounded-full bg-gray-50"><i class="fa-solid ${statusIcon} ${statusColor} text-2xl"></i></div>
                        <div>
                            <p class="text-xs text-gray-500">สถานะควัน</p>
                            <p class="text-xl font-bold ${statusColor} uppercase">${statusText}</p>
                        </div>
                    </div>`;
            } else {
                const temp = current.temp !== undefined && current.temp !== "" ? current.temp + "°C" : "--";
                const hum = current.humid !== undefined && current.humid !== "" ? current.humid + "%" : "--";
                
                mainValueHTML = `
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-xs text-gray-500 mb-1">อุณหภูมิ</p>
                            <p class="text-4xl font-bold text-gray-800 ${isAlert ? 'text-red-600' : ''}">${temp}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-500 mb-1">ความชื้น</p>
                            <p class="text-xl font-semibold text-blue-500">${hum}</p>
                        </div>
                    </div>`;
            }

            const cardHTML = `
                <div class="bg-white rounded-2xl p-5 relative card-hover cursor-pointer ${borderStyle} flex flex-col justify-between" onclick="openModal('${device.id}')">
                    ${alertBadge}
                    
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-gray-900 text-lg leading-tight truncate w-48" title="${device.name}">${device.name}</h3>
                                <p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-location-dot mr-1"></i>${device.room || 'ไม่ระบุห้อง'}</p>
                            </div>
                            <div class="bg-gray-100 p-2 rounded-lg text-gray-400">
                                <i class="fa-solid ${isSmoke ? 'fa-smog' : 'fa-temperature-half'}"></i>
                            </div>
                        </div>
                        
                        ${mainValueHTML}
                    </div>

                    <div class="mt-6 pt-4 border-t border-gray-100 flex justify-between items-center text-xs">
                        <span class="text-gray-500 font-medium"><i class="fa-solid fa-battery-half text-gray-400 mr-1"></i> ${current.battery || '--'}%</span>
                        <span class="text-gray-400" title="${current.lastUpdate}"><i class="fa-regular fa-clock mr-1"></i> ${current.lastUpdate ? current.lastUpdate.split(' ')[1] : '--'}</span>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        });
    }

    // =========================================================================
    // การจัดการ Modal และ Chart
    // =========================================================================
    function openModal(deviceId) {
        selectedDeviceId = deviceId;
        const device = allDevices.find(d => d.id === deviceId);
        if (!device) return;

        // Reset UI
        document.getElementById('modal-title').innerText = device.name;
        document.getElementById('modal-room').innerText = `${device.room || 'ไม่ระบุห้อง'} / ${device.type || 'ไม่ระบุประเภท'}`;
        
        const current = device.current || {};
        document.getElementById('modal-battery').innerText = current.battery ? current.battery + "%" : "N/A";
        document.getElementById('modal-lastupdate').innerText = current.lastUpdate || "ไม่มีข้อมูล";

        const isSmoke = device.name.includes("ตรวจควัน") || device.type?.includes("Smoke") || current.smokeStatus !== undefined && current.smokeStatus !== "";
        
        if (isSmoke) {
            document.getElementById('chart-section').classList.add('hidden');
            document.getElementById('smoke-message').classList.remove('hidden');
        } else {
            document.getElementById('chart-section').classList.remove('hidden');
            document.getElementById('smoke-message').classList.add('hidden');
            
            // Clear stats
            document.getElementById('stat-max').innerText = '--';
            document.getElementById('stat-min').innerText = '--';
            document.getElementById('stat-avg').innerText = '--';
            
            if (chartInstance) {
                chartInstance.destroy();
            }
            
            // Auto fetch today's history
            fetchHistory();
        }

        document.getElementById('detail-modal').classList.remove('hidden');
        document.body.classList.add('modal-active');
    }

    function closeModal() {
        document.getElementById('detail-modal').classList.add('hidden');
        document.body.classList.remove('modal-active');
    }

    async function fetchHistory() {
        if (!selectedDeviceId) return;

        const start = document.getElementById('date-start').value;
        const end = document.getElementById('date-end').value;
        
        if(!start || !end) {
            alert("กรุณาเลือกวันที่ให้ครบถ้วน");
            return;
        }

        document.getElementById('chart-loading').classList.remove('hidden');

        try {
            const url = `${API_URL}?action=getHistory&deviceId=${selectedDeviceId}&startDate=${start}&endDate=${end}`;
            const response = await fetch(url, { method: 'GET', redirect: 'follow' });
            const result = await response.json();

            if (result.success) {
                const data = result.data;
                
                // Update Stats
                document.getElementById('stat-max').innerText = data.stats.max !== "N/A" ? data.stats.max + "°C" : "N/A";
                document.getElementById('stat-min').innerText = data.stats.min !== "N/A" ? data.stats.min + "°C" : "N/A";
                document.getElementById('stat-avg').innerText = data.stats.avg !== "N/A" ? data.stats.avg + "°C" : "N/A";

                drawChart(data.logs);
            } else {
                alert("ดึงข้อมูลย้อนหลังผิดพลาด: " + result.message);
            }
        } catch (error) {
            console.error("History fetch error:", error);
            alert("เกิดข้อผิดพลาดในการดึงข้อมูลย้อนหลัง");
        } finally {
            document.getElementById('chart-loading').classList.add('hidden');
        }
    }

    function drawChart(logs) {
        const ctx = document.getElementById('historyChart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        // เรียงข้อมูลตามเวลา
        logs.sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime));

        const labels = logs.map(log => {
            const d = new Date(log.dateTime);
            // ถ้าเลือกวันเดียว ให้โชว์แค่เวลา ถ้าหลายวันโชว์วันที่ด้วย
            const start = document.getElementById('date-start').value;
            const end = document.getElementById('date-end').value;
            if(start === end) {
                return d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            } else {
                return d.toLocaleDateString('th-TH', {day:'2-digit', month:'short'}) + ' ' + d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            }
        });
        
        const tempData = logs.map(log => log.temp);
        const humData = logs.map(log => log.humid);

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'อุณหภูมิ (°C)',
                        data: tempData,
                        borderColor: 'rgb(59, 130, 246)', // blue-500
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointRadius: 2,
                        fill: true,
                        tension: 0.3,
                        yAxisID: 'y'
                    },
                    {
                        label: 'ความชื้น (%)',
                        data: humData,
                        borderColor: 'rgb(156, 163, 175)', // gray-400
                        borderWidth: 1,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        tension: 0.3,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { usePointStyle: true, boxWidth: 6 }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 10,
                        cornerRadius: 8
                    }
                },
                scales: {
                    x: {
                        grid: { display: false }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: { display: true, text: 'อุณหภูมิ (°C)' }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: { display: true, text: 'ความชื้น (%)' },
                        grid: { drawOnChartArea: false } // ไม่ให้เส้นกริดทับกัน
                    }
                }
            }
        });
    }
</script>

</body>
</html>
