<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUE Atorvastatin - รพ.สวี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #e2e8f0; color: #334155; }
        
        /* 3D Soft Shadow & Neumorphism Effects */
        .paper-layout { background: #f8fafc; box-shadow: 8px 8px 16px #cbd5e1, -8px -8px 16px #ffffff; }
        .inner-card { background: #ffffff; box-shadow: inset 2px 2px 5px #e2e8f0, inset -2px -2px 5px #ffffff; border: 1px solid #f1f5f9; }
        .floating-card { background: #ffffff; box-shadow: 4px 4px 10px #cbd5e1, -4px -4px 10px #ffffff; }
        
        /* Beautiful Spinner */
        .spinner {
            width: 20px; height: 20px; border: 3px solid #cbd5e1; border-top: 3px solid #64748b;
            border-radius: 50%; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Radio Buttons */
        .radio-custom:checked + div { border-color: #64748b; background-color: #f1f5f9; font-weight: 500; }
        .radio-color-green:checked + div { border-color: #22c55e; background-color: #f0fdf4; color: #166534; }
        .radio-color-red:checked + div { border-color: #ef4444; background-color: #fef2f2; color: #991b1b; }
        .radio-color-orange:checked + div { border-color: #f97316; background-color: #fff7ed; color: #9a3412; }
        
        /* Typography adjustments */
        input:read-only { color: #475569; font-weight: 500; cursor: default; }
    </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-6">

    <div class="max-w-4xl mx-auto paper-layout rounded-[2rem] p-6 sm:p-8">
        
        <!-- Header & Tabs -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 pb-4 border-b border-gray-300 gap-4">
            <h1 class="text-xl font-semibold text-gray-700 flex items-center gap-2">
                <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                DUE Evaluation (รพ.สวี)
            </h1>
            <div class="flex gap-3 bg-gray-200 p-1 rounded-full shadow-inner text-sm">
                <button class="bg-white text-gray-800 shadow-sm px-4 py-1.5 rounded-full font-medium">Atorvastatin</button>
                <button class="text-gray-500 px-4 py-1.5 rounded-full cursor-not-allowed opacity-50" disabled>Antibiotics</button>
                <button class="text-gray-500 px-4 py-1.5 rounded-full cursor-not-allowed opacity-50" disabled>Tamiflu</button>
            </div>
        </header>

        <!-- Search Box -->
        <div class="floating-card rounded-2xl p-4 mb-6 flex flex-col sm:flex-row gap-3">
            <input type="text" id="searchHN" placeholder="ระบุ HN ค้นหาผู้ป่วย..." class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400" onkeypress="if(event.key === 'Enter') searchPatient()">
            <button onclick="searchPatient()" id="searchBtn" class="bg-gray-700 hover:bg-gray-800 text-white rounded-xl px-6 py-2 text-sm font-medium transition-all shadow-md flex items-center justify-center gap-2 min-w-[120px]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                ค้นหา
            </button>
        </div>
        <div id="searchMessage" class="text-xs text-red-500 mb-4 ml-2 hidden"></div>

        <form id="dueForm" class="hidden space-y-6" onsubmit="submitDUE(event)">
            
            <input type="hidden" id="f_rowIndex">

            <!-- Part 1 -->
            <div class="floating-card rounded-2xl overflow-hidden">
                <div class="bg-gray-100 border-b border-gray-200 px-5 py-3">
                    <h2 class="text-sm font-semibold text-gray-700">Part 1: ข้อมูลการสั่งใช้ยา</h2>
                </div>
                <div class="p-5 space-y-4">
                    
                    <!-- Row 1: Demographics -->
                    <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                        <div class="md:col-span-1"><label class="block text-xs text-gray-500 mb-0.5">HN</label><input type="text" id="f_hn" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                        <div class="md:col-span-2"><label class="block text-xs text-gray-500 mb-0.5">ชื่อผู้ป่วย</label><input type="text" id="f_name" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                        <div class="md:col-span-1"><label class="block text-xs text-gray-500 mb-0.5">เพศ / อายุ</label><input type="text" id="f_gender_age" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                        <div class="md:col-span-1"><label class="block text-xs text-gray-500 mb-0.5">ประเภท</label><input type="text" id="f_pttype" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                        <div class="md:col-span-1"><label class="block text-xs text-gray-500 mb-0.5">สิทธิ์</label><input type="text" id="f_right" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none truncate"></div>
                    </div>

                    <!-- Row 2: Diagnosis -->
                    <div>
                        <label class="block text-xs text-gray-500 mb-0.5">การวินิจฉัย (Diagnosis)</label>
                        <input type="text" id="f_diag" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none truncate">
                    </div>

                    <!-- Row 3: Drug Info -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="md:col-span-1"><label class="block text-xs text-blue-600 font-medium mb-0.5">ยาที่สั่ง (Drug Name)</label><input type="text" id="f_drug" readonly class="w-full bg-blue-50 border border-blue-100 rounded p-1.5 text-sm text-blue-800 font-medium"></div>
                        <div class="md:col-span-2"><label class="block text-xs text-blue-600 font-medium mb-0.5">วิธีใช้ (Drug Usage)</label><input type="text" id="f_usage" readonly class="w-full bg-blue-50 border border-blue-100 rounded p-1.5 text-sm text-blue-800"></div>
                    </div>

                    <!-- Row 4: Order Details -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <div class="md:col-span-1"><label class="block text-xs text-gray-500 mb-0.5">วันที่และเวลา</label><input type="text" id="f_datetime" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                        <div class="md:col-span-2"><label class="block text-xs text-gray-500 mb-0.5">แพทย์ผู้สั่งใช้ยานี้</label><input type="text" id="f_doctor" readonly class="w-full bg-transparent border-b border-gray-300 text-sm pb-1 outline-none"></div>
                    </div>

                    <!-- Row 5: Labs -->
                    <div class="grid grid-cols-3 gap-3 pt-2">
                        <div class="inner-card p-2 rounded-lg text-center"><label class="block text-[10px] text-gray-500 uppercase">LDL ล่าสุด</label><input type="text" id="f_ldl" readonly class="w-full bg-transparent text-center text-lg font-semibold text-gray-800 outline-none"></div>
                        <div class="inner-card p-2 rounded-lg text-center"><label class="block text-[10px] text-gray-500 uppercase">Cholesterol</label><input type="text" id="f_chol" readonly class="w-full bg-transparent text-center text-lg font-semibold text-gray-800 outline-none"></div>
                        <div class="inner-card p-2 rounded-lg text-center"><label class="block text-[10px] text-gray-500 uppercase">เคยรับ Statin</label><input type="text" id="f_oldstatin" readonly class="w-full bg-transparent text-center text-lg font-semibold text-gray-800 outline-none"></div>
                    </div>
                </div>
            </div>

            <div class="floating-card rounded-2xl overflow-hidden">
                <div class="bg-gray-100 border-b border-gray-200 px-5 py-3">
                    <h2 class="text-sm font-semibold text-gray-700">Part 2: ข้อมูลในใบ DUE (เหตุผลการสั่งใช้ยา)</h2>
                </div>
                <div class="p-5 space-y-3">
                    <label class="block text-xs font-medium text-gray-600 mb-1">เลือกเหตุผลการสั่งใช้ยา Atorvastatin <span class="text-red-500">*</span></label>
                    
                    <div class="grid grid-cols-1 gap-2 text-sm">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="indication" value="ได้รับ Simvastatin ขนาดสูงมาแล้ว 3-6 เดือน แต่ระดับ LDL-Cholesterol ยังไม่บรรลุเป้าหมายของการรักษา โดยรับ Simvastatin มาแล้ว 6 เดือน" class="peer sr-only radio-custom" required onchange="handleIndicationChange()">
                            <div class="p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all">ได้รับ Simvastatin ขนาดสูงมาแล้ว 3-6 เดือน แต่ระดับ LDL-Cholesterol ยังไม่บรรลุเป้าหมาย</div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="indication" value="เกิดอาการไม่พึงประสงค์จาก Simvastatin" class="peer sr-only radio-custom" onchange="handleIndicationChange()">
                            <div class="p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all">เกิดอาการไม่พึงประสงค์จาก Simvastatin</div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="indication" value="ได้รับยาที่ร่วมที่อาจเกิด Drug Interaction กับ Simvastatin" class="peer sr-only radio-custom" onchange="handleIndicationChange()">
                            <div class="p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all">ได้รับยาที่ร่วมที่อาจเกิด Drug Interaction กับ Simvastatin</div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="indication" value="อื่นๆ" id="radio_other" class="peer sr-only radio-custom" onchange="handleIndicationChange()">
                            <div class="p-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-all">อื่นๆ (ระบุ)</div>
                        </label>
                    </div>

                    <div id="otherIndicationContainer" class="hidden mt-2 ml-4">
                        <input type="text" id="i_indication_other" placeholder="พิมพ์เหตุผลอื่นๆ ที่นี่..." class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
                    </div>
                </div>
            </div>

            <div class="floating-card rounded-2xl overflow-hidden border border-gray-300">
                <div class="bg-gray-200 border-b border-gray-300 px-5 py-3">
                    <h2 class="text-sm font-semibold text-gray-800">Part 3: สำหรับเภสัชกร (Pharmacist Evaluation)</h2>
                </div>
                <div class="p-5 space-y-5">
                    
                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-2">ผลการประเมิน <span class="text-red-500">*</span></label>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="relative cursor-pointer">
                                <input type="radio" name="evaluation" value="Appropriate" required class="peer sr-only radio-color-green">
                                <div class="p-3 border border-gray-200 rounded-lg text-center transition-all">Appropriate (เหมาะสม)</div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="evaluation" value="ข้อมูลไม่ครบถ้วน" class="peer sr-only radio-custom">
                                <div class="p-3 border border-gray-200 rounded-lg text-center transition-all">ข้อมูลไม่ครบถ้วน</div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="evaluation" value="Inappropriate (Indication)" class="peer sr-only radio-color-red">
                                <div class="p-3 border border-gray-200 rounded-lg text-center transition-all">Inapp. (Indication)</div>
                            </label>
                            <label class="relative cursor-pointer">
                                <input type="radio" name="evaluation" value="Inappropriate (Dose, Interval)" class="peer sr-only radio-color-orange">
                                <div class="p-3 border border-gray-200 rounded-lg text-center transition-all">Inapp. (Dose, Interval)</div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-gray-600 mb-1">เภสัชกรผู้ประเมิน <span class="text-red-500">*</span></label>
                        <select id="i_pharmacist" required class="w-full bg-white border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-400">
                            <option value="" disabled selected>-- โหลดรายชื่อเภสัชกร... --</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="flex justify-end pt-2">
                <button type="submit" id="saveBtn" class="bg-gray-800 hover:bg-gray-900 text-white font-medium rounded-xl text-sm px-8 py-3 transition-all shadow-lg flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    บันทึกผลการประเมิน
                </button>
            </div>
        </form>
    </div>

    <script>
        // URL ของ Google Apps Script (แก้ไขตรงนี้ถ้ามีการ Deploy ใหม่)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzCZ2Nd9WUWf5rf2O-8Asv5tMrD4kxBq6pcFGtRavRReV85PdGgmttvtdqKiydiN_l1rA/exec";

        document.addEventListener('DOMContentLoaded', fetchPharmacists);

        // จัดการเปิด/ปิดช่องกรอก "อื่นๆ"
        function handleIndicationChange() {
            const otherRadio = document.getElementById('radio_other');
            const otherContainer = document.getElementById('otherIndicationContainer');
            const otherInput = document.getElementById('i_indication_other');
            
            if (otherRadio.checked) {
                otherContainer.classList.remove('hidden');
                otherInput.required = true;
            } else {
                otherContainer.classList.add('hidden');
                otherInput.required = false;
                otherInput.value = '';
            }
        }

        async function fetchPharmacists() {
            try {
                const response = await fetch(`${GAS_URL}?action=getPharmacists`);
                const data = await response.json();
                const select = document.getElementById('i_pharmacist');
                select.innerHTML = '<option value="" disabled selected>-- เลือกเภสัชกร --</option>';
                
                if (data.status === 'success' && data.data) {
                    data.data.forEach(pharma => {
                        const option = document.createElement('option');
                        option.value = pharma.name; 
                        option.textContent = `${pharma.id} - ${pharma.name}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                document.getElementById('i_pharmacist').innerHTML = '<option value="" disabled>-- โหลดล้มเหลว --</option>';
            }
        }

        async function searchPatient() {
            const hn = document.getElementById('searchHN').value.trim();
            const msgBox = document.getElementById('searchMessage');
            const btn = document.getElementById('searchBtn');
            const form = document.getElementById('dueForm');

            if (!hn) {
                msgBox.textContent = "กรุณาระบุ HN";
                msgBox.classList.remove('hidden');
                return;
            }

            msgBox.classList.add('hidden');
            btn.innerHTML = '<span class="spinner border-gray-400 border-t-white"></span>';
            btn.disabled = true;
            form.classList.add('hidden');

            try {
                const response = await fetch(`${GAS_URL}?action=search&sheet=Atorvastatin&hn=${hn}`);
                const res = await response.json();

                if (res.status === 'success' && res.data) {
                    populateForm(res.data);
                    form.classList.remove('hidden');
                } else {
                    msgBox.textContent = res.message || "ไม่พบประวัติการสั่ง Atorvastatin";
                    msgBox.classList.remove('hidden');
                }
            } catch (error) {
                msgBox.textContent = "เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย";
                msgBox.classList.remove('hidden');
            } finally {
                btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg> ค้นหา';
                btn.disabled = false;
            }
        }

        function populateForm(data) {
            document.getElementById('f_rowIndex').value = data.rowIndex;

            // Part 1: แมปข้อมูลตามโครงสร้างใหม่
            document.getElementById('f_hn').value = data.HN || '-';
            document.getElementById('f_name').value = data.Patient_Name || '-';
            document.getElementById('f_gender_age').value = `${data.Gender || '-'} / ${data.Age || '-'} ปี`;
            document.getElementById('f_pttype').value = data.Patient_Type || '-';
            document.getElementById('f_right').value = data.Right || data.Patient_Right || '-';
            
            document.getElementById('f_diag').value = data.Diagnosis || '-';
            document.getElementById('f_drug').value = data.Drug_name || '-';
            document.getElementById('f_usage').value = data.Drug_usage || data.Drug_Usage || '-';
            document.getElementById('f_datetime').value = data.Order_DateTime || '-';
            
            const docName = data.Doctor_Name || '';
            const license = data.License_No ? `(ว.${data.License_No})` : '';
            document.getElementById('f_doctor').value = `${docName} ${license}`.trim() || '-';

            document.getElementById('f_ldl').value = data.Latest_LDL || '-';
            document.getElementById('f_chol').value = data.Latest_Chol || data.Latest_Cholesterol || '-';
            document.getElementById('f_oldstatin').value = data.Old_statins || '-';

            // Part 2: Indication
            const indRadios = document.getElementsByName('indication');
            const otherInput = document.getElementById('i_indication_other');
            indRadios.forEach(r => r.checked = false); // Clear
            
            if (data.Indication) {
                let matched = false;
                indRadios.forEach(r => {
                    if (r.value === data.Indication && r.value !== 'อื่นๆ') {
                        r.checked = true;
                        matched = true;
                    }
                });
                if (!matched) {
                    document.getElementById('radio_other').checked = true;
                    otherInput.value = data.Indication;
                }
            }
            handleIndicationChange();

            // Part 3: Evaluated & Staff
            const evalRadios = document.getElementsByName('evaluation');
            evalRadios.forEach(r => r.checked = false);
            if (data.Evaluated) {
                evalRadios.forEach(r => { if (r.value === data.Evaluated) r.checked = true; });
            }

            const pharmaSelect = document.getElementById('i_pharmacist');
            if (data.Staff_name && data.Staff_name !== '-') {
                pharmaSelect.value = data.Staff_name;
            } else {
                pharmaSelect.value = '';
            }
        }

        async function submitDUE(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="spinner border-gray-400 border-t-white"></span> กำลังบันทึก...';
            btn.disabled = true;

            const rowIndex = document.getElementById('f_rowIndex').value;
            
            let indication = '';
            document.getElementsByName('indication').forEach(r => { if(r.checked) indication = r.value; });
            if (indication === 'อื่นๆ') indication = document.getElementById('i_indication_other').value;

            let evaluated = '';
            document.getElementsByName('evaluation').forEach(r => { if(r.checked) evaluated = r.value; });

            const staffName = document.getElementById('i_pharmacist').value;

            const payload = {
                action: 'updateDUE',
                sheetName: 'Atorvastatin',
                rowIndex: rowIndex,
                updateData: { Indication: indication, Evaluated: evaluated, Staff_name: staffName }
            };

            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } // หลีกเลี่ยง CORS preflight
                });
                alert('บันทึกผลการประเมินลง Google Sheets เรียบร้อยแล้ว!');
            } catch (error) {
                console.error(error);
                alert('บันทึกข้อมูลสำเร็จ (ปิดการแจ้งเตือนเครือข่าย)');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
