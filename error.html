<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ศูนย์จัดการอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</title>
    
    <!-- Favicon รูปวงกลมสีแดง -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ef4444%22/></svg>">
    
    <!-- Preconnect ช่วยโหลด Font เร็วขึ้น -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans Thai"', 'sans-serif'],

    <!-- โหลด Library พื้นฐาน -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    
    <style>
        body { 
            font-family: 'Noto Sans Thai', sans-serif !important; 
            color: #0f172a; 
            font-size: 14px; 
            background-color: #0f172a;
        }
        .compact-input { padding: 12px 16px; border-radius: 12px; border: 1px solid #cbd5e1; outline: none; transition: all 0.2s; font-size: 1rem; }
        .compact-input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 16px; overflow: hidden; }
        .calendar-day { background-color: white; min-height: 90px; padding: 8px; }
        .calendar-header { background-color: #f8fafc; padding: 12px; text-align: center; font-weight: 700; font-size: 12px; color: #64748b; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="font-sans">
    <div id="root">
        <div class="bg-gradient-to-br from-rose-950 via-red-900 to-red-950 min-h-screen pb-24 transition-colors duration-700">
            <header class="pt-8 pb-4 text-center">
                <h1 class="text-3xl md:text-4xl font-black text-white drop-shadow-lg tracking-tight">ศูนย์จัดการอุบัติการณ์ ฝ่ายเภสัชกรรม รพ.สวี</h1>
            </header>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz8y9YIjm-vWKpAS8MhuWmFZqkDLtJ1XsgmSvJevvQy7QSzwZVxkleVxsWewUXsK65hyw/exec";

        const erErrorOptions = [
            "❌ไม่พบ Error", "ไม่ติดสติกเกอร์ในใบนำทาง (ไม่ใช่ error)", "ไม่ปฏิบัติตามแนวทาง (ไม่ใช่error)",
            "ไม่จ่ายยาที่มีใน stock", "จ่ายยาผิดชนิด", "จ่ายยาผิดความแรง", "จ่ายยาจำนวนขาด/เกิน",
            "จ่ายยาโดยไม่มีคำสั่งแพทย์", "จ่ายยาผิดคน", "ไม่สั่งใช้ยาใน HosXp แต่มีการใช้",
            "สั่งขนาดยาไม่เหมาะสม", "สั่งวิธีใช้ผิด/ไม่ระบุวิธีใช้", "สั่งยาโดยไม่มีข้อบ่งใช้", "สั่งยาซ้ำ"
        ];
        
        const erRiskTypes = ["Prescribing error", "Pre-dispensing error", "Dispensing error", "Transcribing error"];
        const severities = ["A", "B", "C", "D", "E", "F", "G", "H", "I"];
        const severityDescriptions = {
            "A": "เหตุการณ์ซึ่งมีโอกาสก่อให้เกิดความคลาดเคลื่อน",
            "B": "เกิดความคลาดเคลื่อนขึ้น แต่ยาไปไม่ถึงผู้ป่วย",
            "C": "ยาไปถึงผู้ป่วย แต่ไม่ทำให้เกิดอันตราย",
            "D": "ยาไปถึงผู้ป่วย และต้องมีการเฝ้าระวังติดตาม",
            "E": "เกิดอันตรายชั่วคราว และต้องมีการรักษา/แก้ไข",
            "F": "เกิดอันตรายชั่วคราว และต้องนอน รพ. หรือยืดเวลาการนอน รพ.",
            "G": "เกิดอันตรายถาวร",
            "H": "ต้องทำการช่วยชีวิต",
            "I": "เสียชีวิต"
        };
        const erActions = ["แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ และให้บันทึกรายการยาตามหลัง", "แจ้งเจ้าหน้าที่ที่เกี่ยวข้องทราบ"];
        const mrDepartments = ['OPD', 'ER', 'IPDชาย', 'IPDหญิง', 'LR', 'อื่นๆ'];
        const mrPolicies = ['HAD', 'LASA', 'ADR', 'Med reconcile', 'DI'];

        const THAI_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

        const PasteIcon = () => (
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
        );

        const normalizeDateToISO = (v) => {
            if (!v) return '';
            let strVal = String(v).split('T')[0];
            let parts = strVal.split(' ')[0].split('-'); // รองรับรูปแบบ date time ที่เว้นวรรค
            if (parts.length >= 3) {
                let y = parseInt(parts[0]);
                if (y > 2500) y -= 543; 
                return `${y}-${parts[1].padStart(2,'0')}-${parts[2].substring(0,2).padStart(2,'0')}`;
            }
            const d = new Date(v);
            if (!isNaN(d.getTime())) {
                let y = d.getFullYear();
                if (y > 2500) y -= 543;
                return `${y}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            return strVal;
        };

        const formatDisplayDate = (v) => {
            if (!v) return '-';
            const [y, m, d] = normalizeDateToISO(v).split('-');
            return `${d}/${m}/${parseInt(y) + 543}`;
        };

        const formatThaiFullDate = (iso) => {
            if(!iso) return '';
            const [y, m, d] = iso.split('-');
            return `${parseInt(d)} ${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatThaiMonthYear = (isoMonth) => {
            if(!isoMonth) return '';
            const [y, m] = isoMonth.split('-');
            return `${THAI_MONTHS[parseInt(m)-1]} ${parseInt(y) + 543}`;
        };

        const formatTime = (t) => {
            if (!t) return '00:00';
            const s = String(t);
            if (s.includes('T')) return s.split('T')[1].substring(0, 5);
            const p = s.split(':');
            if (p.length >= 2) return `${String(p[0]).padStart(2, '0')}:${String(p[1]).padStart(2, '0')}`;
            return '00:00';
        };

        const calculateShift = (timeStr) => {
            if (!timeStr) return "เวรเช้า";
            const [h, m] = timeStr.split(':').map(Number);
            const mins = h * 60 + m;
            if (mins >= (8 * 60 + 1) && mins <= (16 * 60)) return "เวรเช้า";
            if (mins >= (16 * 60 + 1) && mins <= (24 * 60)) return "เวรบ่าย";
            return "เวรดึก"; // 00:01 ถึง 08:00
        };

        Chart.register(ChartDataLabels);

        const App = () => {
            const [systemMode, setSystemMode] = useState('ER');
            const [activeTab, setActiveTab] = useState('form');
            const [viewMode, setViewMode] = useState('table');
            const [isLoading, setIsLoading] = useState(true);
            const [isPdfReady, setIsPdfReady] = useState(false);
            
            const [data, setData] = useState({ drugs: [], inspectors: [], doctors: [], recorders: [], history: [], errorCategories: [], lasaHistory: [], lastId: 0 });
            
            const initialFormState = {
                date: new Date().toISOString().split('T')[0],
                time: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                mrTime: `${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}`,
                shiftDate: '', totalRx: '', sequence: '-', totalErrors: '-',
                errorType: erErrorOptions[0], hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '',
                inspector: '', doctor: '', recorder: '',
                mrType: '', mrError: '', drug1: '', drug2: '', qty: '', department: '', policy: [],
                shift: '', reportStatus: 'รายงานตัวเอง', basketQty: '', pharmacistCount: ''
            };

            const [form, setForm] = useState(initialFormState);
            const [customPolicy, setCustomPolicy] = useState(''); 

            const [isTotalRxLocked, setIsTotalRxLocked] = useState(false);
            const [isDrugDropdownOpen, setIsDrugDropdownOpen] = useState(false);
            const [isDrug1Open, setIsDrug1Open] = useState(false);
            const [isDrug2Open, setIsDrug2Open] = useState(false);
            
            const [erDrugSearch, setErDrugSearch] = useState('');
            const [mrDrug1Search, setMrDrug1Search] = useState('');
            const [mrDrug2Search, setMrDrug2Search] = useState('');
            
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [isDeleting, setIsDeleting] = useState(false);

            // LASA Edit State
            const [editingLasa, setEditingLasa] = useState(null);
            const [lasaForm, setLasaForm] = useState({ reason: '', management: '', pharmacist: '' });

            const [filterType, setFilterType] = useState('month');
            const [filterDateStart, setFilterDateStart] = useState(() => {
                const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
            });
            const [filterDateEnd, setFilterDateEnd] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeNoError, setExcludeNoError] = useState(true);
            
            const [filterPolicyArray, setFilterPolicyArray] = useState([]);
            const [filterErrorTypeArray, setFilterErrorTypeArray] = useState([]);

            const [expandedPivot, setExpandedPivot] = useState([]); 

            const chartsRef = useRef({ type: null, pharma: null, bar: null, dept: null, sev: null, dow: null, hour: null, shift: null });
            const canvasRefs = { type: useRef(null), pharma: useRef(null), bar: useRef(null), dept: useRef(null), sev: useRef(null), dow: useRef(null), hour: useRef(null), shift: useRef(null) };
            const lastAutoText = useRef('');

            const theme = useMemo(() => {
                let base = {};
                if (systemMode === 'ER') {
                    base = { 
                        bgApp: 'bg-gradient-to-br from-rose-950 via-red-900 to-red-950', 
                        primaryStr: '#e11d48', 
                        btnColorStr: 'bg-red-500', 
                        btnActiveClass: 'bg-red-600 text-white font-bold border-red-600 shadow-md scale-105', 
                        lightBg: 'bg-red-50/50', 
                        btnSubmit: 'bg-red-600 hover:bg-red-700 shadow-red-600/30', 
                        tabActive: 'bg-white text-red-600 font-black shadow-lg rounded-t-2xl' 
                    };
                } else if (systemMode === 'MR') {
                    base = { 
                        bgApp: 'bg-gradient-to-br from-teal-950 via-emerald-900 to-teal-950', 
                        primaryStr: '#059669', 
                        btnColorStr: 'bg-emerald-500', 
                        btnActiveClass: 'bg-emerald-600 text-white font-bold border-emerald-600 shadow-md scale-105', 
                        lightBg: 'bg-teal-50/50', 
                        btnSubmit: 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-600/30', 
                        tabActive: 'bg-white text-emerald-600 font-black shadow-lg rounded-t-2xl' 
                    };
                } else if (systemMode === 'LASA') {
                    base = { 
                        bgApp: 'bg-gradient-to-br from-amber-950 via-yellow-900 to-amber-950', 
                        primaryStr: '#d97706', 
                        btnColorStr: 'bg-yellow-500', 
                        btnActiveClass: 'bg-yellow-600 text-white font-bold border-yellow-600 shadow-md scale-105', 
                        lightBg: 'bg-yellow-50/50', 
                        btnSubmit: 'bg-yellow-600 hover:bg-yellow-700 shadow-yellow-600/30', 
                        tabActive: 'bg-white text-yellow-600 font-black shadow-lg rounded-t-2xl' 
                    };
                }
                
                base.tabInactive = 'bg-black/20 text-white/60 hover:bg-black/40 hover:text-white rounded-t-2xl font-bold backdrop-blur-sm transition-all';
                base.btnInactiveClass = 'bg-white text-slate-500 border-slate-200 hover:border-slate-300 hover:bg-slate-50';
                return base;
            }, [systemMode]);

            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const r = await fetch(GAS_URL);
                    const j = await r.json();
                    if(j.history) setData(j);
                } catch(e) { console.error("Fetch failed", e); }
                setIsLoading(false);
            };

            useEffect(() => {
                const init = async () => {
                    try {
                        const getB64 = async (u) => {
                            const r = await fetch(u);
                            const ab = await r.arrayBuffer();
                            let b = '';
                            const by = new Uint8Array(ab);
                            for(let i=0; i<by.length; i++) b += String.fromCharCode(by[i]);
                            return window.btoa(b);
                        };
                        const [reg, bld] = await Promise.all([
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Light.ttf'),
                            getB64('https://raw.githubusercontent.com/google/fonts/main/ofl/sarabun/Sarabun-Bold.ttf')
                        ]);
                        window.pdfMake.vfs = { ...window.pdfMake.vfs, 'SR.ttf': reg, 'SB.ttf': bld };
                        window.pdfMake.fonts = { Sarabun: { normal: 'SR.ttf', bold: 'SB.ttf' } };
                        setIsPdfReady(true);
                    } catch(e) { console.error("PDF Font failed", e); }
                    await fetchData();
                };
                init();
            }, []);

            const handleModeChange = (mode) => {
                if (mode !== systemMode) {
                    setSystemMode(mode);
                    if (mode === 'LASA') {
                        setActiveTab('history');
                    } else {
                        setActiveTab('form');
                    }
                    setFilterPolicyArray([]); 
                    setFilterErrorTypeArray([]);
                    setCustomPolicy('');
                    lastAutoText.current = ''; 
                    setForm(prev => ({
                        ...initialFormState,
                        date: prev.date,
                        time: prev.time,
                        mrTime: prev.mrTime,
                        shift: calculateShift(prev.mrTime)
                    }));
                }
            };

            const handleDateChange = (e) => {
                const newDate = e.target.value;
                setForm(prev => ({ ...initialFormState, date: newDate, time: prev.time, mrTime: prev.mrTime, shift: calculateShift(prev.mrTime), errorType: erErrorOptions[0] }));
            };

            useEffect(() => { if (!isDrugDropdownOpen) setErDrugSearch(''); }, [isDrugDropdownOpen]);
            useEffect(() => { if (!isDrug1Open) setMrDrug1Search(''); }, [isDrug1Open]);
            useEffect(() => { if (!isDrug2Open) setMrDrug2Search(''); }, [isDrug2Open]);

            // คำนวณเวรจ่ายยา (Shift) สำหรับโหมด MR เมื่อมีการเปลี่ยนเวลา
            useEffect(() => {
                if (systemMode === 'MR') {
                    setForm(p => ({ ...p, shift: calculateShift(p.mrTime) }));
                }
            }, [form.mrTime, systemMode]);

            useEffect(() => {
                if (systemMode === 'ER') {
                    const [h, m] = form.time.split(':').map(Number);
                    const d = new Date(form.date);
                    let sD, sM, sY, eD;
                    
                    if (h < 8) {
                        const p = new Date(d); p.setDate(p.getDate() - 1);
                        sD = p.getDate(); eD = d.getDate();
                        sM = String(p.getMonth() + 1).padStart(2, '0');
                        sY = p.getFullYear();
                    } else {
                        const n = new Date(d); n.setDate(n.getDate() + 1);
                        sD = d.getDate(); eD = n.getDate();
                        sM = String(d.getMonth() + 1).padStart(2, '0');
                        sY = d.getFullYear();
                    }
                    
                    const calcShiftDate = `${sD}-${eD}/${sM}/${sY}`;
                    const cleanStr = (s) => String(s || '').replace(/\s+/g, '');
                    const targetShift = cleanStr(calcShiftDate);
                    
                    const shiftItems = data.history.filter(h => {
                        const isER = (h.systemMode === 'ER' || !h.systemMode);
                        const hShift = cleanStr(h.shiftDate || h['วันที่'] || h['กะ']); 
                        return isER && hShift === targetShift;
                    });
                    
                    const shiftRx = shiftItems.find(h => h.totalRx || h['จำนวนใบสั่งยา'] || h['ใบสั่งยารวม']);
                    const rxVal = shiftRx ? (shiftRx.totalRx || shiftRx['จำนวนใบสั่งยา'] || shiftRx['ใบสั่งยารวม']) : '';
                    
                    const errs = shiftItems.filter(h => {
                        const errType = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                        return errType && errType !== erErrorOptions[0] && errType !== '❌ไม่พบ Error';
                    }).length;
                    
                    const isErr = form.errorType !== erErrorOptions[0] && form.errorType !== '❌ไม่พบ Error';
                    
                    setForm(p => ({
                        ...p,
                        shiftDate: calcShiftDate,
                        totalRx: rxVal || p.totalRx, 
                        sequence: isErr ? errs + 1 : '-',
                        totalErrors: isErr ? errs + 1 : '-'
                    }));
                    setIsTotalRxLocked(!!rxVal);
                }
            }, [form.date, form.time, data.history, form.errorType, systemMode]);

            useEffect(() => {
                let currentHNStr = `HN ${form.hn || '.....'}`;
                let baseText = '';
                
                if (systemMode === 'ER') {
                    if (form.errorType && form.errorType !== erErrorOptions[0]) baseText += ` ${form.errorType}`;
                    if (form.selectedDrugs.length > 0) baseText += ` ได้แก่ยา ${form.selectedDrugs.join(', ')}`;
                } else {
                    if (form.mrError) baseText += ` ${form.mrError}`;
                    if (form.drug1) baseText += ` คือยา ${form.drug1}`;
                    if (form.drug2) baseText += ` จัดผิดเป็น ${form.drug2}`;
                    if (form.qty) baseText += ` จำนวน ${form.qty} เม็ด`;
                }

                const newAutoText = (currentHNStr + baseText).trim();

                setForm(p => {
                    let updatedDetails = p.details || '';
                    
                    if (!updatedDetails || !lastAutoText.current || updatedDetails === lastAutoText.current) {
                        lastAutoText.current = newAutoText;
                        return { ...p, details: newAutoText };
                    } 
                    else {
                        const oldHNRegex = /^HN\s[\w\.]+/;
                        if (oldHNRegex.test(updatedDetails)) {
                            updatedDetails = updatedDetails.replace(oldHNRegex, currentHNStr);
                        } else {
                            updatedDetails = currentHNStr + ' ' + updatedDetails;
                        }
                        
                        let currentBaseDetails = updatedDetails.replace(oldHNRegex, '').trim();
                        let oldBaseText = lastAutoText.current.replace(oldHNRegex, '').trim();
                        
                        if (currentBaseDetails === oldBaseText || oldBaseText === '') {
                             updatedDetails = (currentHNStr + ' ' + baseText).trim();
                             lastAutoText.current = updatedDetails;
                        }
                        return { ...p, details: updatedDetails };
                    }
                });
            }, [form.hn, form.errorType, form.mrError, form.selectedDrugs, form.drug1, form.drug2, form.qty, systemMode]);

            const handleDelete = async (id) => {
                setIsDeleting(true);
                try {
                    const res = await fetch(GAS_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: "DELETE", systemMode: "MR", id: id }) 
                    });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setDeleteConfirm(null);
                        await fetchData();
                    } else {
                        alert("เกิดข้อผิดพลาดในการลบ: " + json.message);
                    }
                } catch (e) { console.error("Delete failed", e); }
                setIsDeleting(false);
            };

            const handleSaveLasa = async (rowIndex) => {
                try {
                    const res = await fetch(GAS_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: "UPDATE_LASA", rowIndex: rowIndex, ...lasaForm }) 
                    });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setEditingLasa(null);
                        await fetchData();
                    }
                } catch (e) { console.error("Save LASA failed", e); }
            };

            const lasaStats = useMemo(() => {
                if(!data.lasaHistory) return [];
                const pairs = {};
                data.lasaHistory.forEach(h => {
                    if(h.drug1 && h.drug2) {
                        const pairArr = [h.drug1.trim(), h.drug2.trim()].sort();
                        const key = pairArr.join(' ↔ ');
                        pairs[key] = (pairs[key] || 0) + 1;
                    }
                });
                return Object.entries(pairs).sort((a,b) => b[1] - a[1]);
            }, [data.lasaHistory]);

            const baseFiltered = useMemo(() => {
                if (!data.history) return [];
                return data.history.filter(item => {
                    const matchMode = item.systemMode === systemMode || (!item.systemMode && systemMode === 'ER');
                    const itemDate = item.date || item['Date'] || item['Timestamp'] || item['วันที่']; 
                    const iso = normalizeDateToISO(itemDate);
                    
                    const matchDate = filterType === 'day' ? (iso >= filterDateStart && iso <= filterDateEnd) : iso.startsWith(filterMonth);
                    const matchSearch = String(item.hn || item['HN'] || '').includes(searchTerm) || 
                                      String(item.details || item['รายละเอียด'] || '').toLowerCase().includes(searchTerm.toLowerCase());
                    
                    let matchPolicy = true;
                    if (systemMode === 'MR' && filterPolicyArray.length > 0) {
                        const itemPolStr = item.policy || item['นโยบายยา'] || '';
                        matchPolicy = filterPolicyArray.some(p => itemPolStr.includes(p));
                    }
                    
                    let matchType = true;
                    if (systemMode === 'MR' && filterErrorTypeArray.length > 0) {
                        const itemType = item.type || item['ความคลาดเคลื่อน'] || item['Risk Type'] || '';
                        matchType = filterErrorTypeArray.includes(itemType);
                    }

                    return matchMode && matchDate && matchSearch && matchPolicy && matchType;
                });
            }, [data.history, systemMode, filterType, filterDateStart, filterDateEnd, filterMonth, searchTerm, filterPolicyArray, filterErrorTypeArray]);

            const displayList = useMemo(() => baseFiltered.filter(i => {
                const errVal = i.errorType || i['ความเสี่ยงที่พบ'] || i['ความเสี่ยง'] || i['Error'] || i.error || i['รายการ Error'] || '';
                const isNoErr = (errVal === erErrorOptions[0]) || (errVal === '');
                return !(excludeNoError && isNoErr);
            }), [baseFiltered, excludeNoError]);

            const stats = useMemo(() => {
                const daily = {};
                let totalRxCount = 0;
                const seenShifts = new Set();
                const counts = { type: {}, pharma: {}, doc: {}, nurse: {}, drug: {}, dept: {}, sev: {}, pivot: {}, dow: {}, hour: {}, shift: {} };

                // Variables for Insight Dashboard
                let maxBasketError = 0;
                let maxBasketPharmaCount = '-';

                baseFiltered.forEach(h => {
                    const itemDate = h.date || h['Date'] || h['Timestamp'] || h['วันที่'];
                    const iso = normalizeDateToISO(itemDate);
                    if (!daily[iso]) daily[iso] = { rx: 0, err: 0 };
                    
                    if (systemMode === 'ER') {
                        const shiftVal = h.shiftDate || h['วันที่'] || h['กะ']; 
                        const rxVal = h.totalRx || h['จำนวนใบสั่งยา'] || h['ใบสั่งยารวม'];
                        const shiftId = shiftVal ? `${shiftVal}` : null;
                        if (rxVal && shiftId && !seenShifts.has(shiftId)) {
                            seenShifts.add(shiftId);
                            totalRxCount += parseInt(rxVal) || 0;
                            daily[iso].rx += parseInt(rxVal) || 0;
                        }
                    }
                    
                    const errVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                    const isErr = errVal && errVal !== erErrorOptions[0] && errVal !== '';
                    if (isErr) daily[iso].err += 1;
                    
                    if (systemMode === 'MR') {
                        // วันในสัปดาห์
                        const dObj = new Date(itemDate);
                        if(!isNaN(dObj.getTime())) {
                            const days = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
                            const dayName = days[dObj.getDay()];
                            counts.dow[dayName] = (counts.dow[dayName] || 0) + 1;
                        }
                        
                        // ช่วงเวลา
                        let timeStr = h.time || h['เวลา'];
                        if(!timeStr && typeof itemDate === 'string' && itemDate.includes(' ')) {
                            timeStr = itemDate.split(' ')[1];
                        }
                        if(timeStr) {
                            const hStr = String(timeStr).split(':')[0].padStart(2, '0') + ':00';
                            counts.hour[hStr] = (counts.hour[hStr] || 0) + 1;
                        }
                        
                        // เวร
                        const shiftVal = h.shift || h['เวรที่เกิดเหตุ'] || h['เวร'];
                        if(shiftVal) counts.shift[shiftVal] = (counts.shift[shiftVal] || 0) + 1;

                        // Insight Logic
                        const bQty = parseInt(h.basketQty || h['จำนวนยาในตะกร้าที่ผิด'] || h['จำนวนยาในตะกร้า']);
                        const pCount = parseInt(h.pharmacistCount || h['จำนวนผู้จัดยาวันนี้'] || h['จำนวนผู้จัดยา']);

                        if (!isNaN(bQty) && bQty > maxBasketError) {
                            maxBasketError = bQty;
                            maxBasketPharmaCount = (!isNaN(pCount) && pCount > 0) ? pCount : '-';
                        }
                    }
                });

                const errors = baseFiltered.filter(h => {
                    const eVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error'] || '';
                    return eVal && eVal !== erErrorOptions[0] && eVal !== '';
                });

                errors.forEach(h => {
                    const isMR = systemMode === 'MR';
                    const typeLabel = isMR ? (h.type || h['ความคลาดเคลื่อน'] || h['Risk Type']) : (h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h['Error'] || h.error || h['รายการ Error']);
                    
                    if(typeLabel) {
                        counts.type[typeLabel] = (counts.type[typeLabel] || 0) + 1;
                        
                        if (isMR) {
                            const detailErrLabel = h.error || h['รายการ Error'] || h['Error'];
                            if (!counts.pivot[typeLabel]) counts.pivot[typeLabel] = { total: 0, sub: {} };
                            counts.pivot[typeLabel].total += 1;
                            
                            if (detailErrLabel) {
                                if (!counts.pivot[typeLabel].sub[detailErrLabel]) counts.pivot[typeLabel].sub[detailErrLabel] = { total: 0, depts: {} };
                                counts.pivot[typeLabel].sub[detailErrLabel].total += 1;
                                
                                const dLabel = h.department || h['หน่วยงานที่เกิด'] || 'ไม่ระบุ';
                                counts.pivot[typeLabel].sub[detailErrLabel].depts[dLabel] = (counts.pivot[typeLabel].sub[detailErrLabel].depts[dLabel] || 0) + 1;
                            }
                        }
                    }
                    
                    if(isMR) {
                        const deptLabel = h.department || h['หน่วยงานที่เกิด'];
                        if(deptLabel) counts.dept[deptLabel] = (counts.dept[deptLabel] || 0) + 1;
                        
                        const sevLabel = h.severity || h['ระดับความรุนแรง'];
                        if(sevLabel) counts.sev[sevLabel] = (counts.sev[sevLabel] || 0) + 1;
                    }
                    
                    const recorderLabel = h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'];
                    if(recorderLabel) counts.pharma[recorderLabel] = (counts.pharma[recorderLabel] || 0) + 1;
                    
                    const doctorLabel = h.doctor || h['รคส.'] || h['แพทย์'] || h['พยาบาล'];
                    if(doctorLabel) counts.nurse[doctorLabel] = (counts.nurse[doctorLabel] || 0) + 1;

                    const inspectorLabel = h.inspector || h['ผู้ตรวจ'] || h['ผู้ตรวจเช็ค'] || h['แพทย์'];
                    if(inspectorLabel) counts.doc[inspectorLabel] = (counts.doc[inspectorLabel] || 0) + 1;
                    
                    const drugStr = h.drugs || h['ยาที่เกี่ยวข้อง'] || h['รายการยา'] || h.drug1 || h['ยา 1'] || h['ยา/ความแรงที่เกี่ยวข้อง(1)'];
                    if(drugStr) drugStr.split(',').forEach(d => {
                        const dr = d.trim(); if(dr) counts.drug[dr] = (counts.drug[dr] || 0) + 1;
                    });
                    
                    if (isMR && (h.drug2 || h['ยา/ความแรงที่เกี่ยวข้อง(2)'])) {
                         const dr2 = String(h.drug2 || h['ยา/ความแรงที่เกี่ยวข้อง(2)']).trim();
                         if (dr2) counts.drug[dr2] = (counts.drug[dr2] || 0) + 1;
                    }
                });

                return { 
                    rx: totalRxCount, 
                    err: errors.length, 
                    pct: totalRxCount > 0 ? ((errors.length/totalRxCount)*100).toFixed(2) : '0.00', 
                    counts, 
                    daily,
                    insight: {
                        maxBasket: maxBasketError,
                        maxBasketPharmaCount: maxBasketPharmaCount
                    }
                };
            }, [baseFiltered, systemMode]);

            useEffect(() => {
                if (activeTab === 'history' && !isLoading && systemMode !== 'LASA') {
                    const opt = { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { 
                            legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10, family: "'Noto Sans Thai', sans-serif" } } },
                            datalabels: { color: '#fff', font: { weight: 'bold', size: 11 }, formatter: (v) => v > 0 ? v : '' } 
                        } 
                    };
                    
                    if (canvasRefs.bar.current) {
                        if (chartsRef.current.bar) chartsRef.current.bar.destroy();
                        const sorted = Object.keys(stats.daily).sort();
                        
                        let datasets = [];
                        if (systemMode === 'ER') {
                            datasets = [
                                { label: 'ปกติ (ไม่มี Error)', data: sorted.map(d => Math.max(0, stats.daily[d].rx - stats.daily[d].err)), backgroundColor: '#10b981', stack: 'a', borderRadius: 4 },
                                { label: 'Error', data: sorted.map(d => stats.daily[d].err), backgroundColor: '#ef4444', stack: 'a', borderRadius: 4 }
                            ];
                        } else {
                            datasets = [
                                { label: 'จำนวน Error', data: sorted.map(d => stats.daily[d].err), backgroundColor: '#10b981', borderRadius: 6 }
                            ];
                        }

                        chartsRef.current.bar = new Chart(canvasRefs.bar.current, {
                            type: 'bar', data: { labels: sorted.map(d => formatDisplayDate(d)), datasets: datasets }, 
                            options: { ...opt, scales: systemMode === 'ER' ? { x: { stacked: true }, y: { stacked: true } } : {} }
                        });
                    }

                    if (canvasRefs.type.current) {
                        if (chartsRef.current.type) chartsRef.current.type.destroy();
                        const dataVals = Object.values(stats.counts.type);
                        if(dataVals.length > 0) {
                            chartsRef.current.type = new Chart(canvasRefs.type.current, {
                                type: 'doughnut', data: { labels: Object.keys(stats.counts.type), datasets: [{ data: dataVals, backgroundColor: ['#ef4444','#f97316','#f59e0b','#84cc16','#10b981','#06b6d4','#3b82f6','#6366f1','#ec4899'], borderWidth: 0 }] },
                                options: { ...opt, cutout: '60%' }
                            });
                        }
                    }

                    if (canvasRefs.pharma.current) {
                        if (chartsRef.current.pharma) chartsRef.current.pharma.destroy();
                        const pVals = Object.values(stats.counts.pharma);
                        if(pVals.length > 0) {
                            chartsRef.current.pharma = new Chart(canvasRefs.pharma.current, {
                                type: 'pie', data: { labels: Object.keys(stats.counts.pharma), datasets: [{ data: pVals, backgroundColor: ['#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#f43f5e'], borderWidth: 0 }] },
                                options: opt
                            });
                        }
                    }
                    
                    if (systemMode === 'MR') {
                        if (canvasRefs.dept.current) {
                            if (chartsRef.current.dept) chartsRef.current.dept.destroy();
                            const dVals = Object.values(stats.counts.dept);
                            if(dVals.length > 0) {
                                chartsRef.current.dept = new Chart(canvasRefs.dept.current, {
                                    type: 'pie', data: { labels: Object.keys(stats.counts.dept), datasets: [{ data: dVals, backgroundColor: ['#f43f5e','#ec4899','#d946ef','#a855f7','#8b5cf6','#6366f1'], borderWidth: 0 }] },
                                    options: opt
                                });
                            }
                        }
                        if (canvasRefs.sev.current) {
                            if (chartsRef.current.sev) chartsRef.current.sev.destroy();
                            const sVals = Object.values(stats.counts.sev);
                            if(sVals.length > 0) {
                                chartsRef.current.sev = new Chart(canvasRefs.sev.current, {
                                    type: 'doughnut', data: { labels: Object.keys(stats.counts.sev), datasets: [{ data: sVals, backgroundColor: ['#10b981','#84cc16','#eab308','#f97316','#ef4444','#b91c1c'], borderWidth: 0 }] },
                                    options: { ...opt, cutout: '60%' }
                                });
                            }
                        }
                        
                        // New MR Charts (DOW, Hour, Shift)
                        if (canvasRefs.dow.current) {
                            if (chartsRef.current.dow) chartsRef.current.dow.destroy();
                            const days = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์', 'อาทิตย์'];
                            const dVals = days.map(d => stats.counts.dow[d] || 0);
                            chartsRef.current.dow = new Chart(canvasRefs.dow.current, {
                                type: 'bar', data: { labels: days, datasets: [{ label:'ความถี่รายวัน', data: dVals, backgroundColor: '#0ea5e9', borderRadius: 4 }] },
                                options: opt
                            });
                        }
                        if (canvasRefs.hour.current) {
                            if (chartsRef.current.hour) chartsRef.current.hour.destroy();
                            const hours = Array.from({length: 24}, (_, i) => `${String(i).padStart(2, '0')}:00`);
                            const hVals = hours.map(h => stats.counts.hour[h] || 0);
                            chartsRef.current.hour = new Chart(canvasRefs.hour.current, {
                                type: 'bar', data: { labels: hours, datasets: [{ label:'ความชุกตามช่วงเวลา', data: hVals, backgroundColor: '#f59e0b', borderRadius: 4 }] },
                                options: opt
                            });
                        }
                        if (canvasRefs.shift.current) {
                            if (chartsRef.current.shift) chartsRef.current.shift.destroy();
                            const shifts = ['เวรเช้า', 'เวรบ่าย', 'เวรดึก'];
                            const shVals = shifts.map(s => stats.counts.shift[s] || 0);
                            chartsRef.current.shift = new Chart(canvasRefs.shift.current, {
                                type: 'pie', data: { labels: shifts, datasets: [{ data: shVals, backgroundColor: ['#fcd34d', '#f97316', '#312e81'], borderWidth: 0 }] },
                                options: opt
                            });
                        }
                    }
                }
            }, [activeTab, stats, isLoading, systemMode]);

            const handlePaste = async (field) => {
                try {
                    const text = await navigator.clipboard.readText();
                    setForm(p => ({ ...p, [field]: text }));
                } catch (err) {
                    console.error('Clipboard access denied');
                }
            };

            const genPDF = () => {
                if(!isPdfReady) return;
                
                const dateSummary = filterType === 'day' 
                    ? `ตั้งแต่ ${formatThaiFullDate(filterDateStart)} ถึง ${formatThaiFullDate(filterDateEnd)}`
                    : `ประจำเดือน ${formatThaiMonthYear(filterMonth)}`;

                let body = [];
                let widths = [];
                
                // Sort array oldest to newest based on Date
                const sortedList = [...displayList].sort((a, b) => {
                    const dateA = new Date(normalizeDateToISO(a.date || a['Date'] || a['Timestamp'] || a['วันที่']));
                    const dateB = new Date(normalizeDateToISO(b.date || b['Date'] || b['Timestamp'] || b['วันที่']));
                    return dateA - dateB; 
                });

                if (systemMode === 'ER') {
                    widths = [18, '7%', '5%', '14%', '*', '9%', 24, '13%', '7%', '7%', 45];
                    body.push([
                        { text: 'ที่', style: 'th' }, { text: 'วันที่', style: 'th' }, { text: 'เวลา', style: 'th' },
                        { text: 'ความเสี่ยงที่พบ', style: 'th' }, { text: 'รายละเอียด', style: 'th' },
                        { text: 'Risk Type', style: 'th' }, { text: 'ระดับ', style: 'th' },
                        { text: 'การแก้ไข', style: 'th' }, { text: 'แพทย์', style: 'th' },
                        { text: 'พยาบาล', style: 'th' }, { text: 'ผู้บันทึก', style: 'th' }
                    ]);

                    sortedList.forEach((h, i) => {
                        const errVal = h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h.error || h['รายการ Error'] || h['Error'] || '-';
                        const isNoErr = !errVal || errVal === erErrorOptions[0];
                        body.push([
                            { text: i+1, alignment: 'center' },
                            { text: formatDisplayDate(h.date || h['Date'] || h['วันที่']), alignment: 'center', noWrap: true },
                            { text: formatTime(h.time || h['เวลา (น.)'] || h['เวลา']), alignment: 'center', noWrap: true },
                            { text: errVal, color: isNoErr ? '#10b981' : theme.primaryStr, bold: true },
                            { text: h.details || h['รายละเอียด'] || '-', fontSize: 8 },
                            { text: h.riskType || h['ประเภทของความเสี่ยง'] || h['ประเภทความเสี่ยง'] || h.type || h['ความคลาดเคลื่อน'] || '-', fontSize: 8 },
                            { text: h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-', alignment: 'center', bold: true },
                            { text: h.action || h['การแก้ไข'] || '-', fontSize: 8 },
                            { text: h.inspector || h['ผู้ตรวจ'] || h['ผู้ตรวจเช็ค'] || h['แพทย์'] || '-', fontSize: 8 },
                            { text: h.doctor || h['รคส.'] || h['แพทย์'] || h['พยาบาล'] || '-', fontSize: 8 },
                            { text: (h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'] || '').substring(0, 10), alignment: 'center' }
                        ]);
                    });
                } else {
                    widths = [18, '10%', '13%', '13%', '*', '10%', 24, '10%', 45];
                    body.push([
                        { text: 'ที่', style: 'th' }, { text: 'วันที่/เวลา', style: 'th' }, { text: 'ความคลาดเคลื่อน', style: 'th' },
                        { text: 'Error', style: 'th' }, { text: 'รายละเอียด', style: 'th' },
                        { text: 'หน่วยงาน', style: 'th' }, { text: 'ระดับ', style: 'th' },
                        { text: 'นโยบายยา', style: 'th' }, { text: 'เภสัชกร', style: 'th' }
                    ]);

                    sortedList.forEach((h, i) => {
                        const dateStr = h.date || h['Date'] || h['วันที่'];
                        const timeStr = h.time || h['เวลา'] || '';
                        const dateTimeStr = formatDisplayDate(dateStr) + ' ' + formatTime(timeStr);
                        
                        body.push([
                            { text: i+1, alignment: 'center' },
                            { text: dateTimeStr.trim(), alignment: 'center' },
                            { text: h.type || h['ความคลาดเคลื่อน'] || '-', color: theme.primaryStr, bold: true },
                            { text: h.error || h['รายการ Error'] || h['Error'] || '-', fontSize: 8 },
                            { text: h.details || h['รายละเอียด'] || '-', fontSize: 8 },
                            { text: h.department || h['หน่วยงานที่เกิด'] || '-', fontSize: 8, alignment: 'center' },
                            { text: h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-', alignment: 'center', bold: true },
                            { text: h.policy || h['นโยบายยา'] || '-', fontSize: 8 },
                            { text: (h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'] || '').substring(0, 10), alignment: 'center' }
                        ]);
                    });
                }

                const doc = {
                    pageSize: 'A4', pageOrientation: 'landscape', pageMargins: [20, 20, 20, 30],
                    defaultStyle: { font: 'Sarabun', fontSize: 9, lineHeight: 1.1 },
                    styles: { th: { bold: true, alignment: 'center', fillColor: '#f1f5f9' } },
                    content: [
                        { text: `รายงานสรุป ${systemMode} Medication Errors`, fontSize: 16, bold: true, alignment: 'center', color: theme.primaryStr, margin: [0,0,0,2] },
                        { text: dateSummary, fontSize: 12, alignment: 'center', margin: [0,0,0,4], bold: true },
                        { text: `จำนวน Errors ${stats.err.toLocaleString()} รายการ`, fontSize: 11, alignment: 'center', margin: [0,0,0,10] },
                        { 
                            table: { headerRows: 1, widths: widths, body }, 
                            layout: { 
                                hLineWidth: () => 0.5, vLineWidth: () => 0.5, 
                                hLineColor: () => '#94a3b8', vLineColor: () => '#94a3b8', 
                                paddingLeft: () => 3, paddingRight: () => 3, paddingTop: () => 4, paddingBottom: () => 4 
                            }
                        }
                    ],
                    footer: (c, p) => ({ text: `หน้า ${c} จาก ${p}`, alignment: 'center', fontSize: 8, margin: [0, 10] })
                };
                pdfMake.createPdf(doc).open();
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const payload = systemMode === 'ER' 
                        ? { ...form, systemMode, drugs: form.selectedDrugs.join(', ') }
                        : { ...form, systemMode, type: form.mrType, error: form.mrError, policy: form.policy.join(', ') };
                    
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const json = await res.json();
                    if(json.status === 'success') {
                        setShowModal(true); await fetchData();
                        setForm(p => ({ ...p, hn: '', selectedDrugs: [], details: '', riskType: '', severity: '', action: '', mrType: '', mrError: '', drug1: '', drug2: '', qty: '', policy: [], basketQty: '', pharmacistCount: '' }));
                        lastAutoText.current = ''; 
                    }
                } catch(e) { console.error(e); }
                setIsSubmitting(false);
            };

            const togglePivot = (typeLabel) => {
                setExpandedPivot(prev => prev.includes(typeLabel) ? prev.filter(x => x !== typeLabel) : [...prev, typeLabel]);
            };

            const renderCalendar = () => {
                const [y, m] = filterMonth.split('-').map(Number);
                const first = new Date(y, m - 1, 1).getDay();
                const days = new Date(y, m, 0).getDate();
                const grid = [];
                for(let i=0; i<first; i++) grid.push(<div key={`e-${i}`} className="calendar-day bg-slate-50/40"></div>);
                for(let d=1; d<=days; d++) {
                    const iso = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

                                            </div>
                                        </div>
                                        <button onClick={genPDF} className={`group flex flex-col items-center justify-center gap-3 rounded-3xl text-white font-black shadow-xl hover:shadow-2xl active:scale-95 transition-all ${theme.btnColorStr} min-h-[150px]`}>
                                            <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                            <span className="text-xs uppercase tracking-widest">โหลดรายงาน PDF</span>
                                        </button>
                                    </div>

                                    {/* --- INSIGHT CARD (MR ONLY) --- */}
                                    {systemMode === 'MR' && (
                                        <div className="bg-gradient-to-r from-amber-50 to-yellow-50 p-6 rounded-3xl border border-amber-100 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4 mt-5">
                                            <div className="flex items-center gap-3">
                                                <div className="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white text-xl shadow-md">💡</div>
                                                <div>
                                                    <h4 className="text-sm font-black text-amber-800 uppercase tracking-widest">Pharmacy Insight</h4>
                                                    <p className="text-[10px] font-bold text-amber-600/80">สถิติจากยาในตะกร้าและผู้จัดยา</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-6 md:gap-12 bg-white px-6 py-3 rounded-2xl shadow-sm border border-amber-100/50">
                                                <div className="text-center">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">ยาในตะกร้าที่ผิดมากที่สุด</div>
                                                    <div className="text-3xl font-black text-rose-600">{stats.insight?.maxBasket || 0} <span className="text-xs text-slate-400">รายการ</span></div>
                                                </div>
                                                <div className="w-px bg-slate-100"></div>
                                                <div className="text-center">
                                                    <div className="text-[10px] font-bold text-slate-400 uppercase mb-1">จำนวนผู้จัดยาที่เกี่ยวข้อง</div>
                                                    <div className="text-3xl font-black text-amber-600">{stats.insight?.maxBasketPharmaCount || '-'} <span className="text-xs text-slate-400">คน</span></div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <div className="flex flex-wrap justify-between items-center gap-4 mb-4">
                                            <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">คลังข้อมูลอุบัติการณ์ ({displayList.length})</h3>
                                            <div className="flex items-center gap-4">
                                                <label className="flex items-center gap-2 cursor-pointer">
                                                    <input type="checkbox" checked={excludeNoError} onChange={()=>setExcludeNoError(!excludeNoError)} className="sr-only" />
                                                    <div className={`w-10 h-5 rounded-full transition-colors relative ${excludeNoError ? 'bg-slate-700' : 'bg-slate-200'}`}>
                                                        <div className={`absolute top-0.5 left-1 bg-white w-4 h-4 rounded-full transition-transform ${excludeNoError ? 'translate-x-4' : 'translate-x-0'}`}></div>
                                                    </div>
                                                    <span className="text-[10px] font-bold text-slate-600">ซ่อนไม่พบ Error</span>
                                                </label>
                                                {filterType==='month' && (
                                                    <div className="flex bg-slate-100 p-1 rounded-xl">
                                                        <button onClick={()=>setViewMode('table')} className={`px-3 py-1 rounded-lg text-[10px] font-black ${viewMode==='table' ? 'bg-white shadow-sm' : 'text-slate-400'}`}>ตาราง</button>
                                                        <button onClick={()=>setViewMode('calendar')} className={`px-3 py-1 rounded-lg text-[10px] font-black ${viewMode==='calendar' ? 'bg-white shadow-sm' : 'text-slate-400'}`}>ปฏิทิน</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {viewMode === 'calendar' && filterType === 'month' ? (
                                            <div className="calendar-grid animate-fadeIn">
                                                {['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=><div key={d} className="calendar-header">{d}</div>)}
                                                {renderCalendar()}
                                            </div>
                                        ) : (
                                            <div className="overflow-x-auto border border-slate-100 rounded-2xl max-h-[400px] custom-scrollbar shadow-inner bg-slate-50/30 relative">
                                                <table className="w-full text-left text-xs border-collapse min-w-[1000px]">
                                                    <thead className="bg-white sticky top-0 z-20 shadow-sm">
                                                        <tr>
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-12 text-center">No.</th>
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-32 text-center">วันที่/เวลา</th>
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-48">ความเสี่ยง / Error</th>
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-48">รายละเอียด</th>
                                                            {systemMode === 'ER' && <th className="p-3 font-black uppercase text-slate-400 border-b w-32">Risk Type</th>}
                                                            {systemMode === 'MR' && <th className="p-3 font-black uppercase text-slate-400 border-b w-32 text-center">หน่วยงาน</th>}
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-16 text-center">ระดับ</th>
                                                            <th className="p-3 font-black uppercase text-slate-400 border-b w-32 text-center">ผู้บันทึก</th>
                                                            {systemMode === 'MR' && <th className="p-3 font-black uppercase text-slate-400 border-b w-16 text-center">จัดการ</th>}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 bg-white">
                                                        {displayList.map((h, i)=>{
                                                            const isMR = systemMode === 'MR';
                                                            const errVal = isMR ? (h.type || h['ความคลาดเคลื่อน'] || '-') : (h.errorType || h['ความเสี่ยงที่พบ'] || h['ความเสี่ยง'] || h.error || h['Error'] || '-');
                                                            const subErr = isMR ? (h.error || h['รายการ Error'] || '') : '';
                                                            const isNoErr = !errVal || errVal === erErrorOptions[0];
                                                            return (
                                                            <tr key={h['ลำดับที่'] || i} className="hover:bg-slate-50/80 transition-colors">
                                                                <td className="p-3 align-top text-center font-bold text-slate-500">{h['ลำดับที่'] || i+1}</td>
                                                                <td className="p-3 align-top text-center">
                                                                    <div className="font-black text-slate-700">{formatDisplayDate(h.date || h['Date'] || h['วันที่'])}</div>
                                                                    <div className="text-[10px] text-slate-400 font-medium">{formatTime(h.time || h['เวลา (น.)'] || h['เวลา'])}</div>
                                                                </td>
                                                                <td className="p-3 align-top">
                                                                    <div className="font-black leading-tight" style={{color: isNoErr ? '#10b981' : theme.primaryStr}}>{errVal}</div>
                                                                    {subErr && <div className="text-[10px] text-slate-500 mt-1">{subErr}</div>}
                                                                </td>
                                                                <td className="p-3 align-top">
                                                                    <div className="text-slate-600 leading-relaxed italic text-[11px] mb-1">"{h.details || h['รายละเอียด'] || '-'}"</div>
                                                                    <span className="font-black text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded text-[10px]">HN: {h.hn || h['HN'] || '-'}</span>
                                                                </td>
                                                                {isMR ? (
                                                                    <td className="p-3 align-top text-center font-bold text-slate-600 text-[11px]">{h.department || h['หน่วยงานที่เกิด'] || '-'}</td>
                                                                ) : (
                                                                    <td className="p-3 align-top text-slate-600 text-[11px]">{h.riskType || h['ประเภทของความเสี่ยง'] || h.type || '-'}</td>
                                                                )}
                                                                <td className="p-3 align-top text-center font-black text-slate-700">{h.severity || h['ระดับความรุนแรง'] || h['ระดับ'] || '-'}</td>
                                                                <td className="p-3 align-top text-center font-black text-slate-700 text-[11px]">{h.recorder || h['ผู้บันทึก'] || h['เภสัชกร'] || '-'}</td>
                                                                {isMR && (
                                                                    <td className="p-3 align-top text-center">
                                                                        <button onClick={()=>{ if(window.confirm('คุณต้องการลบข้อมูลลำดับที่ ' + h['ลำดับที่'] + ' ใช่หรือไม่?\n(ข้อมูลจะถูกลบออกจากระบบทันที)')) { handleDelete(h['ลำดับที่']); } }} 
                                                                            disabled={isDeleting}
                                                                            className="bg-red-50 hover:bg-red-100 text-red-500 p-1.5 rounded-lg transition-colors">
                                                                            🗑️
                                                                        </button>
                                                                    </td>
                                                                )}
                                                            </tr>
                                                        )})}
                                                        {displayList.length===0 && <tr><td colSpan="8" className="p-10 text-center text-slate-400 font-black text-sm uppercase bg-slate-50/50">ไม่พบข้อมูลในระบบ</td></tr>}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>

                                    {/* Dashboard Charts */}
                                    <div className={`grid grid-cols-1 ${systemMode === 'ER' ? 'md:grid-cols-2' : 'md:grid-cols-3'} gap-6`}>
                                        <div className={`${systemMode === 'ER' ? 'md:col-span-2' : 'md:col-span-3'} bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[350px] flex flex-col`}>
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest flex items-center gap-2"><div className="w-2 h-4 bg-slate-400 rounded-full"></div>แนวโน้มความคลาดเคลื่อน (ภาพรวมรายวัน)</h4>
                                            <div className="flex-1 w-full"><canvas ref={canvasRefs.bar}></canvas></div>
                                        </div>
                                        
                                        {/* Row of Pie Charts */}
                                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col items-center">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">สัดส่วนตามประเภท (Type)</h4>
                                            <div className="flex-1 w-full relative"><canvas ref={canvasRefs.type}></canvas></div>
                                        </div>
                                        {systemMode === 'MR' && (
                                            <>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col items-center">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">สัดส่วนตามหน่วยงาน</h4>
                                                <div className="flex-1 w-full relative"><canvas ref={canvasRefs.dept}></canvas></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col items-center">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">ระดับความรุนแรง (Severity)</h4>
                                                <div className="flex-1 w-full relative"><canvas ref={canvasRefs.sev}></canvas></div>
                                            </div>
                                            </>
                                        )}
                                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col items-center">
                                            <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">ผู้บันทึกข้อมูล (เภสัชกร)</h4>
                                            <div className="flex-1 w-full relative"><canvas ref={canvasRefs.pharma}></canvas></div>
                                        </div>
                                    </div>

                                    {/* New MR Specific Charts: DOW, Hour, Shift */}
                                    {systemMode === 'MR' && (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                             <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">ความถี่รายวัน (จ.-อา.)</h4>
                                                <div className="flex-1 w-full"><canvas ref={canvasRefs.dow}></canvas></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">ความชุกรายชั่วโมง</h4>
                                                <div className="flex-1 w-full"><canvas ref={canvasRefs.hour}></canvas></div>
                                            </div>
                                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-[300px] flex flex-col items-center">
                                                <h4 className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest text-center">เวรที่เกิดเหตุบ่อยสุด</h4>
                                                <div className="flex-1 w-full relative"><canvas ref={canvasRefs.shift}></canvas></div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Top 10 Drugs */}
                                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                        <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest flex items-center gap-2"><div className="w-4 h-1.5 bg-amber-400 rounded-full"></div>ยาที่เกิดปัญหาบ่อย (TOP 10)</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {Object.entries(stats.counts.drug).sort((a,b)=>b[1]-a[1]).slice(0, 10).map(([n,c])=>(
                                                <div key={n} className="flex items-center gap-2 border border-slate-200 bg-white px-3 py-1.5 rounded-xl text-xs font-black shadow-sm group">
                                                    <span className="text-slate-600">{n}</span>
                                                    <span className={`px-2 py-0.5 rounded-lg text-white ${theme.btnColorStr}`}>{c}</span>
                                                </div>
                                            ))}
                                            {Object.keys(stats.counts.drug).length === 0 && <span className="text-xs text-slate-400 italic">ไม่มีข้อมูลยา</span>}
                                        </div>
                                    </div>

                                    {/* MR Pivot Table */}
                                    {systemMode === 'MR' && Object.keys(stats.counts.pivot).length > 0 && (
                                        <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                                            <h4 className="text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">วิเคราะห์ Type / Error / หน่วยงาน</h4>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <tbody>
                                                        {Object.entries(stats.counts.pivot).sort((a,b)=>b[1].total-a[1].total).map(([typeLabel, typeData]) => {
                                                            const isExp = expandedPivot.includes(typeLabel);
                                                            return (
                                                                <React.Fragment key={typeLabel}>
                                                                    <tr onClick={()=>togglePivot(typeLabel)} className="bg-slate-50 border-b border-white cursor-pointer hover:bg-slate-100 transition-colors">
                                                                        <td className="p-3 font-black text-emerald-700 flex justify-between items-center">
                                                                            <span>{typeLabel}</span>
                                                                            <span className="text-[10px] bg-white px-2 py-1 rounded shadow-sm flex items-center gap-2">
                                                                                รวม: {typeData.total} 
                                                                                <svg className={`w-3 h-3 transition-transform ${isExp ? 'rotate-180':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                                                            </span>
                                                                        </td>
                                                                    </tr>
                                                                    {isExp && Object.entries(typeData.sub).sort((a,b)=>b[1].total-a[1].total).map(([errLabel, errData]) => (
                                                                        <tr key={errLabel} className="border-b border-slate-50 bg-white">
                                                                            <td className="p-3 pl-8">
                                                                                <div className="font-bold text-slate-700 mb-1">- {errLabel} <span className="text-[9px] text-amber-600 bg-amber-50 px-1 rounded ml-1">({errData.total})</span></div>
                                                                                <div className="flex flex-wrap gap-1 ml-3">
                                                                                    {Object.entries(errData.depts).sort((a,b)=>b[1]-a[1]).map(([dept, dCount]) => (
                                                                                        <span key={dept} className="text-[9px] text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">{dept}: {dCount}</span>
                                                                                    ))}
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    ))}
                                                                </React.Fragment>
                                                            )
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}
                        </div>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/40 backdrop-blur-md animate-fadeIn" onClick={()=>setShowModal(false)}>
                            <div className={`${theme.btnSubmit} px-14 py-12 rounded-[40px] text-white text-center shadow-2xl scale-110 border border-white/20 animate-bounce`}>
                                <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-xl">
                                    <svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="4" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h3 className="text-3xl font-black mb-2">บันทึกสำเร็จ!</h3>
                                <p className="text-white/80 font-bold text-sm">ข้อมูลถูกเพิ่มเข้าสู่ระบบเรียบร้อยแล้ว</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
